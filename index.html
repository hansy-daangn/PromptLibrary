<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>프롬프트 서랍</title>
<link rel="manifest" href="./manifest.webmanifest">
<meta name="theme-color" content="#1a1815">
<link rel="apple-touch-icon" href="./icon-192.png">
<script>try{if(localStorage.getItem("promptDrawer.theme")==="light")document.documentElement.setAttribute("data-theme","light");}catch(e){}</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./config.js"></script>
<style>
  :root{
    --bg:#1a1815;--raise:#252220;--raise-2:#2e2a26;--line:#393430;--line-soft:#312d29;
    --tx:#ece6df;--tx-mut:#988f86;--tx-dim:#6b645e;
    --accent:#c2560b;--accent-bright:#e2710f;--accent-soft:#f0c39a;
    --accent-tint:rgba(194,86,11,.15);--accent-tint-2:rgba(194,86,11,.28);
    --radius:11px;--radius-sm:7px;
    --shadow:0 20px 56px -20px rgba(0,0,0,.72), 0 2px 8px -2px rgba(0,0,0,.5);
    /* 테마별로 갈리는 표면 색 (라이트 모드에서 아래에서 재정의됨) */
    --body-base:#121110;--body-glow:#2a2622;
    --bar-top:#211e1b;--bar-bot:#1a1815;
    --input-bg:#1c1a17;
    --compose-top:#1d1b18;--compose-bot:#1a1815;--compose-bg:#161310;
    --toast-bg:#2e2a26;
    --btn-hover-bg:#363129;--btn-hover-line:#4a443d;--ind-hover:#5a534b;
    --scroll-thumb:#352f2a;
    font-synthesis-weight:none;
  }
  :root[data-theme="light"]{
    --bg:#fbf8f3;--raise:#f2ede5;--raise-2:#e8e1d6;--line:#dcd3c4;--line-soft:#e7dfd3;
    --tx:#2a2621;--tx-mut:#6f665b;--tx-dim:#9b9286;
    --accent:#c2560b;--accent-bright:#dd6a0e;--accent-soft:#a3490a;
    --accent-tint:rgba(194,86,11,.12);--accent-tint-2:rgba(194,86,11,.20);
    --shadow:0 18px 44px -22px rgba(90,55,20,.28), 0 2px 6px -2px rgba(90,55,20,.12);
    --body-base:#efe9e0;--body-glow:#f7f2ea;
    --bar-top:#f5f0e8;--bar-bot:#ece6dc;
    --input-bg:#fffdf9;
    --compose-top:#f2ece3;--compose-bot:#ece6dc;--compose-bg:#fffdf9;
    --toast-bg:#ffffff;
    --btn-hover-bg:#e4ddd0;--btn-hover-line:#cfc5b5;--ind-hover:#bcb2a2;
    --scroll-thumb:#d8cfc0;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;background:radial-gradient(820px 460px at 18% -12%, var(--body-glow), transparent), var(--body-base);
    font-family:"Pretendard Variable","Pretendard",-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Segoe UI","Malgun Gothic",system-ui,sans-serif;
    color:var(--tx);display:flex;align-items:flex-start;justify-content:center;padding:28px 16px 60px;-webkit-font-smoothing:antialiased;
    transition:background .25s ease;
  }
  .panel{width:380px;background:var(--bg);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);overflow:hidden;display:flex;flex-direction:column}

  .status{font-size:10.5px;font-weight:600;text-align:center;padding:6px 10px;border-bottom:1px solid var(--line-soft);line-height:1.4}
  .status.demo{color:#cf935f;background:rgba(194,86,11,.08)}
  .status.error{color:#e08a6a;background:rgba(180,60,40,.1)}

  .body{padding:12px}

  .add-row{display:flex;gap:7px;margin-bottom:13px;position:relative}
  .add-row input{flex:1;min-width:0;background:var(--input-bg);color:var(--tx);border:1px solid var(--line);
    border-radius:var(--radius-sm);padding:9px 11px;font:inherit;font-size:12.5px}
  .add-row input::placeholder{color:var(--tx-dim)}
  .add-row input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-tint)}
  /* 입력 자동완성 (사용 많은 순) */
  .ac{position:absolute;top:calc(100% + 4px);left:0;right:0;z-index:45;background:var(--raise);
    border:1px solid var(--line);border-radius:10px;padding:4px;box-shadow:var(--shadow);max-height:230px;overflow:auto}
  .ac .ai{display:flex;align-items:center;gap:8px;padding:6px 9px;border-radius:6px;cursor:pointer;font-size:12.5px;color:var(--tx)}
  .ac .ai .aen{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:0 1 auto;min-width:0}
  .ac .ai .ako{color:var(--tx-dim);font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1 1 auto;min-width:0}
  .ac .ai .acnt{margin-left:auto;flex:none;font-size:10px;color:var(--tx-dim);background:var(--bg);
    border:1px solid var(--line-soft);border-radius:999px;padding:1px 7px}
  .ac .ai:hover,.ac .ai.active{background:var(--raise-2)}
  .ac .ai.active{outline:1px solid var(--accent);outline-offset:-1px}
  .add-btn{flex:none;appearance:none;font:inherit;font-size:12px;font-weight:700;border-radius:var(--radius-sm);
    padding:0 14px;cursor:pointer;border:1px solid var(--accent);background:var(--accent);color:#fff;
    display:inline-flex;align-items:center;gap:5px;transition:background .15s,transform .05s}
  .add-btn:hover{background:var(--accent-bright);border-color:var(--accent-bright)}
  .add-btn:active{transform:translateY(1px)}
  .add-btn:focus-visible{outline:2px solid var(--accent-bright);outline-offset:2px}
  .add-btn .p{font-size:14px;font-weight:800;line-height:1}

  /* 분리 결과 (선택 후 저장) */
  .parsed{margin:-2px 0 13px;border:1px solid var(--line-soft);border-radius:var(--radius);background:var(--raise);padding:10px}
  .parsed-head{display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .seg-label{font-size:10px;color:var(--tx-dim);font-weight:600;text-transform:uppercase;letter-spacing:.6px}
  .link{margin-left:auto;appearance:none;border:0;background:none;color:var(--tx-mut);font:inherit;font-size:11px;font-weight:600;cursor:pointer;padding:2px 6px;border-radius:5px}
  .link:hover{color:var(--accent-soft);background:var(--raise-2)}
  .tokens{display:flex;flex-wrap:wrap;gap:6px}
  .tok{display:inline-flex;align-items:baseline;gap:5px;background:var(--bg);border:1.5px solid transparent;border-radius:8px;padding:5px 9px;cursor:pointer;font-size:12px;color:var(--tx);position:relative;transition:border-color .12s,background .12s,transform .12s}
  .tok .en{font-weight:600}
  .tok .ko{font-size:11px;color:var(--tx-mut)}
  .tok .ko.empty{color:var(--tx-dim);font-style:italic}
  .tok .flag{position:absolute;top:-9px;right:-6px;background:var(--accent);color:#fff;font-size:9px;font-weight:700;padding:2px 5px;border-radius:5px;opacity:0;transform:translateY(3px);transition:.12s;pointer-events:none;white-space:nowrap}
  .tok:hover{border-color:var(--accent);background:var(--accent-tint)}
  .tok:hover .flag{opacity:1;transform:translateY(0)}
  .tok.sel{border-color:var(--accent);background:var(--accent-tint-2);color:var(--accent-soft)}
  .tok.sel .flag{opacity:1;transform:translateY(0)}
  .tok.exists{opacity:.4;cursor:default;border-color:var(--line-soft);background:transparent}
  .tok.exists .flag{opacity:1;transform:translateY(0);background:var(--raise-2);color:var(--tx-dim)}
  .parsed-foot{display:flex;align-items:center;justify-content:flex-end;gap:8px;margin-top:10px}

  .btn{appearance:none;font:inherit;font-size:12px;font-weight:650;border-radius:8px;padding:7px 13px;cursor:pointer;
    border:1px solid var(--line);background:var(--raise-2);color:var(--tx);transition:border-color .15s,background .15s,transform .05s}
  .btn:hover{border-color:var(--btn-hover-line);background:var(--btn-hover-bg)}
  .btn:active{transform:translateY(1px)}
  .btn.ghost{background:none;border-color:transparent;color:var(--tx-mut);padding:7px 9px}
  .btn.ghost:hover{color:var(--tx);background:var(--raise)}
  .btn:focus-visible{outline:2px solid var(--accent-bright);outline-offset:2px}

  .chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:11px}
  .chip{appearance:none;font:inherit;font-size:11px;font-weight:600;flex:none;border:1px solid var(--line);
    background:var(--raise);color:var(--tx-mut);border-radius:999px;padding:4px 11px;cursor:pointer;
    transition:.13s;display:inline-flex;align-items:center;gap:5px}
  .chip:hover{color:var(--tx);border-color:var(--btn-hover-line)}
  .chip[aria-pressed="true"]{background:var(--accent-tint);border-color:var(--accent);color:var(--accent-soft)}
  .chip .n{font-size:10px;color:var(--tx-dim)}
  .chip[aria-pressed="true"] .n{color:#cf935f}
  .chip.clear{color:var(--tx-dim);border-style:dashed}

  .search{display:flex;align-items:center;gap:7px;background:var(--input-bg);border:1px solid var(--line);
    border-radius:var(--radius-sm);padding:6px 9px;margin-bottom:9px}
  .search svg{width:13px;height:13px;color:var(--tx-dim);flex:none}
  .search input{flex:1;background:none;border:0;color:var(--tx);font:inherit;font-size:12px;outline:none}
  .search input::placeholder{color:var(--tx-dim)}
  .search .x{appearance:none;border:0;background:none;color:var(--tx-dim);cursor:pointer;font-size:14px;line-height:1;padding:0 2px}
  .search .x:hover{color:var(--tx)}

  .lib-head-row{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px}
  .lib-head{font-size:10px;color:var(--tx-dim);font-weight:600;text-transform:uppercase;letter-spacing:.6px}
  #translateAll{color:var(--accent-soft);font-weight:700}
  #translateAll:hover{background:var(--accent-tint)}
  .lib{display:flex;flex-direction:column;gap:2px;max-height:300px;overflow:auto;margin:0 -4px;padding:0 4px}
  .lib::-webkit-scrollbar{width:8px}
  .lib::-webkit-scrollbar-thumb{background:var(--scroll-thumb);border-radius:8px;border:2px solid var(--bg)}

  .row{display:flex;align-items:center;gap:9px;padding:6px 8px;border-radius:8px;cursor:pointer;border:1px solid transparent;transition:background .12s,border-color .12s}
  .row:hover{background:var(--raise);border-color:var(--line-soft)}
  .row:focus-visible{outline:2px solid var(--accent-bright);outline-offset:-1px}
  .row.in{background:var(--accent-tint);border-color:rgba(194,86,11,.35)}
  .row.flash{background:var(--accent-tint-2)}
  .ind{width:13px;height:13px;border-radius:50%;border:1.6px solid var(--line);flex:none;transition:.12s}
  .row:hover .ind{border-color:var(--ind-hover)}
  .row.in .ind{background:var(--accent);border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-tint)}
  .lblwrap{display:flex;flex-direction:column;justify-content:center;flex:0 1 auto;min-width:0;position:relative}
  .label{font-size:12px;font-weight:600;color:var(--tx);line-height:1.2;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .label.untrans{font-style:italic;color:var(--tx-mut);font-weight:500}
  /* 호버 시 한글 밑에 원문(회색·작은 글씨)을 오버레이로 즉시 표시 → 다른 요소 전혀 안 밀림(움직임 없음) */
  .sub{display:none;position:absolute;top:calc(100% + 1px);left:0;width:max-content;max-width:300px;
    font-size:10px;font-weight:500;font-style:normal;color:var(--tx-dim);line-height:1.2;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    background:var(--raise);padding:3px 7px 3px 0;border-radius:0 0 7px 7px;z-index:6;pointer-events:none}
  .row:hover .sub:not(:empty),.row:focus-within .sub:not(:empty){display:block}
  .label[contenteditable="true"]{outline:none;background:var(--input-bg);border:1px solid var(--accent);border-radius:5px;padding:1px 5px;cursor:text;font-style:normal;color:var(--tx)}
  .cat{font-size:9.5px;font-weight:600;color:var(--tx-mut);background:var(--raise-2);border:1px solid var(--line-soft);padding:2px 7px;border-radius:999px;flex:none}
  .cnt{margin-left:auto;font-size:10.5px;color:var(--tx-dim);font-weight:600;font-variant-numeric:tabular-nums;flex:none}
  .cnt.zero{display:none}
  .kebab{margin-left:6px;appearance:none;border:0;background:none;color:var(--tx-dim);cursor:pointer;width:22px;height:22px;border-radius:6px;display:grid;place-items:center;flex:none;opacity:0;transition:opacity .12s}
  .row:hover .kebab,.row:focus-within .kebab{opacity:1}
  .kebab:hover{background:var(--raise-2);color:var(--tx)}
  .kebab svg{width:14px;height:14px}
  .row .cnt.zero + .kebab{margin-left:auto}

  .menu{position:absolute;z-index:40;background:var(--raise);border:1px solid var(--line);border-radius:10px;padding:5px;box-shadow:var(--shadow);width:172px}
  .menu .mi{appearance:none;border:0;background:none;color:var(--tx-mut);font:inherit;font-size:11.5px;text-align:left;width:100%;padding:7px 9px;border-radius:6px;cursor:pointer;display:flex;align-items:center;gap:8px}
  .menu .mi svg{width:13px;height:13px}
  .menu .mi:hover{background:var(--raise-2);color:var(--tx)}
  .menu .mi.danger:hover{color:var(--accent-bright)}
  .menu .sep{height:1px;background:var(--line-soft);margin:5px 4px}
  .menu .mlabel{font-size:9.5px;color:var(--tx-dim);font-weight:600;text-transform:uppercase;letter-spacing:.5px;padding:2px 6px 5px}
  .menu .catgrid{display:flex;flex-wrap:wrap;gap:4px;padding:0 4px 3px}
  .menu .catgrid button{appearance:none;border:1px solid var(--line);background:var(--bg);color:var(--tx-mut);font:inherit;font-size:10px;font-weight:600;padding:3px 8px;border-radius:999px;cursor:pointer}
  .menu .catgrid button:hover{border-color:var(--btn-hover-line);color:var(--tx)}
  .menu .catgrid button[aria-current="true"]{background:var(--accent-tint);border-color:var(--accent);color:var(--accent-soft)}

  .empty{text-align:center;padding:24px 16px;color:var(--tx-dim);border:1px dashed var(--line-soft);border-radius:var(--radius)}
  .empty .big{font-size:23px;margin-bottom:8px;opacity:.8}
  .empty p{margin:0;font-size:12px;line-height:1.6}
  .empty b{color:var(--accent-soft);font-weight:600}

  .compose{border-top:1px solid var(--line-soft);background:linear-gradient(var(--compose-top),var(--compose-bot));padding:10px 12px}
  .compose-top{display:flex;align-items:center;gap:8px}
  .compose-top .t{font-size:10px;font-weight:700;color:var(--tx-mut);text-transform:uppercase;letter-spacing:.6px}
  .compose-top .c{font-size:10.5px;color:var(--tx-dim);font-variant-numeric:tabular-nums}
  .compose-top .acts{margin-left:auto;display:flex;gap:4px}
  .compose-box{background:var(--compose-bg);border:1px solid var(--line);border-radius:var(--radius-sm);padding:8px 10px;min-height:34px;font-size:12px;line-height:1.55;color:var(--tx);word-break:break-word;margin-top:7px}
  .compose-box .comma{color:var(--tx-dim)}
  .compose.is-empty .acts,.compose.is-empty .compose-box{display:none}
  .compose.is-empty .c{color:var(--tx-dim)}

  .toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--toast-bg);border:1px solid var(--line);color:var(--tx);font-size:12px;font-weight:600;padding:8px 14px;border-radius:9px;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:.2s;z-index:60}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* 우측 하단 고정 · 테마 변경 / 좌측 하단 · 설치 */
  .corner-btn{position:fixed;bottom:14px;z-index:50;appearance:none;font:inherit;font-size:11.5px;
    font-weight:600;letter-spacing:.2px;cursor:pointer;border-radius:999px;padding:7px 13px;
    display:inline-flex;align-items:center;gap:6px;box-shadow:var(--shadow);
    transition:color .15s,border-color .15s,background .15s,transform .05s}
  .corner-btn:active{transform:translateY(1px)}
  .corner-btn:focus-visible{outline:2px solid var(--accent-bright);outline-offset:2px}
  .corner-btn svg{width:13px;height:13px;flex:none}
  .theme-toggle{right:16px;color:var(--tx-mut);background:var(--raise);border:1px solid var(--line)}
  .theme-toggle:hover{color:var(--accent-soft);border-color:var(--accent)}
  .install-btn{left:16px;color:#fff;font-weight:700;background:var(--accent);border:1px solid var(--accent)}
  .install-btn:hover{background:var(--accent-bright);border-color:var(--accent-bright)}
  @media (max-width:430px){.corner-btn{font-size:11px;padding:6px 11px}}

  /* ── 탭 (3탭 · 밑줄형) ── */
  .tabs{display:flex;align-items:center;gap:18px;padding:0 14px;background:linear-gradient(var(--bar-top),var(--bar-bot));
    border-bottom:1px solid var(--line-soft);box-shadow:inset 0 1px 0 rgba(255,255,255,.025);user-select:none}
  .tab{appearance:none;border:0;background:none;font:inherit;font-size:12.5px;font-weight:650;color:var(--tx-dim);
    cursor:pointer;padding:12px 1px 11px;position:relative;transition:color .14s}
  .tab:hover{color:var(--tx-mut)}
  .tab.active{color:var(--tx)}
  .tab.active::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:2px;background:var(--accent);border-radius:2px}
  .tab:focus-visible{outline:2px solid var(--accent-bright);outline-offset:2px;border-radius:4px}
  .tabs .cloud{margin-left:auto;display:flex;align-items:center;gap:4px;font-size:10px;color:var(--tx-dim)}
  .tabs .cloud.ok{color:#7fa86b}
  .tabs .cloud svg{width:12px;height:12px}

  .view{display:none}
  .view.show{display:block}

  /* ── 조합 토큰 (개별 제거) ── */
  .compose-box{display:flex;flex-wrap:wrap;gap:6px}
  .ctok{display:inline-flex;align-items:center;gap:3px;background:var(--bg);border:1px solid var(--line);border-radius:8px;
    padding:4px 5px 4px 9px;font-size:12px;color:var(--tx);transition:border-color .12s,background .12s}
  .ctok:hover{border-color:var(--accent);background:var(--accent-tint)}
  .ctok .x{appearance:none;border:0;background:none;color:var(--tx-dim);cursor:pointer;width:16px;height:16px;border-radius:50%;
    display:grid;place-items:center;padding:0;opacity:0;transition:opacity .12s,background .12s,color .12s}
  .ctok .x svg{width:9px;height:9px;display:block}
  .ctok:hover .x{opacity:1}
  .ctok .x:hover{background:var(--accent);color:#fff}
  @media (hover:none){.ctok .x{opacity:.55}}

  /* ── 평가 뷰 ── */
  .eval-view{padding:13px}
  .eval-head,.ref-head{font-size:10px;color:var(--tx-dim);font-weight:600;text-transform:uppercase;letter-spacing:.6px;margin-bottom:9px}
  .eval-input{width:100%;background:var(--input-bg);color:var(--tx);border:1px solid var(--line);border-radius:var(--radius-sm);
    padding:10px 11px;font:inherit;font-size:12.5px;line-height:1.6;resize:vertical;min-height:84px}
  .eval-input::placeholder{color:var(--tx-dim)}
  .eval-input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-tint)}
  .eval-run{margin-top:9px;width:100%;appearance:none;font:inherit;font-size:12.5px;font-weight:700;color:#fff;
    background:var(--accent);border:1px solid var(--accent);border-radius:var(--radius-sm);padding:10px;cursor:pointer;transition:background .15s}
  .eval-run:hover{background:var(--accent-bright);border-color:var(--accent-bright)}
  .eval-note{margin-top:11px;font-size:11px;line-height:1.6;color:var(--tx-dim);text-align:center;
    border:1px dashed var(--line-soft);border-radius:var(--radius);padding:12px 14px}
  .eval-models{display:flex;flex-wrap:wrap;gap:5px;margin:11px 0 12px}
  .mchip{appearance:none;font:inherit;font-size:11px;font-weight:600;border:1px solid var(--line);background:var(--raise);
    color:var(--tx-mut);border-radius:999px;padding:5px 13px;cursor:pointer;transition:.13s}
  .mchip:hover{color:var(--tx);border-color:var(--btn-hover-line)}
  .mchip[aria-pressed="true"]{background:var(--accent-tint);border-color:var(--accent);color:var(--accent-soft)}
  .score{display:flex;align-items:center;gap:14px;padding:13px;border:1px solid var(--line-soft);border-radius:var(--radius);background:var(--raise)}
  .ring{width:64px;height:64px;flex:none;border-radius:50%;display:grid;place-items:center;position:relative}
  .ring::before{content:"";position:absolute;inset:5px;border-radius:50%;background:var(--raise)}
  .ring span{position:relative;font-size:20px;font-weight:800}
  .ring span small{font-size:10px;color:var(--tx-dim);font-weight:600;margin-left:1px}
  .crit{flex:1;display:flex;flex-direction:column;gap:6px;min-width:0}
  .crit .c{display:flex;align-items:center;gap:8px;font-size:10px;color:var(--tx-mut)}

  function guessCat(en){const s=en.toLowerCase();for(const[c,keys]of CAT_RULES)for(const k of keys)if(s.indexOf(k)!==-1)return c;return"기타";}
  function translate(en){
    if(!en) return "";
    const s=String(en).toLowerCase().trim().replace(/\s+/g," ");
    if(DICT[s]) return DICT[s];
    const a=s.replace(/^(a|an|the)\s+/,"");        // 관사 제거: "a woman" → "woman"
    if(DICT[a]) return DICT[a];
    const h=a.replace(/[-_]/g," ");                 // 하이픈/언더스코어 → 공백
    if(DICT[h]) return DICT[h];
    if(a.length>3 && a.charAt(a.length-1)==="s" && DICT[a.slice(0,-1)]) return DICT[a.slice(0,-1)]; // 복수형
    return "";
  }

  /* ---------- Supabase 데이터 헬퍼 ---------- */
  async function sbList(){
    const {data,error}=await sb.from("words").select("*");
    if(error) throw error;
    return data.map(d=>({id:d.id,en:d.en,ko:d.ko||"",cat:d.cat||"기타",count:d.count||0,created:d.created_at?Date.parse(d.created_at):Date.now()}));
  }
  async function sbInsert(rows){ if(!sb)return; const {error}=await sb.from("words").insert(rows.map(r=>({id:r.id,en:r.en,ko:r.ko,cat:r.cat,count:r.count}))); if(error) throw error; }
  async function sbUpdate(id,patch){ if(!sb)return; const {error}=await sb.from("words").update(patch).eq("id",id); if(error) throw error; }
  async function sbDelete(id){ if(!sb)return; const {error}=await sb.from("words").delete().eq("id",id); if(error) throw error; }
  async function refresh(){ if(!sb)return; try{library=await sbList();persistLocal();renderAll();}catch(e){console.error(e);} }

  /* ---------- 분리 → 선택 → 저장 ---------- */
  splitBtn.addEventListener("click",splitPrompt);
  input.addEventListener("keydown",e=>{
    if(!acBox.hidden && acItems.length){
      if(e.key==="ArrowDown"){e.preventDefault();acActive=(acActive+1)%acItems.length;renderAc();return;}
      if(e.key==="ArrowUp"){e.preventDefault();acActive=(acActive-1+acItems.length)%acItems.length;renderAc();return;}
      if((e.key==="Enter"||e.key==="Tab")&&acActive>=0){e.preventDefault();acceptAc(acActive);return;}
      if(e.key==="Escape"){e.preventDefault();closeAc();return;}
    }
    if(e.key==="Enter"){e.preventDefault();splitPrompt();}
  });
  selectAllBtn.addEventListener("click",()=>{

  /* ---------- 입력 자동완성 (이미 있는 단어 · 사용 많은 순) ---------- */
  const acBox=$("#acBox");
  let acItems=[], acActive=-1;
  function acToken(){
    const pos=input.selectionStart ?? input.value.length;
    const before=input.value.slice(0,pos);
    const seg=before.split(/[,.\n]/).pop();
    return { seg, start:pos-seg.length, end:pos, q:seg.trim().toLowerCase() };
  }
  function closeAc(){ acBox.hidden=true; acBox.innerHTML=""; acItems=[]; acActive=-1; }
  function renderAc(){
    if(!acItems.length){ closeAc(); return; }
    acBox.innerHTML="";
    acItems.forEach((it,i)=>{
      const d=document.createElement("div");
      d.className="ai"+(i===acActive?" active":"");
      d.innerHTML='<span class="aen"></span><span class="ako"></span><span class="acnt"></span>';
      d.querySelector(".aen").textContent=it.en;
      d.querySelector(".ako").textContent=it.ko?("· "+it.ko):"";
      d.querySelector(".acnt").textContent=it.count;
      d.addEventListener("mousedown",e=>{ e.preventDefault(); acceptAc(i); });
      d.addEventListener("mouseenter",()=>{ acActive=i; [...acBox.children].forEach((c,j)=>c.classList.toggle("active",j===i)); });
      acBox.appendChild(d);
    });
    acBox.hidden=false;
  }
  function updateAc(){
    const { q }=acToken();
    if(q.length<1){ closeAc(); return; }
    const byUse=(a,b)=>b.count-a.count||b.created-a.created;
    const starts=[], incl=[];
    for(const x of library){
      const en=(x.en||"").toLowerCase(), ko=(x.ko||"").toLowerCase();
      if(en===q) continue;               // 이미 완성된 단어는 제안하지 않음
      if(en.startsWith(q)) starts.push(x);
      else if(en.includes(q)||ko.includes(q)) incl.push(x);
    }
    acItems=starts.sort(byUse).concat(incl.sort(byUse)).slice(0,8);
    acActive=acItems.length?0:-1;
    renderAc();
  }
  function acceptAc(i){
    const it=acItems[i]; if(!it) return;
    const { seg, start, end }=acToken();
    const lead=seg.slice(0, seg.length-seg.trimStart().length);   // 토큰 앞 공백 보존
    const v=input.value;
    input.value=v.slice(0,start)+lead+it.en+v.slice(end);
    const caret=start+lead.length+it.en.length;
    input.setSelectionRange(caret,caret);
    closeAc(); input.focus();
  }
  input.addEventListener("input",updateAc);
  input.addEventListener("focus",updateAc);
  input.addEventListener("blur",()=>setTimeout(closeAc,120));
  document.addEventListener("click",e=>{ if(!e.target.closest(".add-row")) closeAc(); });

  async function splitPrompt(){
    let src=input.value.trim(), fromClip=false;
    if(!src){
      fromClip=true;
      if(!navigator.clipboard||!navigator.clipboard.readText){toast("이 브라우저에선 클립보드를 못 읽어요 · 입력칸을 써주세요");return;}
      try{ src=((await navigator.clipboard.readText())||"").trim(); }
      catch(e){ toast("클립보드를 읽지 못했어요 · 입력칸에 붙여넣어 주세요"); return; }
      if(!src){ toast("클립보드가 비어 있어요"); return; }
    }
    const segs=src.split(/[,.\n]+/).map(s=>s.trim()).filter(Boolean);
    const seen=new Set(); parsed=[];
    for(const s of segs){ const k=s.toLowerCase(); if(seen.has(k))continue; seen.add(k);
      parsed.push({en:s, ko:translate(s), exists:library.some(x=>x.en.toLowerCase()===k), sel:false});
    }
    if(!parsed.length){ toast("끊을 내용이 없어요"); return; }
    input.value="";
    renderParsed();
  }

  function renderParsed(){
    parsedWrap.hidden=false; tokensEl.innerHTML="";
    parsed.forEach(p=>{
      const t=document.createElement("button"); t.type="button";
      t.className="tok"+(p.exists?" exists":"")+(p.sel?" sel":"");
      t.innerHTML='<span class="en"></span><span class="ko '+(p.ko?'':'empty')+'"></span><span class="flag"></span>';
      t.querySelector(".en").textContent=p.en;
      t.querySelector(".ko").textContent=p.ko?`(${p.ko})`:"(번역 없음)";
      t.querySelector(".flag").textContent=p.exists?"이미 있음":(p.sel?"선택됨":"+ 선택");
      if(!p.exists) t.addEventListener("click",()=>{p.sel=!p.sel;renderParsed();});
      tokensEl.appendChild(t);
    });
    const n=parsed.filter(p=>p.sel&&!p.exists).length;
    saveN.textContent=n?"("+n+")":"";
  }

  async function saveSelected(){
    const chosen=parsed.filter(p=>p.sel&&!p.exists);
    if(!chosen.length){ toast("선택된 단어가 없어요"); return; }
    const fresh=chosen.map(p=>({id:uid(),en:p.en,ko:p.ko,cat:guessCat(p.en),count:0,created:Date.now()}));
    library.push(...fresh); persistLocal();
    parsed=[]; parsedWrap.hidden=true; tokensEl.innerHTML="";
    renderAll();
    toast("저장되었습니다! "+(fresh.length>1?"("+fresh.length+"개)":""));
    try{ await sbInsert(fresh); }catch(e){ console.error(e); toast("클라우드 저장 실패 · 다시 동기화합니다"); refresh(); }
  }

  /* ---------- 칩 ---------- */
  function catCounts(){const c={};CATS.forEach(x=>c[x]=0);library.forEach(x=>{if(c[x.cat]!=null)c[x.cat]++;});return c;}
  function renderChips(){
    const counts=catCounts();chipsEl.innerHTML="";
    CATS.forEach(c=>{
      const b=document.createElement("button");b.className="chip";b.type="button";
      b.setAttribute("aria-pressed",activeCats.has(c)?"true":"false");
      b.innerHTML=`${c}<span class="n">${counts[c]||0}</span>`;
      b.addEventListener("click",()=>{activeCats.has(c)?activeCats.delete(c):activeCats.add(c);renderChips();renderLib();});
      chipsEl.appendChild(b);
    });
    if(activeCats.size){
      const clr=document.createElement("button");clr.className="chip clear";clr.type="button";clr.textContent="전체";
      clr.addEventListener("click",()=>{activeCats.clear();renderChips();renderLib();});chipsEl.appendChild(clr);
    }
  }

  /* ---------- 라이브러리 ---------- */
  function visible(){
    let items=library.slice();
    items=items.filter(x=>!compose.some(c=>c.id===x.id));   // 조합에 담긴 단어는 내 단어에서 숨김
    if(activeCats.size)items=items.filter(x=>activeCats.has(x.cat));
    if(query)items=items.filter(x=>(x.ko||"").toLowerCase().includes(query)||x.en.toLowerCase().includes(query));
    items.sort((a,b)=>b.count-a.count||b.created-a.created);
    return items;
  }
  function renderLib(){
    searchBox.hidden=library.length<SEARCH_THRESHOLD;
    if(library.length<SEARCH_THRESHOLD&&query){query="";searchInput.value="";searchClear.hidden=true;}
    const items=visible();libEl.innerHTML="";
    if(!library.length){
      libEl.innerHTML='<div class="empty"><div class="big">🗄️</div><p>아직 저장된 단어가 없어요.<br>입력하거나 복사한 뒤 <b>추가</b>를 누르세요.</p></div>';
      return;
    }
    if(!items.length){
      const msg=query?"검색 결과가 없어요.":(activeCats.size?"이 분류엔 표시할 단어가 없어요.":"표시할 단어가 없어요 · 조합에 담긴 단어는 여기서 숨겨져요.");
      libEl.innerHTML='<div class="empty"><p>'+msg+'</p></div>';return;
    }
    items.forEach(item=>{
      const inComp=compose.some(c=>c.id===item.id);
      const untrans=!(item.ko&&item.ko.trim());
      const row=document.createElement("div");
      row.className="row"+(inComp?" in":"");row.dataset.id=item.id;row.tabIndex=0;row.setAttribute("role","button");
      row.innerHTML=
        '<span class="ind"></span>'+
        '<span class="lblwrap"><span class="label '+(untrans?'untrans':'')+'"></span><span class="sub"></span></span>'+
        '<span class="cat">'+item.cat+'</span>'+
        '<span class="cnt '+(item.count?'':'zero')+'">'+item.count+'</span>'+
        '<button class="kebab" aria-label="더보기"><svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="1.6"/><circle cx="12" cy="12" r="1.6"/><circle cx="12" cy="19" r="1.6"/></svg></button>';
      const labelEl=row.querySelector(".label");labelEl.textContent=untrans?item.en:item.ko;
      if(!untrans) row.querySelector(".sub").textContent=item.en;   // 호버 시 한글 밑에 원문(회색·작은 글씨)
      row.addEventListener("click",e=>{if(e.target.closest(".kebab")||labelEl.isContentEditable)return;toggleCompose(item.id);});
      row.addEventListener("keydown",e=>{if((e.key==="Enter"||e.key===" ")&&!labelEl.isContentEditable){e.preventDefault();toggleCompose(item.id);}});
      labelEl.addEventListener("dblclick",e=>{e.stopPropagation();editKo(labelEl,item);});
      row.querySelector(".kebab").addEventListener("click",e=>{e.stopPropagation();openMenu(e.currentTarget,labelEl,item);});
      libEl.appendChild(row);
    });
  }
  function flashRow(id){const r=libEl.querySelector('.row[data-id="'+id+'"]');if(r){r.classList.add("flash");setTimeout(()=>r.classList.remove("flash"),420);}}

  function editKo(labelEl,item){
    labelEl.classList.remove("untrans");labelEl.textContent=item.ko||"";labelEl.setAttribute("contenteditable","true");labelEl.focus();
    const rg=document.createRange();rg.selectNodeContents(labelEl);const sel=getSelection();sel.removeAllRanges();sel.addRange(rg);
    const commit=()=>{labelEl.removeAttribute("contenteditable");const v=labelEl.textContent.trim();if(v!==item.ko){item.ko=v;persistLocal();renderLib();sbUpdate(item.id,{ko:v}).catch(e=>{console.error(e);toast("수정 동기화 실패");refresh();});}else{renderLib();}};
    labelEl.addEventListener("blur",commit,{once:true});
    labelEl.addEventListener("keydown",e=>{if(e.key==="Enter"){e.preventDefault();labelEl.blur();}if(e.key==="Escape"){labelEl.textContent=item.ko||"";labelEl.blur();}});

  // Supabase Edge Function(LLM 프록시)에 미사전 단어 번역 요청
  const TRANSLATE_FN=(window.TRANSLATE_FN||"translate");
  const TRANSLATE_URL=(window.TRANSLATE_URL||"");
  const TRANSLATE_KEY=(window.TRANSLATE_KEY||"");
  async function aiTranslate(words){
    // 별도 번역 엔드포인트가 지정되면 그쪽으로 직접 호출(단어 DB와 다른 프로젝트의 함수 사용)
    if(TRANSLATE_URL){
      const res=await fetch(TRANSLATE_URL,{
        method:"POST",
        headers:Object.assign({"content-type":"application/json"},
          TRANSLATE_KEY?{"authorization":"Bearer "+TRANSLATE_KEY,"apikey":TRANSLATE_KEY}:{}),
        body:JSON.stringify({ words })
      });
      if(!res.ok) throw new Error("AI 번역 실패 "+res.status);
      const data=await res.json();
      return (data && data.translations) || {};
    }
    if(!sb || !sb.functions) throw new Error("AI 번역 미설정");
    const { data, error } = await sb.functions.invoke(TRANSLATE_FN, { body:{ words } });
    if(error) throw error;
    return (data && data.translations) || {};
  }
  async function translateAll(){
    const targets=library.filter(x=>!(x.ko&&x.ko.trim()));
    if(!targets.length){ toast("번역할 단어가 없어요"); return; }
    // 1) 로컬 사전으로 즉시 번역
    const dictDone=[];
    targets.forEach(x=>{ const ko=translate(x.en); if(ko){ x.ko=ko; dictDone.push(x); } });
    if(dictDone.length){ persistLocal(); renderAll(); for(const x of dictDone){ try{ await sbUpdate(x.id,{ko:x.ko}); }catch(e){} } }
    // 2) 사전에 없는 단어는 AI에게 번역 요청
    const rest=library.filter(x=>!(x.ko&&x.ko.trim()));
    if(!rest.length){ toast(dictDone.length+"개 번역 완료"); return; }
    if(!sb){ toast(dictDone.length?("사전 번역 "+dictDone.length+"개 · 나머지는 직접 입력"):"사전에 없는 단어예요 · 더블클릭으로 직접 입력"); return; }
    const prev=translateAllBtn.textContent;
    translateAllBtn.disabled=true; translateAllBtn.textContent="AI 번역 중…";
    try{
      const map=await aiTranslate(rest.map(x=>x.en));
      const lc={}; Object.keys(map).forEach(k=>{ lc[k.toLowerCase()]=map[k]; });
      const aiDone=[];
      rest.forEach(x=>{ const ko=(map[x.en]||lc[x.en.toLowerCase()]||"").trim(); if(ko){ x.ko=ko; aiDone.push(x); } });
      persistLocal(); renderAll();
      toast(aiDone.length?("AI 번역 "+aiDone.length+"개 완료"):"AI 번역 결과가 비어 있어요");
      for(const x of aiDone){ try{ await sbUpdate(x.id,{ko:x.ko}); }catch(e){} }
    }catch(e){
      console.error(e);
      toast("AI 번역을 사용할 수 없어요 · 번역 함수 설정이 필요해요");
    }finally{
      translateAllBtn.disabled=false; refreshTranslateBtn();
    }
  }

  const clamp01=v=>Math.max(0,Math.min(1,v));

  /* 프롬프트를 한 번 분석해 모델별 채점에 쓰는 신호값 추출 */
  function analyzePrompt(raw){
    const text=String(raw||"").trim();
    const t=text.toLowerCase();
    const wc=text.split(/\s+/).filter(Boolean).length;
    const sentences=text.split(/[.!?\n]+/).map(s=>s.trim()).filter(Boolean).length;
    const has=arr=>arr.some(k=>t.includes(k));

    const ACTION=["running","walking","standing","sitting","holding","posing","jumping","dancing","looking","smiling","leaning","kneeling","floating","flying","reaching","gazing","reading","writing","drinking","playing","riding","crossing","wearing","staring","resting","using"];
    const SETTING=["background","backdrop","in a ","in an ","on a ","on an ","at a ","at the ","against","behind","lobby","office","studio","beach","field","room","street","city","forest","indoor","outdoor","environment","scene","landscape","mountain","sky","cafe","restaurant","desert","ocean"," sea ","window","wall","floor","park","garden","interior","rooftop","kitchen","stage","table","gradient"];
    const STYLE=["photography","photo ","cinematic","cinematography","illustration","painting","render","anime","cartoon","editorial","portrait","flat design","flat illustration","watercolor","oil ","sketch"," style","aesthetic","realistic","photorealistic","minimalist","vintage","lifestyle","comic","concept art","pixel art"];
    const TECH_KW=["sharp focus","depth of field","bokeh","lighting","studio light","natural light","golden hour","cinematic lighting","high detail","ultra detailed","ultra-detailed","macro","hdr","soft light","reflections"];
    const reRes=/\b[1248]\s?k\b/i, reLens=/\b\d{2,3}\s?mm\b/i, reAspect=/\b\d{1,2}:\d{1,2}\b/;
    const reArticleNoun=/\b(a|an|the)\s+[a-z][a-z-]+/i, reQuoted=/["“][^"”]{2,}["”]/;
    const gerund=/\b[a-z]{3,}ing\b/.test(t);
    const qm=text.match(/["“][^"”]{1,}["”]/);
    const quotedWords=qm?qm[0].replace(/["“”]/g,"").trim().split(/\s+/).filter(Boolean).length:0;

    return {
      text, t, wc, sentences,
      subject: reArticleNoun.test(text)||/^[A-Z][a-z]+/.test(text),
      action: has(ACTION)||gerund,
      setting: has(SETTING),
      style: has(STYLE),
      tech: reRes.test(text)||reLens.test(text)||reAspect.test(text)||has(TECH_KW),
      resExplicit: reRes.test(text),
      is4k: /\b4\s?k\b/i.test(text),
      quoted: reQuoted.test(text), quotedWords,
      fontSpec: /\b(font|sans-?serif|serif|script|cursive|typeface|bold|italic|lettering|handwritten)\b/i.test(text),
      posSpec: /\b(top|bottom|center|centered|left|right|overlay|upper|lower|corner|third|middle|above|below)\b/i.test(text),
      textIntent: /\b(text|headline|title|caption|label|poster|banner|ad\b|advertisement|sign|logo|word|reading|overlay|slogan|typography)\b/i.test(text),
      editIntent: /\b(replace|change|edit|restyle|remove|swap|modify|transform|recolor|retouch)\b/i.test(text),
      keepUnchanged: /\b(keep|maintain|unchanged|exactly as|same (font|size|position|composition|style)|preserve)\b/i.test(text),
      logic: /\b(relationship|between|leads? to|flow|because|then|infographic|diagram|process|cause|connecting|sequence|step|arrow|cycle)\b/i.test(text),
      factual: /\b(chart|data|statistics|revenue|compare|comparison|20\d\d|sales|market|gdp|percent|q[1-4]\b|%)\b/i.test(text),
      webSearch: /web[_ ]?search/i.test(text),
      structure: /\b(diagram|infographic|labeled|labels|flowchart|layout|grid|chart)\b/i.test(text),
      vaguePhrase: /\b(a |an )?(picture|photo|image) of\b/.test(t) && wc<=7,
      pretty: /\b(pretty|nice|beautiful|cute|cool|amazing|good)\b/.test(t) && wc<=8,
      conflictCount: ["cinematic","watercolor","pixel art","anime","oil painting","3d render","cartoon","flat illustration","comic"].filter(s=>t.includes(s)).length,
      minimalConflict: t.includes("minimalist") && /\b(ornate|detailed|intricate|busy|decorative)\b/.test(t),
      negatives: (t.match(/\bno\s+\w+/g)||[]).length + (t.match(/\bwithout\b/g)||[]).length,
      vagueSize: /\b(high\s?res(olution)?|hi-?res|hd)\b/.test(t) && !/\b[1248]\s?k\b/i.test(text)
    };
  }

  /* 모델별로 완전히 다른 평가축·피드백·점수 */
  function scoreModel(x, model){
    const crit=[], good=[], tips=[]; let pen=0;

    if(model==="4.0"){
      const subj = x.vaguePhrase?0.1:(x.subject?1:(x.wc>=4?0.5:0.2));
      const concise = x.sentences<=4 ? (x.wc<=30?1:(x.wc<=45?0.85:0.6)) : clamp01(1-(x.sentences-4)*0.2);
      const res = x.resExplicit?1:(x.tech?0.4:0.12);
      crit.push(["주제 명확성",subj],["동작·자세",x.action?1:0.2],["배경·환경",x.setting?1:0.2],["스타일",x.style?1:0.2],["해상도 명시",res],["간결·직접성",concise]);
      if(x.vaguePhrase){ pen+=0.28; tips.push("4.0은 모호한 요청에 특히 엄격해요. ‘…의 사진’ 대신 주제·배경·조명·스타일을 구체적으로 쓰세요"); }
      if(x.pretty) pen+=0.1;
      if(x.conflictCount>=2){ pen+=0.14; tips.push("스타일을 섞지 마세요. 변형이 필요하면 한 스타일씩 n=3~5로 따로 생성하세요"); }
      if(x.wc>45){ pen+=Math.min(0.16,(x.wc-45)/180); tips.push("4.0은 핵심 3~5요소·2~4문장이 가장 안정적이에요. 더 줄여보세요"); }
      if(x.subject && !x.vaguePhrase) good.push("주제가 직접적이라 4.0의 강점(명확한 텍스트→이미지)에 맞아요");
      if(x.resExplicit) good.push("해상도를 명시해 4.0이 출력 품질을 맞추기 쉬워요"); else tips.push("해상도를 1K·2K·4K로 명시하세요 — 4.0은 ‘고해상도’를 해석하지 못해요");
      if(!x.action) tips.push("동작·자세를 넣으세요 — 없으면 정적인 기본 포즈가 돼요 (예: running across a field)");
      tips.push("탐색은 n=3~5로 변형을 뽑고, 캐릭터·제품 일관성은 다중 참조 이미지를 활용하세요");
    }

    else if(model==="4.5"){
      let textScore;
      if(x.quoted) textScore = clamp01(0.55 + (x.fontSpec?0.2:0) + (x.posSpec?0.15:0) + (x.quotedWords>0&&x.quotedWords<=5?0.1:-0.1));
      else if(x.textIntent) textScore = 0.22;
      else textScore = 0.7;
      const precision = clamp01(0.35 + (x.quoted?0.2:0) + (x.fontSpec?0.15:0) + (x.posSpec?0.1:0) + (x.keepUnchanged?0.2:0));
      const res = x.is4k?1:(x.resExplicit?0.7:0.3);
      crit.push(["주제 명확성",x.subject?1:0.3],["배경·구성",x.setting?1:0.25],["스타일",x.style?1:0.3],["텍스트 렌더링",textScore],["지시 정밀도",precision],["해상도(4K)",res]);
      if(x.quoted){
        good.push("따옴표 텍스트가 있어 4.5의 텍스트 렌더링 강점에 잘 맞아요");
        if(!x.fontSpec) tips.push("글꼴 스타일을 지정하세요 (예: bold sans-serif, elegant script)");
        if(!x.posSpec) tips.push("텍스트 위치를 지정하세요 (예: top center, upper third)");
        if(x.quotedWords>5) tips.push("이미지 속 텍스트는 3~5단어로 짧게 — 길면 깨질 수 있어요");
      } else if(x.textIntent){
        tips.push("글자를 넣으려면 정확한 텍스트를 \"따옴표\"로 감싸세요 (예: \"START FREE\")");
      }
      if(x.editIntent){
        good.push("편집 의도가 있어요 — 4.5는 편집에 최적입니다");
        if(!x.keepUnchanged) tips.push("편집 시 ‘바꿀 부분만’ 설명하고 ‘나머지는 그대로 유지’를 덧붙이세요");
        tips.push("편집은 원본 이미지를 image_urls로 업로드해야 처음부터 재생성되지 않아요");
      }
      if(!x.is4k) tips.push("4K가 필요하면 명시적으로 ‘4K’를 요청하세요 — 4.5는 고해상도에 맞춰 최적화합니다");
    }

    else { // 5.0 Lite
      const richness = clamp01(0.3 + x.wc/70);
      const logic = x.logic?1:0.3;
      const fact = x.factual ? (x.webSearch?1:0.4) : 0.7;
      const structure = x.structure?1:(x.subject?0.6:0.3);
      crit.push(["주제·시각 요소",x.subject?1:0.3],["논리적 관계",logic],["심층 디테일",richness],["구조·라벨",structure],["사실성·검색",fact],["스타일",x.style?1:0.4]);
      if(x.logic) good.push("논리적 관계 설명이 있어 5.0 Lite의 추론 능력에 잘 맞아요");
      else tips.push("5.0 Lite는 생성 전에 추론해요. 시각 요소뿐 아니라 논리적 관계를 설명하세요 (예: A→B→C로 이어지는 흐름)");
      if(x.wc<25) tips.push("5.0 Lite는 4.0과 달리 풍부한 지침이 유리해요. 더 자세히 설명해도 좋아요");
      else good.push("지침이 충분히 풍부해 심층 사고에 유리해요");
      if(x.factual && !x.webSearch) tips.push("실제 데이터·시사·통계가 포함되면 web_search: true를 켜세요 (생성 전 검색)");
      if(x.structure && !x.logic) tips.push("도표라면 구조와 데이터 간 관계(라벨·화살표·단계)를 명확히 설명하세요");
      if(!x.factual) good.push("창작 주제엔 web_search를 끄는 게 비용·속도에 유리해요");
    }

    // 모델 불문 품질 저하 요인
    if(x.minimalConflict){ pen+=0.1; tips.push("‘미니멀 + 장식 요소가 많은’처럼 모순된 지시를 피하세요"); }
    if(x.negatives>=2){ pen+=0.12; tips.push("원하지 않는 것 대신 원하는 것을 긍정적으로 묘사하세요"); }
    if(x.vagueSize){ pen+=0.08; tips.push("‘고해상도’ 대신 1K·2K·4K처럼 정확한 값을 쓰세요"); }

    const total=Math.max(0,Math.min(100,Math.round(clamp01(avgScore(crit)-pen)*100)));
    return { total, criteria:crit, good:good.slice(0,4), tips:tips.slice(0,5) };
  }

  function ringColor(s){ return s>=80?"#7fa86b":(s>=60?"var(--accent-bright)":(s>=40?"#cf935f":"#e08a6a")); }

  function runEval(){
    if(!evalResultEl) return;
    const text=(evalInput.value||"").trim();
    if(!text){
      evalResultEl.innerHTML='<div class="eval-empty">서랍 탭에서 단어를 조합하면 여기서 자동으로 평가돼요.<br>또는 위 칸에 직접 프롬프트를 붙여넣어 보세요.</div>';
      return;
    }
    const m=EVAL_MODELS.find(e=>e.id===evalModel)||EVAL_MODELS[0];
    const r=scoreModel(analyzePrompt(text), evalModel), col=ringColor(r.total);
    const critRows=r.criteria.map(([nm,v])=>`<div class="c"><span class="nm">${esc(nm)}</span><span class="bar"><i style="width:${Math.round(clamp01(v)*100)}%"></i></span></div>`).join("");
    const fb=[
      ...r.good.map(g=>`<div class="f good"><span class="ic">✓</span><span class="tx">${esc(g)}</span></div>`),
      ...r.tips.map(tp=>`<div class="f tip"><span class="ic">→</span><span class="tx">${esc(tp)}</span></div>`)
    ].join("");
    evalResultEl.innerHTML=
      '<div class="score">'+
        '<div class="ring" style="background:conic-gradient('+col+' 0 '+r.total+'%, var(--line) '+r.total+'% 100%)">'+
          '<span style="color:'+col+'">'+r.total+'<small>점</small></span>'+
        '</div>'+
        '<div class="crit">'+critRows+'</div>'+
      '</div>'+
      '<div class="mnote"><b>'+esc(m.label)+'</b> · '+esc(m.role)+'</div>'+
      '<div class="fb">'+fb+'</div>';
  }

  function renderEvalModels(){
    if(!evalModelsEl) return;
    evalModelsEl.innerHTML="";
    EVAL_MODELS.forEach(m=>{
      const b=document.createElement("button");b.type="button";b.className="mchip";
      b.setAttribute("aria-pressed",m.id===evalModel?"true":"false");b.textContent=m.label;
      b.addEventListener("click",()=>{evalModel=m.id;renderEvalModels();runEval();});
      evalModelsEl.appendChild(b);
    });
  }
  if(evalInput) evalInput.addEventListener("input",runEval);
  renderEvalModels();

  /* ---------- 시작 ---------- */
  (async function init(){
    library=loadLocal();renderAll();           // 캐시 즉시 표시
    if(!CONFIGURED){ setStatus("demo"); return; }
    if(!sb){ setStatus("liberr"); return; }
    try{ library=await sbList(); persistLocal(); renderAll(); setStatus("ok"); }
    catch(e){ console.error(e); setStatus("error"); }
  })();
})();
</script>
<script>
/* PWA: 오프라인 + 저장 영속성 (http/https에서만) */
(function(){
  try{ if(navigator.storage && navigator.storage.persist) navigator.storage.persist(); }catch(e){}
  if("serviceWorker" in navigator && location.protocol.indexOf("http")===0){
    window.addEventListener("load",function(){ navigator.serviceWorker.register("./sw.js").catch(function(){}); });
  }
})();
</script>
<script>
/* 테마 전환 (다크 기본 · 선택 기억) + 앱 설치 버튼 */
(function(){
  "use strict";
  var KEY="promptDrawer.theme", root=document.documentElement;
  function read(){try{return localStorage.getItem(KEY);}catch(e){return null;}}
  function write(v){try{localStorage.setItem(KEY,v);}catch(e){}}

  function apply(theme){
    if(theme==="light"){ root.setAttribute("data-theme","light"); }
    else{ root.removeAttribute("data-theme"); }
    var meta=document.querySelector('meta[name="theme-color"]');
    if(meta) meta.setAttribute("content", theme==="light" ? "#fbf8f3" : "#1a1815");
  }

  var theme = read()==="light" ? "light" : "dark";   // 저장값 없으면 다크 기본
  apply(theme);

  var toggle=document.getElementById("themeToggle");
  if(toggle) toggle.addEventListener("click",function(){
    theme = theme==="light" ? "dark" : "light";
    apply(theme); write(theme);
  });

  /* 앱 설치 (Windows/Android Chrome·Edge) — 설치 가능할 때만 버튼 노출 */
  var installBtn=document.getElementById("installBtn"), deferred=null;

  // 이미 설치된 앱(독립 창)으로 실행 중이면 설치 버튼을 절대 띄우지 않음
  function isInstalled(){
    return (window.matchMedia && window.matchMedia("(display-mode: standalone)").matches)
        || window.navigator.standalone === true;
  }
  function hideInstall(){ if(installBtn){ installBtn.hidden=true; } deferred=null; }
  // 이미 설치된 관련 앱이 있는지(브라우저 탭에서 본 경우)도 확인해 숨김
  function checkInstalledApps(){
    if(navigator.getInstalledRelatedApps){
      navigator.getInstalledRelatedApps().then(function(apps){
        if(apps && apps.length){ hideInstall(); }
      }).catch(function(){});
    }
  }

  if(isInstalled()){ hideInstall(); }
  checkInstalledApps();
  if(window.matchMedia){
    var mq=window.matchMedia("(display-mode: standalone)");
    (mq.addEventListener?mq.addEventListener.bind(mq,"change"):mq.addListener.bind(mq))(function(e){ if(e.matches) hideInstall(); });
  }

  window.addEventListener("beforeinstallprompt",function(e){
    e.preventDefault(); deferred=e;
    if(isInstalled()){ hideInstall(); return; }   // 설치된 상태면 무시
    if(installBtn) installBtn.hidden=false;
    checkInstalledApps();
  });
  if(installBtn) installBtn.addEventListener("click",function(){
    if(!deferred) return;
    installBtn.hidden=true;
    deferred.prompt();
    if(deferred.userChoice) deferred.userChoice.catch(function(){});
    deferred=null;
  });
  window.addEventListener("appinstalled",function(){ hideInstall(); });
})();
</script>
