<style>
  :root{
    --bg:#1a1815;--raise:#252220;--raise-2:#2e2a26;--line:#393430;--line-soft:#312d29;
    --tx:#ece6df;--tx-mut:#988f86;--tx-dim:#6b645e;
    --accent:#c2560b;--accent-bright:#e2710f;--accent-soft:#f0c39a;
    --accent-tint:rgba(194,86,11,.15);--accent-tint-2:rgba(194,86,11,.28);
    --radius:11px;--radius-sm:7px;
    --shadow:0 20px 56px -20px rgba(0,0,0,.72), 0 2px 8px -2px rgba(0,0,0,.5);
    font-synthesis-weight:none;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;background:radial-gradient(820px 460px at 18% -12%, #2a2622, transparent), #121110;
    font-family:"Pretendard Variable","Pretendard",-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Segoe UI","Malgun Gothic",system-ui,sans-serif;
    color:var(--tx);display:flex;align-items:flex-start;justify-content:center;padding:28px 16px 60px;-webkit-font-smoothing:antialiased;
  }
  .panel{width:380px;background:var(--bg);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);overflow:hidden;display:flex;flex-direction:column}

  .bar{display:flex;align-items:center;gap:8px;padding:9px 12px;background:linear-gradient(#211e1b,#1a1815);
    border-bottom:1px solid var(--line-soft);box-shadow:inset 0 1px 0 rgba(255,255,255,.025);user-select:none}
  .bar .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 3px var(--accent-tint)}
  .bar .name{font-size:12.5px;font-weight:650;letter-spacing:.2px}
  .bar .cloud{margin-left:auto;color:var(--tx-dim);display:flex;align-items:center;gap:4px;font-size:10px}
  .bar .cloud svg{width:12px;height:12px}
  .bar .cloud.ok{color:#7fa86b}

  .status{font-size:10.5px;font-weight:600;text-align:center;padding:6px 10px;border-bottom:1px solid var(--line-soft);line-height:1.4}
  .status.demo{color:#cf935f;background:rgba(194,86,11,.08)}
  .status.error{color:#e08a6a;background:rgba(180,60,40,.1)}

  .body{padding:12px}

  .add-row{display:flex;gap:7px;margin-bottom:13px}
  .add-row input{flex:1;min-width:0;background:#1c1a17;color:var(--tx);border:1px solid var(--line);
    border-radius:var(--radius-sm);padding:9px 11px;font:inherit;font-size:12.5px}
  .add-row input::placeholder{color:var(--tx-dim)}
  .add-row input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-tint)}
  .add-btn{flex:none;appearance:none;font:inherit;font-size:12px;font-weight:700;border-radius:var(--radius-sm);
    padding:0 14px;cursor:pointer;border:1px solid var(--accent);background:var(--accent);color:#fff;
    display:inline-flex;align-items:center;gap:5px;transition:background .15s,transform .05s}
  .add-btn:hover{background:var(--accent-bright);border-color:var(--accent-bright)}
  .add-btn:active{transform:translateY(1px)}
  .add-btn:focus-visible{outline:2px solid var(--accent-bright);outline-offset:2px}
  .add-btn .p{font-size:14px;font-weight:800;line-height:1}

  /* 분리 결과 (선택 후 저장) */
  .parsed{margin:-2px 0 13px;border:1px solid var(--line-soft);border-radius:var(--radius);background:var(--raise);padding:10px}
  .parsed-head{display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .seg-label{font-size:10px;color:var(--tx-dim);font-weight:600;text-transform:uppercase;letter-spacing:.6px}
  .link{margin-left:auto;appearance:none;border:0;background:none;color:var(--tx-mut);font:inherit;font-size:11px;font-weight:600;cursor:pointer;padding:2px 6px;border-radius:5px}
  .link:hover{color:var(--accent-soft);background:var(--raise-2)}
  .tokens{display:flex;flex-wrap:wrap;gap:6px}
  .tok{display:inline-flex;align-items:baseline;gap:5px;background:var(--bg);border:1.5px solid transparent;border-radius:8px;padding:5px 9px;cursor:pointer;font-size:12px;color:var(--tx);position:relative;transition:border-color .12s,background .12s,transform .12s}
  .tok .en{font-weight:600}
  .tok .ko{font-size:11px;color:var(--tx-mut)}
  .tok .ko.empty{color:var(--tx-dim);font-style:italic}
  .tok .flag{position:absolute;top:-9px;right:-6px;background:var(--accent);color:#fff;font-size:9px;font-weight:700;padding:2px 5px;border-radius:5px;opacity:0;transform:translateY(3px);transition:.12s;pointer-events:none;white-space:nowrap}
  .tok:hover{border-color:var(--accent);background:var(--accent-tint)}
  .tok:hover .flag{opacity:1;transform:translateY(0)}
  .tok.sel{border-color:var(--accent);background:var(--accent-tint-2);color:var(--accent-soft)}
  .tok.sel .flag{opacity:1;transform:translateY(0)}
  .tok.exists{opacity:.4;cursor:default;border-color:var(--line-soft);background:transparent}
  .tok.exists .flag{opacity:1;transform:translateY(0);background:var(--raise-2);color:var(--tx-dim)}
  .parsed-foot{display:flex;align-items:center;justify-content:flex-end;gap:8px;margin-top:10px}

  .btn{appearance:none;font:inherit;font-size:12px;font-weight:650;border-radius:8px;padding:7px 13px;cursor:pointer;
    border:1px solid var(--line);background:var(--raise-2);color:var(--tx);transition:border-color .15s,background .15s,transform .05s}
  .btn:hover{border-color:#4a443d;background:#363129}
  .btn:active{transform:translateY(1px)}
  .btn.ghost{background:none;border-color:transparent;color:var(--tx-mut);padding:7px 9px}
  .btn.ghost:hover{color:var(--tx);background:var(--raise)}
  .btn:focus-visible{outline:2px solid var(--accent-bright);outline-offset:2px}

  .chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:11px}
  .chip{appearance:none;font:inherit;font-size:11px;font-weight:600;flex:none;border:1px solid var(--line);
    background:var(--raise);color:var(--tx-mut);border-radius:999px;padding:4px 11px;cursor:pointer;
    transition:.13s;display:inline-flex;align-items:center;gap:5px}
  .chip:hover{color:var(--tx);border-color:#4a443d}
  .chip[aria-pressed="true"]{background:var(--accent-tint);border-color:var(--accent);color:var(--accent-soft)}
  .chip .n{font-size:10px;color:var(--tx-dim)}
  .chip[aria-pressed="true"] .n{color:#cf935f}
  .chip.clear{color:var(--tx-dim);border-style:dashed}

  .search{display:flex;align-items:center;gap:7px;background:#1c1a17;border:1px solid var(--line);
    border-radius:var(--radius-sm);padding:6px 9px;margin-bottom:9px}
  .search svg{width:13px;height:13px;color:var(--tx-dim);flex:none}
  .search input{flex:1;background:none;border:0;color:var(--tx);font:inherit;font-size:12px;outline:none}
  .search input::placeholder{color:var(--tx-dim)}
  .search .x{appearance:none;border:0;background:none;color:var(--tx-dim);cursor:pointer;font-size:14px;line-height:1;padding:0 2px}
  .search .x:hover{color:var(--tx)}

  .lib-head{font-size:10px;color:var(--tx-dim);font-weight:600;text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px}
  .lib{display:flex;flex-direction:column;gap:2px;max-height:300px;overflow:auto;margin:0 -4px;padding:0 4px}
  .lib::-webkit-scrollbar{width:8px}
  .lib::-webkit-scrollbar-thumb{background:#352f2a;border-radius:8px;border:2px solid var(--bg)}

  .row{display:flex;align-items:center;gap:9px;padding:7px 8px;border-radius:8px;cursor:pointer;border:1px solid transparent;transition:background .12s,border-color .12s}
  .row:hover{background:var(--raise);border-color:var(--line-soft)}
  .row:focus-visible{outline:2px solid var(--accent-bright);outline-offset:-1px}
  .row.in{background:var(--accent-tint);border-color:rgba(194,86,11,.35)}
  .row.flash{background:var(--accent-tint-2)}
  .ind{width:13px;height:13px;border-radius:50%;border:1.6px solid var(--line);flex:none;transition:.12s}
  .row:hover .ind{border-color:#5a534b}
  .row.in .ind{background:var(--accent);border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-tint)}
  .label{font-size:13px;font-weight:600;color:var(--tx);flex:0 1 auto;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .label.untrans{font-style:italic;color:var(--tx-mut);font-weight:500}
  .label[contenteditable="true"]{outline:none;background:#1c1a17;border:1px solid var(--accent);border-radius:5px;padding:1px 5px;cursor:text;font-style:normal;color:var(--tx)}
  .cat{font-size:9.5px;font-weight:600;color:var(--tx-mut);background:var(--raise-2);border:1px solid var(--line-soft);padding:2px 7px;border-radius:999px;flex:none}
  .cnt{margin-left:auto;font-size:10.5px;color:var(--tx-dim);font-weight:600;font-variant-numeric:tabular-nums;flex:none}
  .cnt.zero{display:none}
  .kebab{margin-left:6px;appearance:none;border:0;background:none;color:var(--tx-dim);cursor:pointer;width:22px;height:22px;border-radius:6px;display:grid;place-items:center;flex:none;opacity:0;transition:opacity .12s}
  .row:hover .kebab,.row:focus-within .kebab{opacity:1}
  .kebab:hover{background:var(--raise-2);color:var(--tx)}
  .kebab svg{width:14px;height:14px}
  .row .cnt.zero + .kebab{margin-left:auto}

  .menu{position:absolute;z-index:40;background:var(--raise);border:1px solid var(--line);border-radius:10px;padding:5px;box-shadow:var(--shadow);width:172px}
  .menu .mi{appearance:none;border:0;background:none;color:var(--tx-mut);font:inherit;font-size:11.5px;text-align:left;width:100%;padding:7px 9px;border-radius:6px;cursor:pointer;display:flex;align-items:center;gap:8px}
  .menu .mi svg{width:13px;height:13px}
  .menu .mi:hover{background:var(--raise-2);color:var(--tx)}
  .menu .mi.danger:hover{color:var(--accent-bright)}
  .menu .sep{height:1px;background:var(--line-soft);margin:5px 4px}
  .menu .mlabel{font-size:9.5px;color:var(--tx-dim);font-weight:600;text-transform:uppercase;letter-spacing:.5px;padding:2px 6px 5px}
  .menu .catgrid{display:flex;flex-wrap:wrap;gap:4px;padding:0 4px 3px}
  .menu .catgrid button{appearance:none;border:1px solid var(--line);background:var(--bg);color:var(--tx-mut);font:inherit;font-size:10px;font-weight:600;padding:3px 8px;border-radius:999px;cursor:pointer}
  .menu .catgrid button:hover{border-color:#4a443d;color:var(--tx)}
  .menu .catgrid button[aria-current="true"]{background:var(--accent-tint);border-color:var(--accent);color:var(--accent-soft)}

  .empty{text-align:center;padding:24px 16px;color:var(--tx-dim);border:1px dashed var(--line-soft);border-radius:var(--radius)}
  .empty .big{font-size:23px;margin-bottom:8px;opacity:.8}
  .empty p{margin:0;font-size:12px;line-height:1.6}
  .empty b{color:var(--accent-soft);font-weight:600}

  .compose{border-top:1px solid var(--line-soft);background:linear-gradient(#1d1b18,#1a1815);padding:10px 12px}
  .compose-top{display:flex;align-items:center;gap:8px}
  .compose-top .t{font-size:10px;font-weight:700;color:var(--tx-mut);text-transform:uppercase;letter-spacing:.6px}
  .compose-top .c{font-size:10.5px;color:var(--tx-dim);font-variant-numeric:tabular-nums}
  .compose-top .acts{margin-left:auto;display:flex;gap:4px}
  .compose-box{background:#161310;border:1px solid var(--line);border-radius:var(--radius-sm);padding:8px 10px;min-height:34px;font-size:12px;line-height:1.55;color:var(--tx);word-break:break-word;margin-top:7px}
  .compose-box .comma{color:var(--tx-dim)}
  .compose.is-empty .acts,.compose.is-empty .compose-box{display:none}
  .compose.is-empty .c{color:var(--tx-dim)}

  .toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(8px);background:#2e2a26;border:1px solid var(--line);color:var(--tx);font-size:12px;font-weight:600;padding:8px 14px;border-radius:9px;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:.2s;z-index:60}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
  <div class="panel" role="application" aria-label="프롬프트 서랍">

    </div>

    <div class="status" id="status" hidden></div>

    <div class="body">
      <div class="add-row">
        <input id="input" type="text" placeholder="프롬프트 입력 · 비우면 클립보드" autocomplete="off">

      <div class="parsed" id="parsedWrap" hidden>

          <button class="link" id="selectAll">전체</button>

        <div class="tokens" id="tokens"></div>
        <div class="parsed-foot">
          <button class="btn ghost" id="cancelParse">취소</button>
          <button class="add-btn" id="saveBtn"><span class="p">↓</span>저장 <span id="saveN"></span></button>

      </div>

      <div class="chips" id="chips"></div>

      <div class="search" id="searchBox" hidden>

      <div class="lib-head">내 단어</div>
      <div class="lib" id="lib"></div>
    </div>

    <div class="compose is-empty" id="compose">
      <div class="compose-top">
        <span class="t">조합</span>
        <span class="c" id="composeCount"></span>
        <span class="acts">
          <button class="btn ghost" id="clearCompose">비우기</button>
          <button class="btn" id="copyCompose">복사</button>
        </span>
      </div>
      <div class="compose-box" id="composeBox"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

    "watercolor":"수채화","sketch":"스케치","pixel art":"픽셀 아트","concept art":"컨셉 아트","3d render":"3D 렌더",
    "octane render":"옥테인 렌더","unreal engine":"언리얼 엔진","studio ghibli":"지브리풍","film grain":"필름 그레인",
    "moody":"무드 있는","dreamy":"몽환적인","serene":"고요한","peaceful":"평화로운","dramatic":"극적인",
    "melancholic":"우울한","cozy":"아늑한","epic":"웅장한","vibrant":"생동감 있는","ethereal":"신비로운",
    "dark atmosphere":"어두운 분위기","warm tones":"따뜻한 톤","cool tones":"차가운 톤",
    "masterpiece":"마스터피스","best quality":"최고 품질","high quality":"고품질","highly detailed":"매우 디테일한",
    "detailed":"디테일한","8k":"8K","4k":"4K","ultra detailed":"초정밀","sharp focus":"선명한 초점","trending":"인기"
  };
  const CAT_RULES=[
    ["인물",["woman","man","girl","boy","female","male","person","people","child","baby","lady","model","portrait","hair","eyes","face","skin","lips","freckles","beard","smile","expression","wearing","dress","shirt","jacket","suit","outfit","clothes","uniform"]],
    ["포즈",["pose","posing","sitting","standing","running","walking","lying","jumping","dancing","crossed arms","hands in","hands on","from behind","looking back","leaning","kneeling"]],
    ["장소·배경",["forest","city","street","room","bedroom","beach","mountain","sky","field","garden","indoor","outdoor","background","landscape","cafe","desert","ocean","sea","library","rooftop","snow","rain","fog","autumn","winter","spring","building","interior"]],
    ["조명",["light","lighting","sunlight","shadow","golden hour","backlight","rim light","soft light","hard light","neon","glow","candle","moonlight","volumetric","luminous"]],
    ["카메라·구도",["shot","angle","lens","mm","close-up","closeup","close up","wide","depth of field","bokeh","macro","aerial","fisheye","full body","upper body","headshot","framing","composition","f/","iso","focal"]],
    ["스타일",["style","painting","anime","realistic","photorealistic","cinematic","render","3d","illustration","watercolor","oil","sketch","pixel","concept art","by ","artstation","unreal","octane","ghibli","grain","aesthetic"]],
    ["분위기",["mood","atmosphere","serene","dramatic","moody","dreamy","melancholic","cozy","epic","peaceful","vibrant","ethereal","tones","warm","cool","calm"]]
  ];
  function guessCat(en){const s=en.toLowerCase();for(const[c,keys]of CAT_RULES)for(const k of keys)if(s.indexOf(k)!==-1)return c;return"기타";}
  function translate(en){return DICT[en.toLowerCase().trim()]||"";}

  let library=[], activeCats=new Set(), compose=[], query="";
  const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
  const $=s=>document.querySelector(s);

  const input=$("#input"),splitBtn=$("#splitBtn");
  const tokensEl=$("#tokens"),parsedWrap=$("#parsedWrap"),saveN=$("#saveN");
  const selectAllBtn=$("#selectAll"),cancelBtn=$("#cancelParse"),saveBtn=$("#saveBtn");
  let parsed=[];
  const chipsEl=$("#chips"),libEl=$("#lib");
  const searchBox=$("#searchBox"),searchInput=$("#searchInput"),searchClear=$("#searchClear");
  const composeEl=$("#compose"),composeBox=$("#composeBox"),composeCount=$("#composeCount");
  const statusEl=$("#status"),cloudEl=$("#cloud"),cloudTxt=$("#cloudTxt");
  const toastEl=$("#toast");let toastTimer;
  function toast(m){toastEl.textContent=m;toastEl.classList.add("show");clearTimeout(toastTimer);toastTimer=setTimeout(()=>toastEl.classList.remove("show"),1500);}

  function setStatus(kind){
    if(kind==="ok"){statusEl.hidden=true;cloudEl.hidden=false;cloudEl.className="cloud ok";cloudTxt.textContent="동기화됨";return;}
    cloudEl.hidden=true;statusEl.hidden=false;
    statusEl.className="status "+(kind==="demo"?"demo":"error");
    statusEl.textContent =
      kind==="demo"  ? "로컬 모드 · Supabase 키를 넣으면 클라우드에 저장돼요" :
      kind==="liberr"? "Supabase 라이브러리를 못 불러왔어요 · 로컬로 동작 중" :
                       "연결 오류 · 로컬에 저장된 내용만 표시 중";
  }

  /* ---------- Supabase 데이터 헬퍼 ---------- */
  async function sbList(){
    const {data,error}=await sb.from("words").select("*");
    if(error) throw error;
    return data.map(d=>({id:d.id,en:d.en,ko:d.ko||"",cat:d.cat||"기타",count:d.count||0,created:d.created_at?Date.parse(d.created_at):Date.now()}));
  }
  async function sbInsert(rows){ if(!sb)return; const {error}=await sb.from("words").insert(rows.map(r=>({id:r.id,en:r.en,ko:r.ko,cat:r.cat,count:r.count}))); if(error) throw error; }
  async function sbUpdate(id,patch){ if(!sb)return; const {error}=await sb.from("words").update(patch).eq("id",id); if(error) throw error; }
  async function sbDelete(id){ if(!sb)return; const {error}=await sb.from("words").delete().eq("id",id); if(error) throw error; }
  async function refresh(){ if(!sb)return; try{library=await sbList();persistLocal();renderAll();}catch(e){console.error(e);} }

  /* ---------- 분리 → 선택 → 저장 ---------- */
  splitBtn.addEventListener("click",splitPrompt);
  input.addEventListener("keydown",e=>{if(e.key==="Enter"){e.preventDefault();splitPrompt();}});
  selectAllBtn.addEventListener("click",()=>{
    const sel=parsed.filter(p=>!p.exists);
    const all=sel.length&&sel.every(p=>p.sel);
    sel.forEach(p=>p.sel=!all);
    renderParsed();
  });
  cancelBtn.addEventListener("click",()=>{ parsed=[]; parsedWrap.hidden=true; tokensEl.innerHTML=""; });
  saveBtn.addEventListener("click",saveSelected);

  async function splitPrompt(){
    let src=input.value.trim(), fromClip=false;
    if(!src){
      fromClip=true;
      if(!navigator.clipboard||!navigator.clipboard.readText){toast("이 브라우저에선 클립보드를 못 읽어요 · 입력칸을 써주세요");return;}
      try{ src=((await navigator.clipboard.readText())||"").trim(); }
      catch(e){ toast("클립보드를 읽지 못했어요 · 입력칸에 붙여넣어 주세요"); return; }
      if(!src){ toast("클립보드가 비어 있어요"); return; }
    }
    const segs=src.split(/[,.\n]+/).map(s=>s.trim()).filter(Boolean);
    const seen=new Set(); parsed=[];
    for(const s of segs){ const k=s.toLowerCase(); if(seen.has(k))continue; seen.add(k);
      parsed.push({en:s, ko:translate(s), exists:library.some(x=>x.en.toLowerCase()===k), sel:false});
    }
    if(!parsed.length){ toast("끊을 내용이 없어요"); return; }
    input.value="";
    renderParsed();
  }

  function renderParsed(){
    parsedWrap.hidden=false; tokensEl.innerHTML="";
    parsed.forEach(p=>{
      const t=document.createElement("button"); t.type="button";
      t.className="tok"+(p.exists?" exists":"")+(p.sel?" sel":"");
      t.innerHTML='<span class="en"></span><span class="ko '+(p.ko?'':'empty')+'"></span><span class="flag"></span>';
      t.querySelector(".en").textContent=p.en;
      t.querySelector(".ko").textContent=p.ko?`(${p.ko})`:"(번역 없음)";
      t.querySelector(".flag").textContent=p.exists?"이미 있음":(p.sel?"선택됨":"+ 선택");
      if(!p.exists) t.addEventListener("click",()=>{p.sel=!p.sel;renderParsed();});
      tokensEl.appendChild(t);
    });
    const n=parsed.filter(p=>p.sel&&!p.exists).length;
    saveN.textContent=n?"("+n+")":"";
  }

  async function saveSelected(){
    const chosen=parsed.filter(p=>p.sel&&!p.exists);
    if(!chosen.length){ toast("선택된 단어가 없어요"); return; }
    const fresh=chosen.map(p=>({id:uid(),en:p.en,ko:p.ko,cat:guessCat(p.en),count:0,created:Date.now()}));
    library.push(...fresh); persistLocal();
    parsed=[]; parsedWrap.hidden=true; tokensEl.innerHTML="";
    renderAll();
    toast("저장되었습니다! "+(fresh.length>1?"("+fresh.length+"개)":""));
    try{ await sbInsert(fresh); }catch(e){ console.error(e); toast("클라우드 저장 실패 · 다시 동기화합니다"); refresh(); }
  }

  /* ---------- 칩 ---------- */
  function catCounts(){const c={};CATS.forEach(x=>c[x]=0);library.forEach(x=>{if(c[x.cat]!=null)c[x.cat]++;});return c;}
  function renderChips(){
    const counts=catCounts();chipsEl.innerHTML="";
    CATS.forEach(c=>{
      const b=document.createElement("button");b.className="chip";b.type="button";
      b.setAttribute("aria-pressed",activeCats.has(c)?"true":"false");
      b.innerHTML=`${c}<span class="n">${counts[c]||0}</span>`;
      b.addEventListener("click",()=>{activeCats.has(c)?activeCats.delete(c):activeCats.add(c);renderChips();renderLib();});
      chipsEl.appendChild(b);
    });
    if(activeCats.size){
      const clr=document.createElement("button");clr.className="chip clear";clr.type="button";clr.textContent="전체";
      clr.addEventListener("click",()=>{activeCats.clear();renderChips();renderLib();});chipsEl.appendChild(clr);
    }
  }

  /* ---------- 검색 ---------- */
  searchInput.addEventListener("input",()=>{query=searchInput.value.trim().toLowerCase();searchClear.hidden=!query;renderLib();});
  searchInput.addEventListener("keydown",e=>{if(e.key==="Escape"){searchInput.value="";query="";searchClear.hidden=true;renderLib();}});
  searchClear.addEventListener("click",()=>{searchInput.value="";query="";searchClear.hidden=true;renderLib();searchInput.focus();});

  /* ---------- 라이브러리 ---------- */
  function visible(){
    let items=library.slice();
    if(activeCats.size)items=items.filter(x=>activeCats.has(x.cat));
    if(query)items=items.filter(x=>(x.ko||"").toLowerCase().includes(query)||x.en.toLowerCase().includes(query));
    items.sort((a,b)=>b.count-a.count||b.created-a.created);
    return items;
  }
  function renderLib(){
    searchBox.hidden=library.length<SEARCH_THRESHOLD;
    if(library.length<SEARCH_THRESHOLD&&query){query="";searchInput.value="";searchClear.hidden=true;}
    const items=visible();libEl.innerHTML="";
    if(!library.length){
      libEl.innerHTML='<div class="empty"><div class="big">🗄️</div><p>아직 저장된 단어가 없어요.<br>입력하거나 복사한 뒤 <b>추가</b>를 누르세요.</p></div>';
      return;
    }
    if(!items.length){
      libEl.innerHTML='<div class="empty"><p>'+(query?"검색 결과가 없어요.":"이 분류엔 단어가 없어요.")+'</p></div>';return;
    }
    items.forEach(item=>{
      const inComp=compose.some(c=>c.id===item.id);
      const untrans=!(item.ko&&item.ko.trim());
      const row=document.createElement("div");
      row.className="row"+(inComp?" in":"");row.dataset.id=item.id;row.tabIndex=0;row.setAttribute("role","button");
      row.innerHTML=
        '<span class="ind"></span>'+
        '<span class="label '+(untrans?'untrans':'')+'"></span>'+
        '<span class="cat">'+item.cat+'</span>'+
        '<span class="cnt '+(item.count?'':'zero')+'">'+item.count+'</span>'+
        '<button class="kebab" aria-label="더보기"><svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="1.6"/><circle cx="12" cy="12" r="1.6"/><circle cx="12" cy="19" r="1.6"/></svg></button>';
      const labelEl=row.querySelector(".label");labelEl.textContent=untrans?item.en:item.ko;
      row.addEventListener("click",e=>{if(e.target.closest(".kebab")||labelEl.isContentEditable)return;toggleCompose(item.id);});
      row.addEventListener("keydown",e=>{if((e.key==="Enter"||e.key===" ")&&!labelEl.isContentEditable){e.preventDefault();toggleCompose(item.id);}});
      labelEl.addEventListener("dblclick",e=>{e.stopPropagation();editKo(labelEl,item);});
      row.querySelector(".kebab").addEventListener("click",e=>{e.stopPropagation();openMenu(e.currentTarget,labelEl,item);});
      libEl.appendChild(row);
    });
  }
  function flashRow(id){const r=libEl.querySelector('.row[data-id="'+id+'"]');if(r){r.classList.add("flash");setTimeout(()=>r.classList.remove("flash"),420);}}

  function editKo(labelEl,item){
    labelEl.classList.remove("untrans");labelEl.textContent=item.ko||"";labelEl.setAttribute("contenteditable","true");labelEl.focus();
    const rg=document.createRange();rg.selectNodeContents(labelEl);const sel=getSelection();sel.removeAllRanges();sel.addRange(rg);
    const commit=()=>{labelEl.removeAttribute("contenteditable");const v=labelEl.textContent.trim();if(v!==item.ko){item.ko=v;persistLocal();renderLib();sbUpdate(item.id,{ko:v}).catch(e=>{console.error(e);toast("수정 동기화 실패");refresh();});}else{renderLib();}};
    labelEl.addEventListener("blur",commit,{once:true});
    labelEl.addEventListener("keydown",e=>{if(e.key==="Enter"){e.preventDefault();labelEl.blur();}if(e.key==="Escape"){labelEl.textContent=item.ko||"";labelEl.blur();}});
  }

  let menuEl=null;
  function closeMenu(){if(menuEl){menuEl.remove();menuEl=null;}}
  function openMenu(anchor,labelEl,item){
    closeMenu();
    const m=document.createElement("div");m.className="menu";
    m.innerHTML=
      '<button class="mi" data-a="edit"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/></svg>번역 수정</button>'+
      '<button class="mi danger" data-a="del"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/></svg>삭제</button>'+
      '<div class="sep"></div><div class="mlabel">분류</div><div class="catgrid"></div>';
    const grid=m.querySelector(".catgrid");
    CATS.forEach(c=>{const b=document.createElement("button");b.type="button";b.textContent=c;if(c===item.cat)b.setAttribute("aria-current","true");
      b.addEventListener("click",()=>{if(item.cat!==c){item.cat=c;persistLocal();sbUpdate(item.id,{cat:c}).catch(e=>{console.error(e);toast("동기화 실패");refresh();});}closeMenu();renderChips();renderLib();});grid.appendChild(b);});
    m.querySelector('[data-a="edit"]').addEventListener("click",()=>{closeMenu();editKo(labelEl,item);});
    m.querySelector('[data-a="del"]').addEventListener("click",()=>{
      library=library.filter(x=>x.id!==item.id);compose=compose.filter(c=>c.id!==item.id);persistLocal();closeMenu();renderAll();
      sbDelete(item.id).catch(e=>{console.error(e);toast("삭제 동기화 실패");refresh();});
    });
    document.body.appendChild(m);
    menuEl=m;
    const r=anchor.getBoundingClientRect();
    m.style.top=(r.bottom+6+scrollY)+"px";
    m.style.left=Math.min(r.right-172+scrollX,innerWidth-180)+"px";
    setTimeout(()=>document.addEventListener("click",closeMenu,{once:true}),0);
  }

  /* ---------- 조합 ---------- */
  function toggleCompose(id){
    const i=compose.findIndex(c=>c.id===id);
    if(i>=0){compose.splice(i,1);renderChips();renderLib();renderCompose();}
    else{
      const item=library.find(x=>x.id===id);if(!item)return;
      item.count++;persistLocal();compose.push({id,en:item.en});
      renderChips();renderLib();renderCompose();flashRow(id);
      sbUpdate(id,{count:item.count}).catch(e=>{console.error(e);});
    }
  }
  function renderCompose(){
    composeBox.innerHTML="";
    compose.forEach((c,i)=>{
      const seg=document.createElement("span");seg.textContent=c.en;composeBox.appendChild(seg);
      if(i<compose.length-1){const cm=document.createElement("span");cm.className="comma";cm.textContent=", ";composeBox.appendChild(cm);}
    });
    if(compose.length){composeEl.classList.remove("is-empty");composeCount.textContent=compose.length+"개";}
    else{composeEl.classList.add("is-empty");composeCount.textContent="단어를 눌러 담기";}
  }
  $("#clearCompose").addEventListener("click",()=>{compose=[];renderLib();renderCompose();});
  $("#copyCompose").addEventListener("click",()=>{
    const text=compose.map(c=>c.en).join(", ");
    if(!text){toast("담긴 단어가 없어요");return;}
    const done=()=>toast("복사됨 · "+compose.length+"개");
    if(navigator.clipboard&&navigator.clipboard.writeText)navigator.clipboard.writeText(text).then(done,fb);else fb();
    function fb(){const t=document.createElement("textarea");t.value=text;document.body.appendChild(t);t.select();try{document.execCommand("copy");done();}catch(e){toast("복사 실패");}t.remove();}
  });

  function renderAll(){renderChips();renderLib();renderCompose();}

  /* ---------- 시작 ---------- */
  (async function init(){
    library=loadLocal();renderAll();           // 캐시 즉시 표시
    if(!CONFIGURED){ setStatus("demo"); return; }
    if(!sb){ setStatus("liberr"); return; }
    try{ library=await sbList(); persistLocal(); renderAll(); setStatus("ok"); }
    catch(e){ console.error(e); setStatus("error"); }
  })();
})();
</script>
<script>
/* 예전 서비스워커/캐시 제거 (옛날 config 캐시 때문에 연결 안 되던 문제 해결) */
(function(){
  if("serviceWorker" in navigator){
    navigator.serviceWorker.getRegistrations().then(function(rs){ rs.forEach(function(r){ r.unregister(); }); }).catch(function(){});
  }
  if(window.caches && caches.keys){
    caches.keys().then(function(ks){ ks.forEach(function(k){ caches.delete(k); }); }).catch(function(){});
  }
})();
</script>
</body>
</html>
