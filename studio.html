<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>프롬프트 스튜디오</title>
<meta name="theme-color" content="#fcfbf9">
<link rel="apple-touch-icon" href="./icon-192.png">
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<script>try{if(localStorage.getItem("promptDrawer.theme")==="dark")document.documentElement.setAttribute("data-theme","dark");}catch(e){}</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./config.js"></script>
<style>
  /* 프롬프트 스튜디오 v7 — 담백·미니멀·무테두리(plane 분리) · 단일 강조색 · 조합=단 하나의 차콜 패널
     핵심: 단어가 화면을 가장 많이 차지하도록 크롬은 조밀하게, 그리드는 풀폭 */
  :root{
    --bg:#f4f4f2; --surface:#fbfbfa; --raised:#ffffff; --surface-2:#f0f0ee; --hover:#ebebe8; --selected:#e6e7e2;
    --track:rgba(38,38,42,.10); --track-2:rgba(38,38,42,.15);
    --ink:#26262a; --ink-soft:#62636a; --ink-faint:#9a9ba1;
    --accent:#4f5fe6; --accent-press:#3f4ed0; --accent-tint:#eef0fd; --accent-tint-2:#e2e6fb; --accent-ring:rgba(79,95,230,.30);
    --amber:#b9871f; --amber-tint:#f6ecd8;
    /* 조합 = 단 하나의 차콜 포컬 트레이(6:3:1의 1) */
    --out:#1b1b1f; --out-2:#252529; --out-tx:#ededee; --out-soft:#9c9da4; --out-line:#2e2e33;
    --out-accent:#9aa6ff; --neg:#d98a82;
    --toast-bg:#1c1b1a; --toast-tx:#fff;
    --ui:"Pretendard Variable",Pretendard,-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Segoe UI",system-ui,sans-serif;
    --mono:ui-monospace,SFMono-Regular,"SF Mono",Menlo,"Cascadia Code","Roboto Mono",monospace;
    --r:12px; --r-sm:8px; --r-pill:999px; --side-w:248px; --ctl:30px;
    --sh-rest:0 1px 2px rgba(28,27,26,.05), 0 1px 1px rgba(28,27,26,.03);
    --sh-lift:0 6px 18px -8px rgba(28,27,26,.16), 0 2px 6px -4px rgba(28,27,26,.10);
    --sh-pop:0 12px 32px -10px rgba(28,27,26,.26);
    --sh-out:0 -8px 28px rgba(20,20,24,.16);
    font-synthesis-weight:none;
  }
  :root[data-theme="dark"]{
    --bg:#131316; --surface:#1b1b20; --surface-2:#202026; --hover:#26262d;
    --hairline:rgba(255,255,255,.07); --hairline-2:rgba(255,255,255,.12);
    --ink:#ececef; --ink-soft:#a4a2ab; --ink-faint:#6f6e78;
    --accent:#8b84ff; --accent-press:#a39dff; --accent-tint:#23213a; --accent-tint-2:#2c2947; --accent-ring:rgba(139,132,255,.4);
    --amber:#dcab63; --amber-tint:#2a2110;
    --out:#0e0e12; --out-2:#1a1a20; --out-tx:#ececef; --out-soft:#8a8993; --out-line:rgba(255,255,255,.08); --out-accent:#a7a0ff; --neg:#e79b91;
    --toast-bg:#26262c; --toast-tx:#ececef;
    --sh-rest:0 1px 2px rgba(0,0,0,.4); --sh-lift:0 8px 20px -8px rgba(0,0,0,.6); --sh-pop:0 14px 34px -10px rgba(0,0,0,.7); --sh-out:0 10px 28px -12px rgba(0,0,0,.7);
  }
  *{box-sizing:border-box}
  [hidden]{display:none!important}
  html,body{height:100%}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--ui);font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased;transition:background .25s,color .25s}
  ::selection{background:var(--accent-tint-2);color:var(--ink)}
  button{font-family:inherit;border:0;background:none;-webkit-appearance:none;appearance:none}
  input,textarea{border:0;-webkit-appearance:none;appearance:none}
  .app{display:flex;align-items:flex-start;min-height:100vh}

  /* ── 사이드바: plane 톤 분리(테두리 대신 hairline seam 하나) ── */
  .side{position:sticky;top:0;align-self:stretch;width:var(--side-w);flex:none;height:100vh;overflow:auto;background:var(--surface-2);display:flex;flex-direction:column;gap:3px;padding:18px 14px 14px}
  .brandrow{display:flex;align-items:center;gap:8px;margin:0 6px 18px}
  .brand{display:flex;align-items:center;gap:9px;font-size:13.5px;font-weight:750;letter-spacing:-.02em;white-space:nowrap}
  .brand::before{content:"";width:9px;height:9px;border-radius:3px;background:var(--accent);flex:none}
  .brandrow .icon-btn{margin-left:auto}
  .icon-btn{appearance:none;border:0;background:none;color:var(--ink-faint);cursor:pointer;border-radius:var(--r-sm);padding:7px;display:inline-flex;align-items:center;transition:.14s}
  .icon-btn:hover{color:var(--ink);background:var(--hover)}.icon-btn svg{width:15px;height:15px}
  .nav{display:flex;flex-direction:column;gap:2px;margin-bottom:4px}
  .nav-item{appearance:none;border:0;background:none;text-align:left;font:inherit;font-size:13px;font-weight:600;color:var(--ink-soft);padding:8px 10px;border-radius:var(--r-sm);cursor:pointer;display:flex;align-items:center;gap:10px;transition:.12s}
  .nav-item:hover{background:var(--hover);color:var(--ink)}
  .nav-item.active{background:var(--selected);color:var(--ink);font-weight:700}
  .nav-item.active .ic{color:var(--ink)}
  .nav-item .ic{width:15px;height:15px;flex:none;color:var(--ink-faint)}
  .side-sep{height:12px}
  .side-label{font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);margin:0 8px 8px}
  .presets{display:flex;flex-direction:column;gap:1px}
  .pchip{appearance:none;display:flex;align-items:center;gap:9px;width:100%;border:0;background:none;color:var(--ink);border-radius:var(--r-sm);padding:7px 10px;font:inherit;font-size:12px;font-weight:600;cursor:pointer;text-align:left;transition:.12s}
  .pchip::before{content:"";flex:none;width:6px;height:6px;border-radius:50%;background:var(--ink-faint);opacity:.45}
  .pchip:hover{background:var(--hover)}
  .pchip .pl{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .pchip .pn{flex:none;font-size:9.5px;font-variant-numeric:tabular-nums;color:var(--ink-faint)}
  .pchip.rec{color:var(--amber);background:var(--amber-tint)}.pchip.rec::before{background:var(--amber);opacity:1}.pchip.rec .pn{color:var(--amber)}
  .pchip.applied{color:var(--accent);background:var(--accent-tint)}.pchip.applied::before{background:var(--accent);opacity:1}.pchip.applied .pn{color:var(--accent)}
  .pchip .pdel{flex:none;appearance:none;border:0;background:none;color:inherit;opacity:0;cursor:pointer;padding:0;width:16px;height:16px;display:grid;place-items:center;border-radius:50%}
  .pchip:hover .pdel{opacity:.45}.pchip .pdel:hover{opacity:1;background:var(--selected)}.pchip .pdel svg{width:9px;height:9px}
  .pchip.save{color:var(--ink-faint);margin-top:5px}.pchip.save::before{content:"+";width:auto;height:auto;background:none;opacity:1;font-size:13px;font-weight:700;line-height:1;margin:0 1px}.pchip.save:hover{color:var(--accent)}
  .side-foot{margin-top:auto;padding:13px 8px 2px;display:flex;align-items:center;gap:8px;font-size:10.5px;color:var(--ink-faint)}
  .kit-link{font-size:11px;font-weight:600;color:var(--ink-faint);text-decoration:none}.kit-link:hover{color:var(--accent)}
  .cloud{display:inline-flex;align-items:center;gap:5px}.cloud.ok{color:#3f9e6f}.cloud svg{width:12px;height:12px}
  .status-mini.demo,.status-mini.error{color:var(--amber)}

  /* ── 메인: 풀폭(가로 제한 없음) · 조밀한 크롬 ── */
  .main{flex:1;min-width:0;padding:18px 26px 86px}
  .view{display:none}.view.show{display:block}

  /* 쉬운 추가 — 접힘 기본 · 펼쳐도 한 줄(조밀) */
  .ez{background:var(--surface);border-radius:var(--r);margin-bottom:12px;overflow:hidden}
  .ez>summary{list-style:none;cursor:pointer;padding:10px 14px;font-size:12px;font-weight:700;color:var(--ink);display:flex;align-items:center;gap:8px}
  .ez>summary::-webkit-details-marker{display:none}
  .ez>summary .chev{width:14px;height:14px;color:var(--ink-faint);transition:transform .18s;flex:none}
  .ez[open]>summary .chev{transform:rotate(90deg)}
  .ez[open]>summary{padding-bottom:6px}
  .ez .ez-hint{font-weight:500;color:var(--ink-faint)}
  .ez-body{display:flex;flex-wrap:wrap;gap:14px 30px;padding:4px 16px 16px}
  .ez-ctrl{display:flex;flex-direction:column;gap:8px}
  .ez-ctrl .lab{font-size:11px;font-weight:650;color:var(--ink-soft);display:flex;align-items:center;gap:7px}
  .ez-ctrl .lab .val{font-weight:600;color:var(--accent);font-family:var(--mono);font-size:10.5px}
  .slider-wrap{width:206px;max-width:100%}
  input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:4px;border-radius:3px;background:var(--track-2);outline:none;margin:3px 0}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent);cursor:pointer;border:0;box-shadow:0 0 0 3px var(--surface),0 1px 3px rgba(43,42,40,.28)}
  input[type=range]::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:var(--accent);cursor:pointer;border:0;box-shadow:0 0 0 3px var(--surface),0 1px 3px rgba(43,42,40,.28)}
  .ticks{display:flex;justify-content:space-between;padding:0 6px;margin-top:5px}
  .ticks i{width:2px;height:5px;border-radius:1px;background:var(--track)}
  .scale{display:flex;justify-content:space-between;font-size:9px;color:var(--ink-faint);margin-top:3px}

  /* 입력 — 필드는 필드답게(채운 회색, 무테두리, 포커스 시에만 링) */
  .add-row{display:flex;gap:6px;align-items:center;background:var(--surface-2);border-radius:var(--r-sm);padding:5px 5px 5px 6px;position:relative;transition:box-shadow .14s,background .14s}
  .add-row:focus-within{background:var(--surface);box-shadow:0 0 0 2px var(--accent-ring)}
  .add-row input,.add-row textarea{flex:1;min-width:0;background:none;border:0;color:var(--ink);padding:7px 9px;font:inherit;font-size:13px;resize:none;outline:none}
  .add-row input::placeholder,.add-row textarea::placeholder{color:var(--ink-faint)}
  .add-row textarea{min-height:96px;line-height:1.6}
  .add-row.col{flex-direction:column;align-items:stretch;gap:8px;padding:8px;max-width:740px}
  .add-btn{flex:none;appearance:none;border:0;background:var(--accent);color:#fff;border-radius:6px;padding:0 15px;height:var(--ctl);font:inherit;font-size:12px;font-weight:650;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:5px;transition:background .14s,transform .04s}
  .add-btn:hover{background:var(--accent-press)}.add-btn:active{transform:translateY(1px)}.add-btn .p{font-size:14px;font-weight:700;margin-top:-1px}
  .add-btn.wide{width:100%;height:42px}
  .ac{position:absolute;top:calc(100% + 6px);left:0;right:0;z-index:45;background:var(--surface);border-radius:var(--r);padding:5px;box-shadow:var(--sh-pop);max-height:300px;overflow:auto}
  .ac .ai{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:6px;cursor:pointer}
  .ac .ai .aen{font-family:var(--mono);font-size:12.5px;font-weight:550;color:var(--ink);white-space:nowrap}
  .ac .ai .ako{color:var(--ink-soft);font-size:11.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1 1 auto;min-width:0}
  .ac .ai .acat{margin-left:auto;flex:none;font-size:9.5px;color:var(--ink-faint);letter-spacing:.03em}
  .ac .ai:hover,.ac .ai.active{background:var(--accent-tint)}

  /* 분류 칩 — pill(필터). 무채색 hairline, 활성=강조 틴트 */
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin:14px 0 8px}
  .chip{appearance:none;border:0;background:var(--surface-2);color:var(--ink-soft);font:inherit;font-size:12px;font-weight:600;padding:6px 13px;border-radius:var(--r-pill);cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:.12s}
  .chip:hover{color:var(--ink);background:var(--hover)}
  .chip[aria-pressed="true"]{background:var(--accent-tint-2);color:var(--ink);font-weight:650}
  .chip .n{font-size:10px;color:var(--ink-faint);font-variant-numeric:tabular-nums}.chip[aria-pressed="true"] .n{color:var(--ink-soft)}
  .subchips{display:flex;flex-wrap:wrap;gap:5px;margin:0 0 10px;padding:9px 11px;background:var(--surface-2);border-radius:var(--r-sm)}
  .subchip{appearance:none;border:0;background:var(--surface);color:var(--ink-soft);font:inherit;font-size:11px;font-weight:600;padding:5px 12px;border-radius:var(--r-pill);cursor:pointer;display:inline-flex;align-items:center;gap:5px}
  .subchip:hover{color:var(--ink);background:var(--hover)}
  .subchip[aria-pressed="true"]{background:var(--ink);color:#fff;box-shadow:none}
  .subchip .n{font-size:9.5px;opacity:.65;font-variant-numeric:tabular-nums}

  /* 조합 = 화면 하단 고정 차콜 트레이 · 위로 펼쳐져 그리드를 가리지 않음 · 테두리 없음 */
  .compose{position:fixed;left:var(--side-w);right:0;bottom:0;z-index:50;background:var(--out);box-shadow:var(--sh-out);border-radius:16px 16px 0 0}
  .tray-bar{display:flex;align-items:center;gap:10px;width:100%;background:none;border:0;cursor:pointer;padding:12px 24px;font:inherit;text-align:left}
  .compose.is-empty .tray-bar{cursor:default}
  .tray-bar .t{font-size:10px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--out-soft);flex:none}
  .tray-bar .c{font-size:10px;color:var(--out-soft);font-variant-numeric:tabular-nums;flex:none}
  .tray-prev{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:var(--mono);font-size:12px;color:var(--out-soft)}
  .compose:not(.is-empty) .tray-prev{color:var(--out-tx)}
  .bar-acts{margin-left:auto;flex:none;display:flex;align-items:center;gap:11px}
  .dcopy{appearance:none;border:0;border-radius:6px;padding:7px 15px;font:inherit;font-size:11.5px;font-weight:650;cursor:pointer;background:var(--accent);color:#fff;transition:.13s}
  .dcopy:hover{background:var(--accent-press)}
  .tray-chev{display:flex;color:var(--out-soft);transition:transform .2s}.tray-chev svg{width:16px;height:16px}
  .compose.open .tray-chev{transform:rotate(180deg)}
  .compose.is-empty .dcopy,.compose.is-empty .tray-chev{display:none}
  .tray-body{display:none;padding:2px 24px 16px;max-height:46vh;overflow:auto}
  .compose.open:not(.is-empty) .tray-body{display:block}
  .tray-toolbar{display:flex;align-items:center;gap:5px;margin-bottom:9px}
  .tray-toolbar button{appearance:none;border:0;border-radius:6px;padding:7px 13px;font:inherit;font-size:11.5px;font-weight:650;cursor:pointer;transition:.13s}
  .dsave{background:var(--out-line);color:var(--out-tx)}.dsave:hover{background:rgba(255,255,255,.16)}
  .dclear{background:none;color:var(--out-soft)}.dclear:hover{color:var(--out-tx)}
  .flow{font-family:var(--mono);font-size:13px;line-height:1.95;color:var(--out-tx);word-break:break-word}
  .fw{cursor:pointer;border-radius:5px;padding:2px 4px;transition:background .1s;white-space:nowrap}
  .fw:hover{background:var(--out-line)}
  .fw .fwt{color:var(--out-tx)}
  .fw .fwn{color:var(--out-accent);font-size:10px;font-weight:700}
  .fw:not(:last-child)::after{content:",\00a0";color:var(--out-soft)}
  /* 제외(네거티브) */
  .neg{margin-top:11px;background:var(--out-2);border-radius:var(--r-sm);padding:9px 11px}
  .neg-head{display:flex;align-items:center;gap:8px;margin-bottom:7px}
  .neg-head .t{font-size:9.5px;font-weight:800;letter-spacing:.11em;text-transform:uppercase;color:var(--neg)}
  .neg-row input{width:100%;background:var(--out-line);border:0;border-radius:6px;color:var(--out-tx);font:inherit;font-size:12px;padding:8px 11px;outline:none;transition:box-shadow .14s}
  .neg-row input::placeholder{color:var(--out-soft)}
  .neg-row input:focus{box-shadow:0 0 0 1.5px var(--neg)}
  .negflow{font-family:var(--mono);font-size:12px;line-height:1.85;color:var(--neg);word-break:break-word;margin-top:7px}
  .nw{cursor:pointer;border-radius:5px;padding:1px 4px;white-space:nowrap}
  .nw:hover{background:rgba(231,155,145,.2)}
  .nw:not(:last-child)::after{content:",\00a0";color:var(--out-soft)}
  .dock-save{display:flex;gap:6px;margin-bottom:10px;max-width:520px}
  .dock-save input{flex:1;min-width:0;background:var(--out-line);border:0;border-radius:6px;color:var(--out-tx);font:inherit;font-size:12px;padding:8px 11px;outline:none}
  .dock-save input::placeholder{color:var(--out-soft)}
  .dock-save input:focus{box-shadow:0 0 0 1.5px var(--accent)}
  .dock-save button{appearance:none;border:0;border-radius:6px;padding:8px 13px;font:inherit;font-size:11.5px;font-weight:650;cursor:pointer}
  .dock-save .psok{background:var(--accent);color:#fff}.dock-save .pscancel{background:none;color:var(--out-soft)}
  /* 가중치 팝오버(라이트 표면) */
  .wpop{position:fixed;z-index:70;background:var(--surface);border-radius:10px;box-shadow:var(--sh-pop);padding:7px;display:flex;align-items:center;gap:7px}
  .wpop .wval{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--accent);min-width:30px;text-align:center}
  .wpop button{appearance:none;border:0;background:var(--surface-2);color:var(--ink);width:26px;height:26px;border-radius:7px;cursor:pointer;font-size:15px;font-weight:700;display:grid;place-items:center}
  .wpop button:hover{background:var(--accent-tint);color:var(--accent)}
  .wpop .wrm{width:auto;padding:0 10px;font-size:11px;font-weight:650;color:#c0473d;background:none}
  .wpop .wrm:hover{background:#fbeceb;color:#c0473d}

  /* 단어 그리드 — 풀폭 · 표면은 캔버스와 거의 같은 톤(촌스럽지 않게) · 무테두리 */
  .lib{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:8px}
  .wrow{display:flex;flex-direction:column;align-items:flex-start;gap:2px;background:var(--surface);border-radius:10px;padding:10px 12px;cursor:pointer;text-align:left;transition:background .13s}
  .wrow:hover{background:var(--hover)}
  .wrow:hover .we{color:var(--accent)}
  .wrow:focus-visible{box-shadow:0 0 0 2px var(--accent-ring)}
  .we{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--ink);letter-spacing:-.01em;line-height:1.3;overflow-wrap:anywhere}
  .wk{font-size:10.5px;color:var(--ink-soft);line-height:1.3;overflow-wrap:anywhere}.wk.untr{color:var(--ink-faint);font-style:italic}
  .lib-empty{grid-column:1/-1;background:var(--surface);border-radius:var(--r);padding:34px 22px;color:var(--ink-soft);font-size:12.5px;line-height:1.9;text-align:center}
  .lib-empty b{color:var(--accent);font-weight:700}

  /* 가져오기 */
  .view-head{font-size:16px;font-weight:800;letter-spacing:-.01em;margin:0 0 4px}
  .view-sub{font-size:12.5px;color:var(--ink-soft);margin:0 0 16px}
  .parsed{margin-top:16px;max-width:880px}
  .parsed-head{display:flex;align-items:center;gap:8px;margin-bottom:12px}
  .seg-label{font-size:10px;color:var(--ink);font-weight:800;text-transform:uppercase;letter-spacing:.09em}
  .parsed-head .link{margin-left:auto}.parsed-head .link.ai{margin-left:0}
  .link{appearance:none;border:0;background:none;color:var(--ink-soft);font:inherit;font-size:11.5px;font-weight:600;cursor:pointer;padding:4px 8px;border-radius:6px}
  .link:hover{color:var(--ink);background:var(--hover)}.link.ai{color:var(--accent)}
  .tokens{display:flex;flex-wrap:wrap;align-items:flex-start;gap:6px}

  function buildVocab(){
    const map={};
    BUILTIN.forEach(w=>{const k=w.e.toLowerCase();map[k]={en:w.e,ko:w.k,cat:w.c,sub:subOf(w.e,w.c),builtin:true,mine:false,cnt:0,score:0};});
    userWords.forEach(u=>{const k=lc(u.en);if(!k)return;
      if(map[k]){map[k].id=u.id;map[k].mine=true;map[k].cnt=Math.max(map[k].cnt||0,u.count||0);}
      else{let cat=CATOF[k]||u.cat||guessCat(u.en);if(CATS.indexOf(cat)===-1)cat="기타";
        map[k]={en:u.en,ko:(u.ko&&u.ko.trim())||translate(u.en),cat:cat,sub:subOf(u.en,cat),id:u.id,mine:true,cnt:(u.count||0),score:0};}});

  }

  function deleteUserPreset(id){userPresets=userPresets.filter(p=>p.id!==id);store.set(K_PRESETS,JSON.stringify(userPresets));renderPresets();}
  presetSaveOk.addEventListener("click",commitSavePreset);presetSaveCancel.addEventListener("click",cancelSavePreset);
  presetName.addEventListener("keydown",e=>{if(e.key==="Enter"){e.preventDefault();commitSavePreset();}if(e.key==="Escape"){e.preventDefault();cancelSavePreset();}});

  /* 분류 칩 — 내 단어 기준, 단일 선택 + 하위 카테고리 드릴다운 */
  function mineWords(){return VOCAB.filter(x=>x.mine&&!composeHas(x.en));}
  function renderChips(){
    const mw=mineWords();const counts={};CATS.forEach(c=>counts[c]=0);mw.forEach(x=>{if(counts[x.cat]!=null)counts[x.cat]++;});
    chipsEl.innerHTML="";
    const all=document.createElement("button");all.className="chip all";all.type="button";all.setAttribute("aria-pressed",activeCat===null?"true":"false");all.textContent="전체";
    all.addEventListener("click",()=>{activeCat=null;activeSub=null;renderChips();renderLib();});chipsEl.appendChild(all);
    CAT_ORDER.forEach(c=>{if(!counts[c])return;const b=document.createElement("button");b.className="chip";b.type="button";b.setAttribute("aria-pressed",activeCat===c?"true":"false");
      b.innerHTML=catLabel(c)+'<span class="n">'+counts[c]+'</span>';
      b.addEventListener("click",()=>{activeCat=(activeCat===c?null:c);activeSub=null;renderChips();renderLib();});chipsEl.appendChild(b);});
    renderSubchips();
  }
  function renderSubchips(){
    subchipsEl.innerHTML="";
    if(!activeCat){subchipsEl.hidden=true;return;}
    const mw=mineWords().filter(x=>x.cat===activeCat);
    const subs={};mw.forEach(x=>{const s=x.sub||SUBDEF[activeCat]||"기타";subs[s]=(subs[s]||0)+1;});
    const present=subOrder(activeCat).filter(s=>subs[s]);
    if(!present.length){subchipsEl.hidden=true;return;}
    subchipsEl.hidden=false;
    const allb=document.createElement("button");allb.className="subchip";allb.type="button";allb.setAttribute("aria-pressed",activeSub===null?"true":"false");allb.textContent="전체";
    allb.addEventListener("click",()=>{activeSub=null;renderSubchips();renderLib();});subchipsEl.appendChild(allb);
    present.forEach(s=>{const b=document.createElement("button");b.className="subchip";b.type="button";b.setAttribute("aria-pressed",activeSub===s?"true":"false");
      b.innerHTML=s+'<span class="n">'+subs[s]+'</span>';
      b.addEventListener("click",()=>{activeSub=(activeSub===s?null:s);renderSubchips();renderLib();});subchipsEl.appendChild(b);});
  }

  /* 단어 그리드 — 내 단어만, 중요도 정렬 */
  function visible(){
    let items=mineWords();
    if(activeCat)items=items.filter(x=>x.cat===activeCat);
    if(activeCat&&activeSub)items=items.filter(x=>(x.sub||"기타")===activeSub);
    // 안정 정렬(클릭해도 자리 안 바뀜): 중요도 → 알파벳
    items.sort((a,b)=>((TIER[b.cat]||0)-(TIER[a.cat]||0))||a.en.localeCompare(b.en));
    return items;
  }
  function renderLib(){
    const items=visible();libEl.innerHTML="";
    if(!items.length){
      const hasMine=VOCAB.some(x=>x.mine);
      libEl.innerHTML='<div class="lib-empty">'+(activeCat?"이 분류엔 담을 단어가 없어요.":(hasMine?"담은 단어는 아래 조합으로 들어갔어요. 조합에서 단어를 눌러 다시 빼낼 수 있어요.":"아직 <b>내 단어장</b>이 비어 있어요.<br>위 입력칸에 단어를 쳐서 담거나, <b>가져오기</b>에서 프롬프트를 붙여넣어 단어를 모아보세요."))+'</div>';
      return;}
    const frag=document.createDocumentFragment();
    items.forEach(item=>{const b=document.createElement("button");b.type="button";b.className="wrow";b.dataset.en=item.en;
      const noko=!(item.ko&&item.ko.trim());
      b.innerHTML='<span class="we"></span><span class="wk'+(noko?' untr':'')+'"></span>';
      b.querySelector(".we").textContent=item.en;b.querySelector(".wk").textContent=noko?"뜻 미등록":item.ko;
      b.addEventListener("click",()=>{addCompose(item.en);buildVocab();renderAll();});frag.appendChild(b);});
    libEl.appendChild(frag);
  }

  /* 입력 + 자동완성(전체 사전 검색) */
  let acItems=[],acActive=-1;
  function closeAc(){acBox.hidden=true;acBox.innerHTML="";acItems=[];acActive=-1;}
  function renderAc(){if(!acItems.length){closeAc();return;}acBox.innerHTML="";
    acItems.forEach((it,i)=>{const d=document.createElement("div");d.className="ai"+(i===acActive?" active":"");
      d.innerHTML='<span class="aen"></span><span class="ako"></span><span class="acat"></span>';
      d.querySelector(".aen").textContent=it.en;d.querySelector(".ako").textContent=it.ko?("· "+it.ko):"";d.querySelector(".acat").textContent=it.cat;
      d.addEventListener("mousedown",e=>{e.preventDefault();acceptAc(i);});
      d.addEventListener("mouseenter",()=>{acActive=i;[...acBox.children].forEach((c,j)=>c.classList.toggle("active",j===i));});
      acBox.appendChild(d);});acBox.hidden=false;}
  function updateAc(){const q=wordInput.value.trim().toLowerCase();if(q.length<1){closeAc();return;}
    const byUse=(a,b)=>b.score-a.score||a.en.localeCompare(b.en);const starts=[],incl=[];
    for(const x of VOCAB){if(composeHas(x.en))continue;const en=x.en.toLowerCase(),ko=(x.ko||"").toLowerCase();if(en===q)continue;
      if(en.startsWith(q))starts.push(x);else if(en.includes(q)||ko.includes(q))incl.push(x);}
    acItems=starts.sort(byUse).concat(incl.sort(byUse)).slice(0,8);acActive=acItems.length?0:-1;renderAc();}
  function acceptAc(i){const it=acItems[i];if(!it)return;doAdd(it.en);}
  function doAdd(text){const raw=String(text||"").split(/[,\n]+/).map(s=>s.trim()).filter(Boolean);if(!raw.length)return;
    let n=0,nn=0;const unmatched=[];
    raw.forEach(part=>{let neg=false,p=part;
      if(p[0]==="-"||p[0]==="!"){neg=true;p=p.slice(1).trim();if(!p)return;}
      const r=resolveToken(p);
      if(/[가-힣]/.test(r)){unmatched.push(r);return;}           // 한글 그대로면 영어 매칭 실패
      if(neg){if(addNeg(r))nn++;}else{if(addCompose(r))n++;}});
    closeAc();buildVocab();renderAll();
    wordInput.value=unmatched.length?unmatched.join(", "):"";
    if(unmatched.length)toast("매칭되는 영어 단어가 없어요 · "+unmatched[0]);
    else if(nn&&!n)toast(nn>1?("제외 "+nn+"개"):"제외 · "+raw[0]);
    else if(n)toast(n>1?(n+"개 담음"):"담음 · "+raw[0]);
    else toast("이미 담겨 있어요");
    wordInput.focus();}
  wordInput.addEventListener("input",updateAc);wordInput.addEventListener("focus",updateAc);wordInput.addEventListener("blur",()=>setTimeout(closeAc,120));
  wordInput.addEventListener("keydown",e=>{const acOpen=!acBox.hidden&&acItems.length;
    if(acOpen){if(e.key==="ArrowDown"){e.preventDefault();acActive=(acActive+1)%acItems.length;renderAc();return;}
      if(e.key==="ArrowUp"){e.preventDefault();acActive=(acActive-1+acItems.length)%acItems.length;renderAc();return;}
      if(e.key==="Escape"){e.preventDefault();closeAc();return;}if(e.key==="Tab"){e.preventDefault();acceptAc(acActive>=0?acActive:0);return;}}
    if(e.key==="Enter"){e.preventDefault();const q=wordInput.value.trim();if(!q)return;
      // 정확히 입력한 단어가 사전/한글에 있으면 그걸 우선, 아니면 상단 자동완성, 아니면 자유 입력
      if(/[,\-!]/.test(q)){doAdd(q);return;}
      if(VMAP[lc(q)]||KMAP[lc(q)]){doAdd(q);return;}
      if(acOpen&&acActive>=0){acceptAc(acActive);return;}
      doAdd(q);}});
  addWordBtn.addEventListener("click",()=>{if(wordInput.value.trim())doAdd(wordInput.value);else wordInput.focus();});
  document.addEventListener("click",e=>{if(!e.target.closest(".add-row"))closeAc();});

  /* 조합 액션 */
  $("#clearAll").addEventListener("click",()=>{if(!compose.length&&!negative.length)return;compose=[];negative=[];persistCompose();persistNeg();dockSave.hidden=true;resetControls();buildVocab();renderAll();});
  $("#savePreset").addEventListener("click",openSavePreset);
  const copyPart=c=>(c.w&&c.w!==1)?("("+c.en+":"+(Math.round(c.w*100)/100)+")"):c.en;
  $("#copyAll").addEventListener("click",()=>{if(!compose.length&&!negative.length){toast("담긴 단어가 없어요");return;}
    let text=compose.map(copyPart).join(", ");
    if(negative.length)text+=(text?"\n":"")+"Negative prompt: "+negative.map(copyPart).join(", ");
    const done=()=>toast("복사됨 · "+compose.length+"개"+(negative.length?" · 제외 "+negative.length:""));
    if(navigator.clipboard&&navigator.clipboard.writeText)navigator.clipboard.writeText(text).then(done,fb);else fb();
    function fb(){const t=document.createElement("textarea");t.value=text;document.body.appendChild(t);t.select();try{document.execCommand("copy");done();}catch(e){toast("복사 실패");}t.remove();}});
  // 제외(네거티브) 입력
  function commitNeg(){const raw=negInput.value.trim();if(!raw)return;
    const parts=raw.split(/[,\n]+/).map(s=>s.trim()).filter(Boolean).map(resolveToken);
    let n=0;parts.forEach(p=>{if(addNeg(p))n++;});negInput.value="";renderDock();renderPresets();
    if(n)toast(n>1?("제외 "+n+"개"):"제외 · "+parts[0]);else toast("이미 제외에 있어요");}
  negInput.addEventListener("keydown",e=>{if(e.key==="Enter"){e.preventDefault();commitNeg();}});

  /* ── #6 쉬운 추가 컨트롤(눈금 슬라이더 + 스냅 그리드) ── */
  const AGES=[null,"baby","toddler","child","teenager","young adult","adult","middle-aged person","elderly person"];
  const AGES_KO=["지정 안 함","아기","유아","아이","십 대","청년","성인","중년","노년"];
  function setAge(){const i=+ageRange.value;ageLabel.textContent=AGES_KO[i];
    if(lastAge){removeCompose(lastAge);lastAge=null;} if(AGES[i]){addCompose(AGES[i]);lastAge=AGES[i];} buildVocab();renderAll();}
  ageRange.addEventListener("input",setAge);

  const SHOTS=[null,"extreme close-up","close-up","medium shot","full body shot","wide shot"];
  const SHOTS_KO=["지정 안 함","익스트림 클로즈업","클로즈업","미디엄 샷","전신","와이드 샷"];
  let lastShot=null;
  function setShot(){const i=+shotRange.value;shotLabel.textContent=SHOTS_KO[i];
    if(lastShot){removeCompose(lastShot);lastShot=null;} if(SHOTS[i]){addCompose(SHOTS[i]);lastShot=SHOTS[i];} buildVocab();renderAll();}
  shotRange.addEventListener("input",setShot);

  // 렌즈 초점거리(단일 토큰)
  const LENS=[null,"16mm wide-angle lens","24mm wide-angle lens","35mm lens","50mm lens","85mm portrait lens","135mm telephoto lens"];
  const LENS_KO=["지정 안 함","16mm 광각","24mm 광각","35mm","50mm 표준","85mm 인물","135mm 망원"];
  function setLens(){const i=+lensRange.value;lensLabel.textContent=LENS_KO[i];
    if(lastLens){removeCompose(lastLens);lastLens=null;} if(LENS[i]){addCompose(LENS[i]);lastLens=LENS[i];} buildVocab();renderAll();}
  lensRange.addEventListener("input",setLens);

  // 카메라 높이/앵글(중앙=눈높이=토큰 없음)
  const ANG=["worm's eye view","low angle",null,"high angle","bird's eye view"];
  const ANG_KO=["바닥에서(앙각)","로우앵글","눈높이(기본)","하이앵글","위에서(부감)"];
  function setAng(){const i=+angRange.value;angLabel.textContent=ANG_KO[i];
    if(lastAng){removeCompose(lastAng);lastAng=null;} if(ANG[i]){addCompose(ANG[i]);lastAng=ANG[i];} buildVocab();renderAll();}
  angRange.addEventListener("input",setAng);

  function resetControls(){lastAge=null;lastShot=null;lastLens=null;lastAng=null;
    ageRange.value=0;shotRange.value=0;lensRange.value=0;angRange.value=2;
    ageLabel.textContent="지정 안 함";shotLabel.textContent="지정 안 함";lensLabel.textContent="지정 안 함";angLabel.textContent="눈높이(기본)";}

  /* 가져오기 */
  let parsed=[];
  splitBtn.addEventListener("click",splitImport);
  async function splitImport(){let src=importInput.value.trim();
    if(!src){if(!navigator.clipboard||!navigator.clipboard.readText){toast("이 브라우저에선 클립보드를 못 읽어요 · 직접 붙여넣어 주세요");return;}
      try{src=((await navigator.clipboard.readText())||"").trim();}catch(e){toast("클립보드를 읽지 못했어요 · 직접 붙여넣어 주세요");return;}
      if(src){importInput.value=src;}else{toast("클립보드가 비어 있어요");return;}}
    const segs=src.split(/[,\n;|]+/).map(s=>s.trim()).filter(Boolean);const seen=new Set();parsed=[];
    for(const s of segs){const k=s.toLowerCase();if(seen.has(k))continue;seen.add(k);parsed.push({en:s,ko:translate(s),exists:!!(VMAP[k]&&VMAP[k].mine),sel:false});}
    if(!parsed.length){toast("분리할 내용이 없어요");return;}renderParsed();}
  function renderParsed(){parsedWrap.hidden=false;tokensEl.innerHTML="";
    parsed.forEach(p=>{const t=document.createElement("button");t.type="button";t.className="tok"+(p.exists?" exists":"")+(p.sel?" sel":"");
      t.innerHTML='<span class="en"></span><span class="ko '+(p.ko?'':'untr')+'"></span><span class="flag"></span>';
      t.querySelector(".en").textContent=p.en;t.querySelector(".ko").textContent=p.ko?("("+p.ko+")"):"(뜻 미등록)";
      t.querySelector(".flag").textContent=p.sel?"선택됨":(p.exists?"내 단어장에 있음":"+ 선택");
      t.addEventListener("click",()=>{p.sel=!p.sel;renderParsed();});tokensEl.appendChild(t);});
    const selN=parsed.filter(p=>p.sel).length,newN=parsed.filter(p=>p.sel&&!p.exists).length;
    composeNEl.textContent=selN?("("+selN+")"):"";saveNEl.textContent=newN?("("+newN+")"):"";
    saveLibBtn.disabled=!newN;toComposeBtn.disabled=!selN;
    aiFillBtn.hidden=!(parsed.some(p=>!p.ko)&&(TRANSLATE_URL||(sb&&sb.functions)));}
  selectAllBtn.addEventListener("click",()=>{const all=parsed.length&&parsed.every(p=>p.sel);parsed.forEach(p=>p.sel=!all);renderParsed();});
  cancelBtn.addEventListener("click",()=>{parsed=[];parsedWrap.hidden=true;tokensEl.innerHTML="";});
  toComposeBtn.addEventListener("click",()=>{const chosen=parsed.filter(p=>p.sel);if(!chosen.length){toast("선택된 단어가 없어요");return;}
    let n=0;chosen.forEach(p=>{if(addCompose(p.en))n++;});buildVocab();renderAll();setMode("lib");toast(n?("작성에 "+n+"개 담음"):"이미 담겨 있어요");});
  saveLibBtn.addEventListener("click",saveImportToLib);
  async function saveImportToLib(){const chosen=parsed.filter(p=>p.sel&&!p.exists);if(!chosen.length){toast("저장할 새 단어가 없어요");return;}
    const fresh=chosen.map(p=>({id:uid(),en:p.en,ko:p.ko||translate(p.en),cat:(CATOF[lc(p.en)]||guessCat(p.en)),count:0}));
    userWords.push(...fresh);persistWords();buildVocab();renderAll();chosen.forEach(p=>p.exists=true);renderParsed();
    toast("단어장에 "+fresh.length+"개 저장");if(sb){sbInsert(fresh).catch(e=>console.error(e));}}

  const TRANSLATE_FN=(window.TRANSLATE_FN||"translate"),TRANSLATE_URL=(window.TRANSLATE_URL||""),TRANSLATE_KEY=(window.TRANSLATE_KEY||"");
  async function aiTranslate(words){if(TRANSLATE_URL){const res=await fetch(TRANSLATE_URL,{method:"POST",headers:Object.assign({"content-type":"application/json"},TRANSLATE_KEY?{"authorization":"Bearer "+TRANSLATE_KEY,"apikey":TRANSLATE_KEY}:{}),body:JSON.stringify({words})});
      if(!res.ok)throw new Error("AI 번역 실패 "+res.status);const data=await res.json();return(data&&data.translations)||{};}
    if(!sb||!sb.functions)throw new Error("AI 번역 미설정");const{data,error}=await sb.functions.invoke(TRANSLATE_FN,{body:{words}});if(error)throw error;return(data&&data.translations)||{};}
  aiFillBtn.addEventListener("click",async()=>{const targets=parsed.filter(p=>!p.ko);if(!targets.length)return;
    const prev=aiFillBtn.textContent;aiFillBtn.textContent="번역 중…";aiFillBtn.disabled=true;
    try{const map=await aiTranslate(targets.map(p=>p.en));const low={};Object.keys(map).forEach(k=>low[k.toLowerCase()]=map[k]);
      targets.forEach(p=>{const ko=(map[p.en]||low[p.en.toLowerCase()]||"").trim();if(ko)p.ko=ko;});renderParsed();}
    catch(e){console.error(e);toast("AI 번역을 사용할 수 없어요");}finally{aiFillBtn.textContent=prev;aiFillBtn.disabled=false;}});

  async function sbList(){const{data,error}=await sb.from("words").select("*");if(error)throw error;return(data||[]).map(d=>({id:d.id,en:d.en,ko:d.ko||"",cat:d.cat||"기타",count:d.count||0}));}
  async function sbInsert(rows){if(!sb)return;for(const r of rows){const{error}=await sb.from("words").insert({id:r.id,en:r.en,ko:r.ko,cat:r.cat,count:r.count});if(error)console.warn("저장 건너뜀:",r.en,error.message||error);}}
  async function sbUpdate(id,patch){if(!sb)return;const{error}=await sb.from("words").update(patch).eq("id",id);if(error)throw error;}

  function setMode(name){mode=name;appEl.setAttribute("data-mode",name);
    document.querySelectorAll(".nav-item").forEach(b=>b.classList.toggle("active",b.dataset.mode===name));if(name!=="lib")closeAc();}
  document.querySelectorAll(".nav-item").forEach(b=>b.addEventListener("click",()=>setMode(b.dataset.mode)));

  function renderAll(){renderPresets();renderChips();renderLib();renderDock();}

  (async function init(){
    buildVocab();setMode("lib");renderAll();
    if(!CONFIGURED){setStatus(userWords.length?"demo":"local");return;}
    if(!sb){setStatus(userWords.length?"demo":"error");return;}
    try{const cloud=await sbList();const cset=new Set(cloud.map(w=>lc(w.en)));const localOnly=userWords.filter(w=>!cset.has(lc(w.en)));
      userWords=cloud.concat(localOnly);persistWords();buildVocab();renderAll();setStatus("ok");if(localOnly.length)sbInsert(localOnly).catch(()=>{});}
    catch(e){console.error(e);setStatus(userWords.length?"demo":"error");}
  })();
})();
</script>
<script>
(function(){"use strict";var KEY="promptDrawer.theme",root=document.documentElement;
  function read(){try{return localStorage.getItem(KEY);}catch(e){return null;}}function write(v){try{localStorage.setItem(KEY,v);}catch(e){}}
  function apply(t){if(t==="dark")root.setAttribute("data-theme","dark");else root.removeAttribute("data-theme");var m=document.querySelector('meta[name="theme-color"]');if(m)m.setAttribute("content",t==="dark"?"#141413":"#fcfbf9");}
  var theme=read()==="dark"?"dark":"light";apply(theme);var t=document.getElementById("themeToggle");if(t)t.addEventListener("click",function(){theme=theme==="light"?"dark":"light";apply(theme);write(theme);});
})();
</script>
</body>
</html>
