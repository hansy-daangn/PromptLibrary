<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>프롬프트 스튜디오</title>
<meta name="theme-color" content="#fcfbf9">
<link rel="apple-touch-icon" href="./icon-192.png">
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<script>try{if(localStorage.getItem("promptDrawer.theme")==="dark")document.documentElement.setAttribute("data-theme","dark");}catch(e){}</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./config.js"></script>
<style>
  /* ====================================================================
     프롬프트 스튜디오 · 재설계 v3 — 구조 변경
     좌: 사이드바(브랜드·내비·프리셋)  우: 메인(단어장/가져오기, 풀폭)
     하: 도크(조합을 박스 없이 흐르는 텍스트로). 담은 단어는 목록에서 숨김.
     ==================================================================== */
  :root{
    --paper:#fcfbf9; --surface:#f3f1ec; --surface-2:#ebe8e1; --side:#f7f5f0;
    --rule:#e9e5df; --rule-2:#d8d2c9;
    --ink:#262320; --ink-soft:#6c665d; --ink-faint:#9b948a;
    --accent:#0e7c73; --accent-ink:#ffffff; --accent-tint:#e4f3f0; --accent-line:#92cec7;
    --amber:#9a6a1a; --amber-strong:#7c5314; --amber-tint:#f7eed8; --amber-line:#e3c98e;
    --toast-bg:#262320; --toast-tx:#fcfbf9;
    --ui:"Pretendard Variable",Pretendard,-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Segoe UI",system-ui,sans-serif;
    --mono:ui-monospace,SFMono-Regular,"SF Mono",Menlo,"Cascadia Code","Roboto Mono",monospace;
    --r:10px; --r-sm:7px; --r-pill:999px; --side-w:250px;
    --shadow:0 12px 30px -16px rgba(40,36,30,.22), 0 2px 6px -3px rgba(40,36,30,.12);
    font-synthesis-weight:none;
  }
  :root[data-theme="dark"]{
    --paper:#141413; --surface:#1d1c1a; --surface-2:#272522; --side:#181715;
    --rule:#282623; --rule-2:#3a3630;
    --ink:#ece8e2; --ink-soft:#b2aca3; --ink-faint:#7d766c;
    --accent:#5fd0c9; --accent-ink:#06201e; --accent-tint:#16302e; --accent-line:#2f635d;
    --amber:#d9b878; --amber-strong:#e7c98f; --amber-tint:#2a2113; --amber-line:#544223;
    --toast-bg:#272522; --toast-tx:#ece8e2;
    --shadow:0 18px 44px -20px rgba(0,0,0,.7), 0 3px 10px -5px rgba(0,0,0,.5);
  }
  *{box-sizing:border-box}
  [hidden]{display:none!important}
  html,body{height:100%}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--ui);font-size:13px;line-height:1.5;
    -webkit-font-smoothing:antialiased;transition:background .25s,color .25s}
  ::selection{background:var(--accent-tint);color:var(--ink)}
  button{font-family:inherit}

  .app{display:flex;align-items:flex-start;min-height:100vh}

  /* ── 좌측 사이드바 ── */
  .side{position:sticky;top:0;align-self:stretch;width:var(--side-w);flex:none;height:100vh;overflow:auto;
    background:var(--side);border-right:1px solid var(--rule);display:flex;flex-direction:column;gap:4px;padding:18px 14px 14px}
  .brandrow{display:flex;align-items:center;gap:8px;margin:0 4px 18px}
  .brand{display:flex;align-items:center;gap:8px;font-size:13.5px;font-weight:800;letter-spacing:-.02em;color:var(--ink);white-space:nowrap}
  .brand::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--accent);flex:none}
  .brandrow .icon-btn{margin-left:auto}
  .icon-btn{appearance:none;border:0;background:none;color:var(--ink-faint);cursor:pointer;border-radius:var(--r-sm);padding:6px;display:inline-flex;align-items:center;transition:.14s}
  .icon-btn:hover{color:var(--ink);background:var(--surface-2)}
  .icon-btn svg{width:16px;height:16px}

  .nav{display:flex;flex-direction:column;gap:2px;margin-bottom:6px}
  .nav-item{appearance:none;border:0;background:none;text-align:left;font:inherit;font-size:13.5px;font-weight:600;color:var(--ink-soft);
    padding:9px 11px;border-radius:var(--r-sm);cursor:pointer;display:flex;align-items:center;gap:9px;transition:.12s}
  .nav-item:hover{background:var(--surface-2);color:var(--ink)}
  .nav-item.active{background:var(--accent-tint);color:var(--accent);font-weight:700}
  .nav-item .ic{width:15px;height:15px;flex:none}

  .side-sep{height:1px;background:var(--rule);margin:10px 6px}
  .side-presets{display:flex;flex-direction:column;min-height:0}
  .side-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);margin:2px 8px 9px}
  .presets{display:flex;flex-direction:column;gap:4px}

  /* 프리셋 행(좌측 nav 형태) */
  .pchip{appearance:none;display:flex;align-items:center;gap:9px;width:100%;border:0;background:none;color:var(--ink);
    border-radius:var(--r-sm);padding:9px 10px;font:inherit;font-size:12.5px;font-weight:600;cursor:pointer;text-align:left;transition:.12s}
  .pchip::before{content:"";flex:none;width:12px;height:12px;opacity:.45;
    background:radial-gradient(circle 1.5px at 3px 3px,currentColor 99%,transparent 0),radial-gradient(circle 1.5px at 9px 3px,currentColor 99%,transparent 0),radial-gradient(circle 1.5px at 3px 9px,currentColor 99%,transparent 0),radial-gradient(circle 1.5px at 9px 9px,currentColor 99%,transparent 0)}
  .pchip:hover{background:var(--surface-2)}
  .pchip .pl{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .pchip .pn{flex:none;font-size:10px;font-variant-numeric:tabular-nums;color:var(--ink-faint);background:var(--surface-2);border-radius:var(--r-pill);padding:1px 7px}
  .pchip.rec{color:var(--amber-strong);background:var(--amber-tint)}
  .pchip.rec .pn{color:var(--amber-strong);background:rgba(255,255,255,.5)}
  .pchip.applied{color:var(--accent)}
  .pchip.applied::before{opacity:.9}
  .pchip.applied .pn{color:var(--accent);background:var(--accent-tint)}
  .pchip .pdel{flex:none;appearance:none;border:0;background:none;color:inherit;opacity:0;cursor:pointer;padding:0;width:16px;height:16px;display:grid;place-items:center;border-radius:50%}
  .pchip:hover .pdel{opacity:.5}
  .pchip .pdel:hover{opacity:1;background:rgba(0,0,0,.1)}
  .pchip .pdel svg{width:9px;height:9px}
  .pchip.save{color:var(--ink-faint);border:1px dashed var(--rule-2);margin-top:4px}
  .pchip.save::before{display:none}
  .pchip.save:hover{color:var(--accent);border-color:var(--accent-line);background:none}

  .side-foot{margin-top:auto;padding:12px 8px 2px;display:flex;align-items:center;gap:8px;font-size:10.5px;color:var(--ink-faint)}
  .cloud{display:inline-flex;align-items:center;gap:5px}
  .cloud.ok{color:var(--accent)}
  .cloud svg{width:12px;height:12px}
  .status-mini{line-height:1.4}
  .status-mini.demo,.status-mini.error{color:var(--amber-strong)}

  /* ── 우측 메인 ── */
  .main{flex:1;min-width:0;padding:22px 26px calc(var(--dock-h,120px) + 30px)}
  .view{display:none}
  .view.show{display:block}

  /* 입력(검색 겸용) */
  .add-row{display:flex;gap:6px;align-items:center;background:var(--paper);border:1px solid var(--rule-2);border-radius:var(--r);
    padding:5px;position:relative;max-width:680px;transition:border-color .14s,box-shadow .14s}
  .add-row:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-tint)}
  .add-row input,.add-row textarea{flex:1;min-width:0;background:none;border:0;color:var(--ink);padding:9px 11px;font:inherit;font-size:13.5px;resize:none;outline:none}
  .add-row input::placeholder,.add-row textarea::placeholder{color:var(--ink-faint)}
  .add-row textarea{min-height:96px;line-height:1.65}
  .add-row.col{flex-direction:column;align-items:stretch;gap:8px;padding:8px;max-width:680px}
  .add-btn{flex:none;appearance:none;border:0;background:var(--ink);color:var(--paper);border-radius:var(--r-sm);
    padding:0 16px;height:38px;font:inherit;font-size:12.5px;font-weight:650;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:5px;transition:opacity .14s,transform .04s}
  .add-btn:hover{opacity:.86}.add-btn:active{transform:translateY(1px)}
  .add-btn.wide{width:100%;height:44px}

  .ac{position:absolute;top:calc(100% + 6px);left:0;right:0;z-index:45;background:var(--paper);border:1px solid var(--rule-2);border-radius:var(--r);padding:5px;box-shadow:var(--shadow);max-height:300px;overflow:auto}
  .ac .ai{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--r-sm);cursor:pointer}
  .ac .ai .aen{font-family:var(--mono);font-size:12.5px;font-weight:550;color:var(--ink);white-space:nowrap}
  .ac .ai .ako{color:var(--ink-soft);font-size:11.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1 1 auto;min-width:0}
  .ac .ai .acat{margin-left:auto;flex:none;font-size:9.5px;color:var(--ink-faint);letter-spacing:.04em;text-transform:uppercase}
  .ac .ai:hover,.ac .ai.active{background:var(--surface)}
  .ac .ai.active{box-shadow:inset 2px 0 0 var(--accent)}

  /* 분류 필터(단일 선택) */
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin:16px 0 14px}
  .chip{appearance:none;border:1px solid var(--rule-2);background:none;color:var(--ink-soft);font:inherit;font-size:11.5px;font-weight:600;
    padding:5px 12px;border-radius:var(--r-pill);cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:.12s}
  .chip:hover{background:var(--surface);color:var(--ink)}
  .chip[aria-pressed="true"]{background:var(--accent);border-color:var(--accent);color:var(--accent-ink)}
  .chip .n{font-size:10px;color:var(--ink-faint);font-variant-numeric:tabular-nums}
  .chip[aria-pressed="true"] .n{color:rgba(255,255,255,.7)}

  /* 단어 그리드(풀폭 · 카드 없이 · ＋버튼 없이 · 담은 건 숨김) */
  .lib{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:1px 4px}
  .wrow{display:flex;flex-direction:column;align-items:flex-start;gap:0;background:none;border:0;border-radius:var(--r-sm);
    padding:7px 9px;cursor:pointer;text-align:left;transition:background .1s}
  .wrow:hover{background:var(--surface)}
  .wrow:focus-visible{outline:2px solid var(--accent);outline-offset:-2px}
  .we{font-family:var(--mono);font-size:12px;font-weight:550;color:var(--ink);letter-spacing:-.01em;line-height:1.3;overflow-wrap:anywhere}
  .wrow:hover .we{color:var(--accent)}
  .wk{font-size:10.5px;color:var(--ink-soft);line-height:1.25;overflow-wrap:anywhere}
  .wk.untr{color:var(--ink-faint);font-style:italic}
  .lib-empty{grid-column:1/-1;text-align:center;padding:34px 16px;color:var(--ink-faint);font-size:12px;line-height:1.7}
  .lib-empty b{color:var(--accent);font-weight:600}

  /* 가져오기 */
  .parsed{margin-top:18px;max-width:760px}
  .parsed-head{display:flex;align-items:center;gap:8px;margin-bottom:12px}
  .seg-label{font-size:10.5px;color:var(--ink);font-weight:700;text-transform:uppercase;letter-spacing:.1em}
  .parsed-head .link{margin-left:auto}.parsed-head .link.ai{margin-left:0}
  .link{appearance:none;border:0;background:none;color:var(--ink-soft);font:inherit;font-size:11.5px;font-weight:600;cursor:pointer;padding:3px 7px;border-radius:var(--r-sm)}
  .link:hover{color:var(--ink);background:var(--surface)}.link.ai{color:var(--accent)}
  .tokens{display:flex;flex-wrap:wrap;align-items:flex-start;gap:6px}
  .tok{display:inline-flex;align-items:baseline;gap:6px;background:none;border:1px solid var(--rule-2);border-radius:var(--r-sm);
    padding:6px 10px;cursor:pointer;position:relative;white-space:nowrap;transition:.12s}
  .tok .en{font-family:var(--mono);font-size:12px;font-weight:550;color:var(--ink)}
  .tok .ko{font-size:11px;color:var(--ink-soft)}.tok .ko.untr{color:var(--ink-faint);font-style:italic}
  .tok .flag{position:absolute;top:-8px;right:-5px;background:var(--ink);color:var(--paper);font-size:8.5px;font-weight:700;padding:2px 5px;border-radius:4px;opacity:0;transform:translateY(2px);transition:.12s;pointer-events:none;white-space:nowrap}
  .tok:hover{border-color:var(--accent-line);background:var(--surface)}.tok:hover .flag{opacity:1;transform:translateY(0)}
  .tok.sel{border-color:var(--accent);background:var(--accent-tint)}.tok.sel .en{color:var(--accent)}
  .tok.sel .flag{opacity:1;transform:translateY(0);background:var(--accent);color:var(--accent-ink)}
  .tok.exists{border-style:dashed}.tok.exists .flag{background:var(--ink-faint)}
  .parsed-foot{display:flex;align-items:center;justify-content:flex-end;gap:8px;margin-top:14px;flex-wrap:wrap}
  .btn{appearance:none;border:1px solid var(--rule-2);background:var(--paper);color:var(--ink);font:inherit;font-size:12px;font-weight:600;border-radius:var(--r-sm);padding:8px 14px;cursor:pointer;transition:.13s}
  .btn:hover{border-color:var(--ink-faint);background:var(--surface)}.btn:active{transform:translateY(1px)}
  .btn.ghost{border-color:transparent;color:var(--ink-soft)}.btn.ghost:hover{color:var(--ink);background:var(--surface);border-color:transparent}
  .btn.primary{background:var(--ink);border-color:var(--ink);color:var(--paper)}.btn.primary:hover{opacity:.86;background:var(--ink)}
  .btn:disabled{opacity:.4;cursor:default}
  .note{margin-top:20px;max-width:680px;font-size:12px;line-height:1.8;color:var(--ink-soft);border-left:2px solid var(--rule-2);padding:2px 0 2px 14px}
  .note b{color:var(--ink);font-weight:600}
  .view-head{font-size:15px;font-weight:700;letter-spacing:-.01em;margin:0 0 4px}
  .view-sub{font-size:12px;color:var(--ink-soft);margin:0 0 18px}

  /* ── 하단 도크(조합을 흐르는 텍스트로) ── */
  .dock{position:fixed;left:var(--side-w);right:0;bottom:0;z-index:40;background:var(--paper);border-top:1px solid var(--rule-2);box-shadow:0 -10px 30px -22px rgba(40,36,30,.4)}
  .dock-in{padding:12px 26px calc(13px + env(safe-area-inset-bottom))}
  .dock-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
  .dock-top .t{font-size:10.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink)}
  .dock-top .c{font-size:10.5px;color:var(--ink-faint);font-variant-numeric:tabular-nums}
  .dock-top .acts{margin-left:auto;display:flex;align-items:center;gap:7px}
  .dock-top .acts button{appearance:none;border:0;border-radius:var(--r-sm);padding:8px 15px;font:inherit;font-size:12px;font-weight:650;cursor:pointer;transition:.13s}
  .dsave{background:var(--paper);border:1px solid var(--rule-2)!important;color:var(--ink-soft)}.dsave:hover{color:var(--ink);background:var(--surface)}
  .dclear{background:none;color:var(--ink-faint)}.dclear:hover{color:var(--ink)}
  .dcopy{background:var(--accent);color:var(--accent-ink)}.dcopy:hover{opacity:.88}
  /* 흐르는 단어들: 박스 없이 쭈루룩, 자동 줄바꿈, 단어 클릭 시 제거 */
  .flow{font-family:var(--mono);font-size:13px;line-height:1.95;color:var(--ink);word-break:break-word;max-height:148px;overflow:auto}
  .fw{cursor:pointer;border-radius:4px;padding:1px 3px;transition:background .1s,color .1s;white-space:nowrap}
  .fw:hover{background:var(--accent-tint);color:var(--accent)}
  .fw:hover .fx{opacity:1}
  .fw .fx{color:var(--ink-faint);margin-left:1px;font-weight:700;opacity:0}
  .fw:not(:last-child)::after{content:",\00a0";color:var(--ink-faint)}
  .dock-empty{font-size:12.5px;color:var(--ink-faint);padding:3px 1px}
  .dock-save{display:flex;gap:7px;margin-bottom:9px;max-width:520px}
  .dock-save input{flex:1;min-width:0;background:var(--surface);border:1px solid var(--rule-2);border-radius:var(--r-sm);color:var(--ink);font:inherit;font-size:12.5px;padding:9px 11px;outline:none}
  .dock-save input::placeholder{color:var(--ink-faint)}
  .dock-save input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-tint)}
  .dock-save button{appearance:none;border:0;border-radius:var(--r-sm);padding:9px 14px;font:inherit;font-size:12px;font-weight:650;cursor:pointer}
  .dock-save .psok{background:var(--accent);color:var(--accent-ink)}.dock-save .pscancel{background:none;color:var(--ink-faint)}
  .dock.is-empty .flow,.dock.is-empty .acts,.dock.is-empty .dock-save{display:none}
  .dock:not(.is-empty) .dock-empty{display:none}

  .toast{position:fixed;bottom:calc(var(--dock-h,120px) + 18px);left:calc(var(--side-w) + 26px);
    background:var(--toast-bg);color:var(--toast-tx);font-size:12px;font-weight:600;padding:9px 15px;border-radius:var(--r-sm);box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;transform:translateY(8px);z-index:60}
  .toast.show{opacity:1;transform:translateY(0)}

  /* 데스크톱: 프리셋 nav 링크 숨김(사이드바에 상시 노출), presets 모드는 lib로 취급 */
  .nav-item[data-mode="presets"]{display:none}
  .app[data-mode="import"] .view-lib{display:none}
  .app[data-mode="import"] .view-import{display:block}
  .app[data-mode="import"] .dock{display:none}
  .app:not([data-mode="import"]) .view-lib{display:block}
  .app:not([data-mode="import"]) .view-import{display:none}

  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

  /* ── 모바일: 사이드바 → 상단 바, 3-탭 ── */
  @media (max-width:859px){
    .app{flex-direction:column;--side-w:0px}
    .side{position:sticky;top:0;z-index:30;width:100%;height:auto;flex-direction:column;gap:0;border-right:0;border-bottom:1px solid var(--rule);padding:10px 14px 0;overflow:visible}
    .brandrow{margin-bottom:10px}
    .nav{flex-direction:row;gap:16px;margin-bottom:0}
    .nav-item{padding:6px 1px 11px;border-radius:0;border-bottom:2px solid transparent;background:none!important}
    .nav-item.active{background:none;color:var(--ink);border-bottom-color:var(--accent)}
    .nav-item .ic{display:none}
    .nav-item[data-mode="presets"]{display:flex}
    .side-sep,.side-label{display:none}
    .side-presets{display:none}
    .app[data-mode="presets"] .side-presets{display:block;padding:14px 2px 16px}
    .app[data-mode="presets"] .side-label{display:block;margin:0 2px 10px}
    .app[data-mode="presets"] .main{display:none}
    .app[data-mode="presets"] .dock{display:block}
    .side-foot{margin-top:0;padding:8px 2px;font-size:10px}
    .main{padding:18px 16px calc(var(--dock-h,120px) + 24px)}
    .dock{left:0}
    .dock-in{padding-left:16px;padding-right:16px}
    .toast{left:50%;transform:translateX(-50%) translateY(8px)}
    .toast.show{transform:translateX(-50%) translateY(0)}
    .presets{gap:6px}
  }
  @media (max-width:380px){ .brand span{display:none} }
</style>
</head>
<body>
  <div class="app" data-mode="lib" role="application" aria-label="프롬프트 스튜디오">
    <!-- 좌측 사이드바 -->
    <aside class="side">
      <div class="brandrow">
        <div class="brand"><span>프롬프트 스튜디오</span></div>
        <button class="icon-btn" id="themeToggle" type="button" aria-label="테마 변경">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 3a9 9 0 0 1 0 18z" fill="currentColor" stroke="none"/></svg></button>
      </div>
      <nav class="nav" role="tablist">
        <button class="nav-item active" type="button" role="tab" data-mode="lib">
          <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 5h16M4 12h16M4 19h10"/></svg>단어장</button>
        <button class="nav-item" type="button" role="tab" data-mode="presets">

    if(DICT[s])return DICT[s]; const a=s.replace(/^(a|an|the)\s+/,""); if(DICT[a])return DICT[a];
    const h=a.replace(/[-_]/g," "); if(DICT[h])return DICT[h];
    if(a.length>3&&a.charAt(a.length-1)==="s"&&DICT[a.slice(0,-1)])return DICT[a.slice(0,-1)]; return ""; }
  const CAT_RULES=[
    ["카메라·구도",["shot","angle","lens"," mm","close-up","closeup","close up","wide angle","depth of field","bokeh","macro","aerial","fisheye","full body","upper body","headshot","framing","composition","focal","pan","tilt","zoom","dolly","tracking","crane","handheld","gimbal","steadicam","orbit","camera shake","whip","drone","slow motion","time-lapse","timelapse","hyperlapse","freeze frame","bullet time","motion blur","pov","point of view","rule of thirds","symmetry","panorama"]],
    ["조명",["light","lighting","sunlight","sunbeam","shadow","golden hour","blue hour","backlight","rim light","soft light","hard light","neon light","glow","candle","moonlight","volumetric","spotlight","god rays","lens flare","silhouette","high key","low key"]],
    ["인물",["woman","man","girl","boy","female","male","person","people","child","baby","lady","gentleman","model","portrait","hair","eyes","face","skin","lips","freckles","beard","mustache","smile","smiling","expression","serious","wearing","dress","shirt","jacket","suit","outfit","clothes","clothing","uniform","makeup","glasses","hat"]],
    ["포즈",["pose","posing","sitting","standing","running","walking","lying","jumping","dancing","crossed arms","arms crossed","hands in","hands on","from behind","looking back","leaning","kneeling","crouching","stretching","fighting","flying","floating","swimming","hugging","waving","pointing","praying","facing"]],
    ["장소·배경",["forest","city","street","room","bedroom","beach","mountain","sky","field","garden","indoor","outdoor","background","landscape","cafe","desert","ocean","sea ","library","rooftop","balcony","bridge","castle","temple","cave","space","underwater","village","town","market","station","airport","building","interior","snow","rain","fog","storm","sunset","sunrise","dawn","dusk","night","clouds","stars","moon","autumn","winter","spring","summer","season"]],
    ["스타일",["style","painting","anime","manga","cartoon","realistic","photorealistic","cinematic","render","3d","cgi","illustration","watercolor","oil ","sketch","pixel","concept art","ghibli","disney","pixar","comic","pop art","surreal","impression","minimal","vaporwave","cyberpunk","steampunk","fantasy art","sci-fi","vintage","retro","film grain","gothic","film","footage","anamorphic","vlog","documentary","b-roll","photo","photograph"]],
    ["분위기",["mood","atmosphere","serene","dramatic","moody","dreamy","melancholic","cozy","epic","peaceful","vibrant","ethereal","mysterious","romantic","nostalgic","eerie","creepy","cheerful","gloomy","tranquil","energetic","whimsical","warm tone","cool tone","tones"]]
  ];
  function guessCat(en){const s=" "+String(en).toLowerCase()+" ";for(const[c,keys]of CAT_RULES)for(const k of keys)if(s.indexOf(k)!==-1)return c;return"기타";}

  let userWords=asArr(loadJSON(K_WORDS,[]));
  let userPresets=asArr(loadJSON(K_PRESETS,[]));
  let compose=asArr(loadJSON(K_COMPOSE,[])).filter(c=>c&&c.en);
  let usage=asObj(loadJSON(K_USAGE,{}));
  let activeCat=null;           // 단일 선택
  let mode="lib";
  let VOCAB=[],VMAP={};
  const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
  const $=s=>document.querySelector(s);

  const appEl=$(".app");
  const wordInput=$("#word"),addWordBtn=$("#addWordBtn"),acBox=$("#acBox");
  const presetsEl=$("#presets"),chipsEl=$("#chips"),libEl=$("#lib");

  const selectAllBtn=$("#selectAll"),cancelBtn=$("#cancelParse"),saveLibBtn=$("#saveLib"),toComposeBtn=$("#toCompose");

  const statusEl=$("#status"),cloudEl=$("#cloud"),cloudTxt=$("#cloudTxt"),toastEl=$("#toast");
  let toastTimer; function toast(m){toastEl.textContent=m;toastEl.classList.add("show");clearTimeout(toastTimer);toastTimer=setTimeout(()=>toastEl.classList.remove("show"),1500);}

  function setStatus(kind){
    if(kind==="ok"){statusEl.hidden=true;cloudEl.hidden=false;cloudEl.className="cloud ok";cloudTxt.textContent="동기화됨";return;}
    cloudEl.hidden=true;
    if(kind==="local"){statusEl.hidden=true;return;}

    statusEl.textContent = kind==="demo"?"로컬 모드":"오프라인";
  }

  function buildVocab(){
    const map={};
    BUILTIN.forEach(w=>{const k=w.e.toLowerCase();map[k]={en:w.e,ko:w.k,cat:w.c,builtin:true,cnt:0,score:0};});
    userWords.forEach(u=>{const k=lc(u.en);if(!k)return;
      if(map[k]){map[k].id=u.id;map[k].cnt=Math.max(map[k].cnt||0,u.count||0);}
      else{let cat=CATOF[k]||u.cat||guessCat(u.en);if(CATS.indexOf(cat)===-1)cat="기타";
        map[k]={en:u.en,ko:(u.ko&&u.ko.trim())||translate(u.en),cat:cat,id:u.id,cnt:(u.count||0),score:0};}});
    Object.keys(map).forEach(k=>{map[k].score=(map[k].cnt||0)+(usage[k]||0);});
    VMAP=map;VOCAB=Object.values(map);
  }
  function vocabKo(en){const v=VMAP[lc(en)];return v?v.ko:translate(en);}

  function composeHas(en){const k=lc(en);return compose.some(c=>lc(c.en)===k);}
  function addCompose(en){en=String(en||"").trim();if(!en)return false;if(composeHas(en))return false;
    compose.push({en,ko:vocabKo(en)});const k=lc(en);usage[k]=(usage[k]||0)+1;store.set(K_USAGE,JSON.stringify(usage));
    const v=VMAP[k];if(v&&v.id&&sb){v.cnt=(v.cnt||0)+1;const uw=userWords.find(w=>lc(w.en)===k);if(uw)uw.count=v.cnt;sbUpdate(v.id,{count:v.cnt}).catch(()=>{});}
    persistCompose();return true;}
  function removeCompose(en){const k=lc(en);const i=compose.findIndex(c=>lc(c.en)===k);if(i>=0){compose.splice(i,1);persistCompose();return true;}return false;}
  function persistCompose(){store.set(K_COMPOSE,JSON.stringify(compose));}
  function persistWords(){store.set(K_WORDS,JSON.stringify(userWords));}
  function syncDockHeight(){try{document.documentElement.style.setProperty("--dock-h",((dock.hidden||mode==="import")?0:dock.offsetHeight)+"px");}catch(e){}}

  /* 도크: 박스 없이 흐르는 단어들(자동 줄바꿈) · 단어 클릭 시 제거 */
  function renderDock(){
    dockTokens.innerHTML="";
    compose.forEach(c=>{
      const w=document.createElement("span");w.className="fw";w.tabIndex=0;
      const ko=vocabKo(c.en)||c.ko; w.title=(ko?ko+" · ":"")+"클릭하면 제거";
      w.innerHTML='<span class="ft"></span><span class="fx">×</span>';
      w.querySelector(".ft").textContent=c.en;
      const rm=e=>{e.preventDefault();e.stopPropagation();removeCompose(c.en);buildVocab();renderAll();};
      w.addEventListener("click",rm);
      w.addEventListener("keydown",e=>{if(e.key==="Enter"||e.key===" "||e.key==="Backspace"||e.key==="Delete")rm(e);});
      dockTokens.appendChild(w);
    });
    if(compose.length){dock.classList.remove("is-empty");dockCount.textContent=compose.length+"개";}
    else{dock.classList.add("is-empty");dockCount.textContent="";}
    syncDockHeight();
  }

  /* 프리셋(좌측 nav 형태) */
  function allPresets(){return BUILTIN_PRESETS.map(p=>Object.assign({},p,{user:false})).concat(userPresets.map(p=>Object.assign({},p,{user:true})));}
  function renderPresets(){
    presetsEl.innerHTML="";
    allPresets().forEach(p=>{
      const words=p.words||[];const present=words.filter(composeHas).length,total=words.length;const ratio=total?present/total:0;
      const b=document.createElement("button");b.type="button";b.className="pchip";
      if(ratio>=1&&total)b.classList.add("applied");else if(ratio>=0.5&&total)b.classList.add("rec");
      b.title=(p.desc||"")+" · "+words.join(", ")+((ratio>=1&&total)?" · 다시 누르면 해제":"");
      const lab=document.createElement("span");lab.className="pl";lab.textContent=p.label;b.appendChild(lab);
      const pn=document.createElement("span");pn.className="pn";pn.textContent=present+"/"+total;b.appendChild(pn);
      b.addEventListener("click",()=>applyPreset(p));
      if(p.user){const del=document.createElement("button");del.type="button";del.className="pdel";del.setAttribute("aria-label","세트 삭제");
        del.innerHTML='<svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 4l6 6M10 4l-6 6"/></svg>';
        del.addEventListener("click",e=>{e.stopPropagation();deleteUserPreset(p.id);});b.appendChild(del);}
      presetsEl.appendChild(b);
    });
    const save=document.createElement("button");save.type="button";save.className="pchip save";save.textContent="+ 현재 조합 저장";
    save.addEventListener("click",openSavePreset);presetsEl.appendChild(save);
  }
  function applyPreset(p){const words=p.words||[];if(!words.length)return;const present=words.filter(composeHas).length;
    if(present===words.length){words.forEach(removeCompose);toast("‘"+p.label+"’ 해제");}
    else{let n=0;words.forEach(w=>{if(addCompose(w))n++;});toast("‘"+p.label+"’ +"+n+"개");}
    buildVocab();renderAll();}
  function openSavePreset(){if(!compose.length){toast("담긴 단어가 없어요");return;}dockSave.hidden=false;presetName.value="";syncDockHeight();presetName.focus();}
  function cancelSavePreset(){dockSave.hidden=true;syncDockHeight();}
  function commitSavePreset(){if(!compose.length){cancelSavePreset();toast("담긴 단어가 없어요");return;}
    const name=(presetName.value||"").trim();if(!name){toast("세트 이름을 입력하세요");presetName.focus();return;}
    userPresets.push({id:uid(),label:name,desc:"내 세트",words:compose.map(c=>c.en)});store.set(K_PRESETS,JSON.stringify(userPresets));
    dockSave.hidden=true;renderPresets();syncDockHeight();toast("‘"+name+"’ 세트 저장됨");}
  function deleteUserPreset(id){userPresets=userPresets.filter(p=>p.id!==id);store.set(K_PRESETS,JSON.stringify(userPresets));renderPresets();}
  presetSaveOk.addEventListener("click",commitSavePreset);presetSaveCancel.addEventListener("click",cancelSavePreset);
  presetName.addEventListener("keydown",e=>{if(e.key==="Enter"){e.preventDefault();commitSavePreset();}if(e.key==="Escape"){e.preventDefault();cancelSavePreset();}});

  /* 분류 칩(단일 선택) */
  function catCounts(){const c={};CATS.forEach(x=>c[x]=0);VOCAB.forEach(x=>{if(!composeHas(x.en)&&c[x.cat]!=null)c[x.cat]++;});return c;}
  function renderChips(){
    const counts=catCounts();chipsEl.innerHTML="";
    const all=document.createElement("button");all.className="chip";all.type="button";all.setAttribute("aria-pressed",activeCat===null?"true":"false");
    all.textContent="전체";all.addEventListener("click",()=>{activeCat=null;renderChips();renderLib();});chipsEl.appendChild(all);
    CATS.forEach(c=>{if(!counts[c])return;
      const b=document.createElement("button");b.className="chip";b.type="button";b.setAttribute("aria-pressed",activeCat===c?"true":"false");
      b.innerHTML=c+'<span class="n">'+counts[c]+'</span>';
      b.addEventListener("click",()=>{activeCat=(activeCat===c?null:c);renderChips();renderLib();});chipsEl.appendChild(b);});
  }

  /* 단어 그리드(담은 건 숨김 · 풀폭 · ＋버튼 없음) */
  function visible(){
    let items=VOCAB.filter(x=>!composeHas(x.en));
    if(activeCat)items=items.filter(x=>x.cat===activeCat);
    items.sort((a,b)=>(b.score-a.score)||a.en.localeCompare(b.en));
    return items;
  }
  function renderLib(){
    const items=visible();libEl.innerHTML="";
    if(!items.length){libEl.innerHTML='<div class="lib-empty">'+(activeCat?"이 분류엔 더 담을 단어가 없어요.":"모든 단어가 조합에 담겼어요. 아래에서 단어를 눌러 빼보세요.")+'</div>';return;}
    const frag=document.createDocumentFragment();
    items.forEach(item=>{
      const b=document.createElement("button");b.type="button";b.className="wrow";b.dataset.en=item.en;
      const noko=!(item.ko&&item.ko.trim());
      b.innerHTML='<span class="we"></span><span class="wk'+(noko?' untr':'')+'"></span>';
      b.querySelector(".we").textContent=item.en;
      b.querySelector(".wk").textContent=noko?"뜻 미등록":item.ko;
      b.addEventListener("click",()=>{addCompose(item.en);buildVocab();renderAll();});
      frag.appendChild(b);
    });
    libEl.appendChild(frag);
  }

  /* 입력 + 자동완성(검색 겸용) */
  let acItems=[],acActive=-1;
  function closeAc(){acBox.hidden=true;acBox.innerHTML="";acItems=[];acActive=-1;}
  function renderAc(){if(!acItems.length){closeAc();return;}acBox.innerHTML="";
    acItems.forEach((it,i)=>{const d=document.createElement("div");d.className="ai"+(i===acActive?" active":"");
      d.innerHTML='<span class="aen"></span><span class="ako"></span><span class="acat"></span>';
      d.querySelector(".aen").textContent=it.en;d.querySelector(".ako").textContent=it.ko?("· "+it.ko):"";d.querySelector(".acat").textContent=it.cat;
      d.addEventListener("mousedown",e=>{e.preventDefault();acceptAc(i);});
      d.addEventListener("mouseenter",()=>{acActive=i;[...acBox.children].forEach((c,j)=>c.classList.toggle("active",j===i));});
      acBox.appendChild(d);});acBox.hidden=false;}
  function updateAc(){const q=wordInput.value.trim().toLowerCase();if(q.length<1){closeAc();return;}
    const byUse=(a,b)=>b.score-a.score||a.en.localeCompare(b.en);const starts=[],incl=[];
    for(const x of VOCAB){const en=x.en.toLowerCase(),ko=(x.ko||"").toLowerCase();if(en===q)continue;
      if(en.startsWith(q))starts.push(x);else if(en.includes(q)||ko.includes(q))incl.push(x);}
    acItems=starts.sort(byUse).concat(incl.sort(byUse)).slice(0,8);acActive=acItems.length?0:-1;renderAc();}
  function acceptAc(i){const it=acItems[i];if(!it)return;doAdd(it.en);}
  function doAdd(text){const parts=String(text||"").split(/[,\n]+/).map(s=>s.trim()).filter(Boolean);if(!parts.length)return;
    let n=0;parts.forEach(p=>{if(addCompose(p))n++;});wordInput.value="";closeAc();buildVocab();renderAll();
    if(n)toast(n>1?(n+"개 담음"):"담음 · "+parts[0]);else toast("이미 담겨 있어요");wordInput.focus();}
  wordInput.addEventListener("input",updateAc);wordInput.addEventListener("focus",updateAc);
  wordInput.addEventListener("blur",()=>setTimeout(closeAc,120));
  wordInput.addEventListener("keydown",e=>{const acOpen=!acBox.hidden&&acItems.length;
    if(acOpen){if(e.key==="ArrowDown"){e.preventDefault();acActive=(acActive+1)%acItems.length;renderAc();return;}
      if(e.key==="ArrowUp"){e.preventDefault();acActive=(acActive-1+acItems.length)%acItems.length;renderAc();return;}
      if(e.key==="Escape"){e.preventDefault();closeAc();return;}
      if(e.key==="Tab"){e.preventDefault();acceptAc(acActive>=0?acActive:0);return;}}
    if(e.key==="Enter"){e.preventDefault();const q=wordInput.value.trim();if(!q)return;
      if(acOpen&&acActive>0){acceptAc(acActive);return;}
      if(VMAP[lc(q)]){doAdd(q);return;}
      if(acOpen){acceptAc(acActive>=0?acActive:0);return;}doAdd(q);}});
  addWordBtn.addEventListener("click",()=>{if(wordInput.value.trim())doAdd(wordInput.value);else wordInput.focus();});
  document.addEventListener("click",e=>{if(!e.target.closest(".add-row"))closeAc();});

  /* 도크 액션 */
  $("#clearAll").addEventListener("click",()=>{if(!compose.length)return;compose=[];persistCompose();dockSave.hidden=true;buildVocab();renderAll();});
  $("#savePreset").addEventListener("click",openSavePreset);
  $("#copyAll").addEventListener("click",()=>{const text=compose.map(c=>c.en).join(", ");if(!text){toast("담긴 단어가 없어요");return;}
    const done=()=>toast("복사됨 · "+compose.length+"개");
    if(navigator.clipboard&&navigator.clipboard.writeText)navigator.clipboard.writeText(text).then(done,fb);else fb();
    function fb(){const t=document.createElement("textarea");t.value=text;document.body.appendChild(t);t.select();try{document.execCommand("copy");done();}catch(e){toast("복사 실패");}t.remove();}});

  /* 가져오기 */
  let parsed=[];
  splitBtn.addEventListener("click",splitImport);
  async function splitImport(){let src=importInput.value.trim();
    if(!src){if(!navigator.clipboard||!navigator.clipboard.readText){toast("이 브라우저에선 클립보드를 못 읽어요 · 직접 붙여넣어 주세요");return;}
      try{src=((await navigator.clipboard.readText())||"").trim();}catch(e){toast("클립보드를 읽지 못했어요 · 직접 붙여넣어 주세요");return;}
      if(src){importInput.value=src;}else{toast("클립보드가 비어 있어요");return;}}
    const segs=src.split(/[,\n;|]+/).map(s=>s.trim()).filter(Boolean);const seen=new Set();parsed=[];
    for(const s of segs){const k=s.toLowerCase();if(seen.has(k))continue;seen.add(k);parsed.push({en:s,ko:translate(s),exists:!!VMAP[k],sel:false});}
    if(!parsed.length){toast("분리할 내용이 없어요");return;}renderParsed();}
  function renderParsed(){parsedWrap.hidden=false;tokensEl.innerHTML="";
    parsed.forEach(p=>{const t=document.createElement("button");t.type="button";t.className="tok"+(p.exists?" exists":"")+(p.sel?" sel":"");
      t.innerHTML='<span class="en"></span><span class="ko '+(p.ko?'':'untr')+'"></span><span class="flag"></span>';
      t.querySelector(".en").textContent=p.en;t.querySelector(".ko").textContent=p.ko?("("+p.ko+")"):"(뜻 미등록)";
      t.querySelector(".flag").textContent=p.sel?"선택됨":(p.exists?"단어장에 있음":"+ 선택");
      t.addEventListener("click",()=>{p.sel=!p.sel;renderParsed();});tokensEl.appendChild(t);});
    const selN=parsed.filter(p=>p.sel).length,newN=parsed.filter(p=>p.sel&&!p.exists).length;
    composeNEl.textContent=selN?("("+selN+")"):"";saveNEl.textContent=newN?("("+newN+")"):"";
    saveLibBtn.disabled=!newN;toComposeBtn.disabled=!selN;
    aiFillBtn.hidden=!(parsed.some(p=>!p.ko)&&(TRANSLATE_URL||(sb&&sb.functions)));}
  selectAllBtn.addEventListener("click",()=>{const all=parsed.length&&parsed.every(p=>p.sel);parsed.forEach(p=>p.sel=!all);renderParsed();});
  cancelBtn.addEventListener("click",()=>{parsed=[];parsedWrap.hidden=true;tokensEl.innerHTML="";});
  toComposeBtn.addEventListener("click",()=>{const chosen=parsed.filter(p=>p.sel);if(!chosen.length){toast("선택된 단어가 없어요");return;}
    let n=0;chosen.forEach(p=>{if(addCompose(p.en))n++;});buildVocab();renderAll();setMode("lib");toast(n?("작성에 "+n+"개 담음"):"이미 담겨 있어요");});
  saveLibBtn.addEventListener("click",saveImportToLib);
  async function saveImportToLib(){const chosen=parsed.filter(p=>p.sel&&!p.exists);if(!chosen.length){toast("저장할 새 단어가 없어요");return;}
    const fresh=chosen.map(p=>({id:uid(),en:p.en,ko:p.ko||translate(p.en),cat:(CATOF[lc(p.en)]||guessCat(p.en)),count:0}));
    userWords.push(...fresh);persistWords();buildVocab();renderAll();chosen.forEach(p=>p.exists=true);renderParsed();
    toast("단어장에 "+fresh.length+"개 저장");if(sb){sbInsert(fresh).catch(e=>console.error(e));}}

  const TRANSLATE_FN=(window.TRANSLATE_FN||"translate"),TRANSLATE_URL=(window.TRANSLATE_URL||""),TRANSLATE_KEY=(window.TRANSLATE_KEY||"");
  async function aiTranslate(words){if(TRANSLATE_URL){const res=await fetch(TRANSLATE_URL,{method:"POST",
      headers:Object.assign({"content-type":"application/json"},TRANSLATE_KEY?{"authorization":"Bearer "+TRANSLATE_KEY,"apikey":TRANSLATE_KEY}:{}),body:JSON.stringify({words})});
      if(!res.ok)throw new Error("AI 번역 실패 "+res.status);const data=await res.json();return(data&&data.translations)||{};}
    if(!sb||!sb.functions)throw new Error("AI 번역 미설정");const{data,error}=await sb.functions.invoke(TRANSLATE_FN,{body:{words}});if(error)throw error;return(data&&data.translations)||{};}
  aiFillBtn.addEventListener("click",async()=>{const targets=parsed.filter(p=>!p.ko);if(!targets.length)return;
    const prev=aiFillBtn.textContent;aiFillBtn.textContent="번역 중…";aiFillBtn.disabled=true;
    try{const map=await aiTranslate(targets.map(p=>p.en));const low={};Object.keys(map).forEach(k=>low[k.toLowerCase()]=map[k]);
      targets.forEach(p=>{const ko=(map[p.en]||low[p.en.toLowerCase()]||"").trim();if(ko)p.ko=ko;});renderParsed();}
    catch(e){console.error(e);toast("AI 번역을 사용할 수 없어요");}finally{aiFillBtn.textContent=prev;aiFillBtn.disabled=false;}});

  async function sbList(){const{data,error}=await sb.from("words").select("*");if(error)throw error;
    return(data||[]).map(d=>({id:d.id,en:d.en,ko:d.ko||"",cat:d.cat||"기타",count:d.count||0}));}
  async function sbInsert(rows){if(!sb)return;for(const r of rows){const{error}=await sb.from("words").insert({id:r.id,en:r.en,ko:r.ko,cat:r.cat,count:r.count});if(error)console.warn("단어 클라우드 저장 건너뜀:",r.en,error.message||error);}}
  async function sbUpdate(id,patch){if(!sb)return;const{error}=await sb.from("words").update(patch).eq("id",id);if(error)throw error;}

  /* 모드 내비 */
  function setMode(name){mode=name;appEl.setAttribute("data-mode",name);
    document.querySelectorAll(".nav-item").forEach(b=>b.classList.toggle("active",b.dataset.mode===name));
    if(name!=="lib"){closeAc();} if(name!=="presets"){} syncDockHeight();}
  document.querySelectorAll(".nav-item").forEach(b=>b.addEventListener("click",()=>setMode(b.dataset.mode)));

  function renderAll(){renderPresets();renderChips();renderLib();renderDock();}

  (async function init(){
    buildVocab();setMode("lib");renderAll();
    if(!CONFIGURED){setStatus(userWords.length?"demo":"local");return;}
    if(!sb){setStatus(userWords.length?"demo":"error");return;}
    try{const cloud=await sbList();const cset=new Set(cloud.map(w=>lc(w.en)));const localOnly=userWords.filter(w=>!cset.has(lc(w.en)));
      userWords=cloud.concat(localOnly);persistWords();buildVocab();renderAll();setStatus("ok");
      if(localOnly.length)sbInsert(localOnly).catch(()=>{});}
    catch(e){console.error(e);setStatus(userWords.length?"demo":"error");}
  })();
})();
</script>
<script>
(function(){"use strict";var KEY="promptDrawer.theme",root=document.documentElement;
  function read(){try{return localStorage.getItem(KEY);}catch(e){return null;}}function write(v){try{localStorage.setItem(KEY,v);}catch(e){}}
  function apply(t){if(t==="dark")root.setAttribute("data-theme","dark");else root.removeAttribute("data-theme");
    var m=document.querySelector('meta[name="theme-color"]');if(m)m.setAttribute("content",t==="dark"?"#141413":"#fcfbf9");}
  var theme=read()==="dark"?"dark":"light";apply(theme);
  var t=document.getElementById("themeToggle");if(t)t.addEventListener("click",function(){theme=theme==="light"?"dark":"light";apply(theme);write(theme);});
})();
</script>
