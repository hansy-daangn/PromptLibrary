<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>프롬프트 스튜디오</title>
<meta name="theme-color" content="#ffffff">
<link rel="apple-touch-icon" href="./icon-192.png">
<script>try{if(localStorage.getItem("promptDrawer.theme")==="dark")document.documentElement.setAttribute("data-theme","dark");}catch(e){}</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./config.js"></script>
<style>
  /* ===== 라이트(기본) · 인디고 팔레트 (index.html과 동일 계열) ===== */
  :root{
    --bg:#ffffff;--raise:#f3f4f7;--raise-2:#e7e9ef;--line:#ebedf2;--line-soft:#f0f1f5;
    --tx:#1b1c22;--tx-mut:#585c68;--tx-dim:#9a9ea9;
    --accent:#4f46e5;--accent-bright:#4338ca;--accent-soft:#4338ca;
    --accent-tint:rgba(79,70,229,.10);--accent-tint-2:rgba(79,70,229,.18);
    /* 추천(프리셋) 강조용 따뜻한 주황 */
    --rec:#e08a3c;--rec-bright:#c9712a;--rec-tint:rgba(224,138,60,.13);--rec-tint-2:rgba(224,138,60,.22);
    --radius:12px;--radius-sm:9px;
    --shadow:0 8px 24px rgba(30,30,60,.08), 0 1px 3px rgba(30,30,60,.06);
    --input-bg:#f3f4f7;
    --dock-bg:#1b1c24;--dock-tx:#e9eaf2;--dock-dim:#8b8fa1;
    font-synthesis-weight:none;
  }
  :root[data-theme="dark"]{
    --bg:#15161c;--raise:#1f2129;--raise-2:#282b35;--line:#2a2d38;--line-soft:#23252e;
    --tx:#e9eaf2;--tx-mut:#a3a7b5;--tx-dim:#6e7280;
    --accent:#818cf8;--accent-bright:#a5b4fc;--accent-soft:#a5b4fc;
    --accent-tint:rgba(129,140,248,.15);--accent-tint-2:rgba(129,140,248,.28);
    --rec:#e0a060;--rec-bright:#f0b878;--rec-tint:rgba(224,160,96,.16);--rec-tint-2:rgba(224,160,96,.30);
    --shadow:0 14px 40px -18px rgba(0,0,0,.6), 0 2px 8px -2px rgba(0,0,0,.4);
    --input-bg:#1a1c23;
    --dock-bg:#0f1014;--dock-tx:#e9eaf2;--dock-dim:#7c8090;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;background:var(--bg);color:var(--tx);
    font-family:"Pretendard Variable","Pretendard",-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Segoe UI","Malgun Gothic",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;transition:background .25s ease;
  }
  .panel{width:100%;max-width:720px;margin:0 auto;display:block}

  /* ── 탭 헤더 ── */
  .tabs{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:4px;padding:9px 16px;
    background:var(--bg);border-bottom:1px solid var(--line)}
  .tab{appearance:none;border:0;background:none;font:inherit;font-size:13.5px;font-weight:700;color:var(--tx-dim);
    cursor:pointer;padding:7px 12px;border-radius:9px;transition:color .14s,background .14s}
  .tab:hover{color:var(--tx-mut);background:var(--raise)}
  .tab.active{color:var(--tx);background:var(--raise)}
  .tab:focus-visible{outline:2px solid var(--accent-bright);outline-offset:2px}
  .tabs .spacer{margin-left:auto}
  .cloud{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--tx-dim)}
  .cloud.ok{color:#7fa86b}
  .cloud svg{width:12px;height:12px}
  .icon-btn{appearance:none;border:0;background:var(--raise);color:var(--tx-mut);cursor:pointer;
    border-radius:9px;padding:7px 10px;font:inherit;font-size:11.5px;font-weight:600;display:inline-flex;align-items:center;gap:6px}
  .icon-btn:hover{color:var(--tx);background:var(--raise-2)}
  .icon-btn svg{width:13px;height:13px}

  .status{font-size:10.5px;font-weight:600;text-align:center;padding:6px 10px;border-bottom:1px solid var(--line-soft);line-height:1.4}
  .status.demo{color:#cf935f;background:rgba(194,86,11,.08)}
  .status.error{color:#e08a6a;background:rgba(180,60,40,.1)}

  .view{display:none}
  .view.show{display:block}
  .body{padding:16px 16px calc(var(--dock-h,180px) + 24px)}

  /* ── 공통 입력행 ── */
  .add-row{display:flex;gap:6px;background:var(--raise);border-radius:14px;padding:6px;position:relative}
  .add-row input,.add-row textarea{flex:1;min-width:0;background:none;border:0;color:var(--tx);
    border-radius:0;padding:9px 12px;font:inherit;font-size:13.5px;resize:none}
  .add-row input:focus,.add-row textarea:focus{outline:none}
  .add-row input::placeholder,.add-row textarea::placeholder{color:var(--tx-dim)}
  .add-row textarea{min-height:74px;line-height:1.6}
  .add-btn{flex:none;appearance:none;font:inherit;font-size:12px;font-weight:700;border-radius:var(--radius-sm);
    padding:0 16px;cursor:pointer;border:0;background:var(--accent);color:#fff;
    display:inline-flex;align-items:center;gap:5px;transition:background .15s,transform .05s}
  .add-btn:hover{background:var(--accent-bright)}
  .add-btn:active{transform:translateY(1px)}
  .add-btn:disabled{opacity:.5;cursor:default}
  .add-btn .p{font-size:14px;font-weight:800;line-height:1}
  .add-row.col{flex-direction:column;align-items:stretch}
  .add-row.col textarea{padding:10px 12px}
  .add-btn.wide{justify-content:center;padding:11px}

  /* 자동완성 */
  .ac{position:absolute;top:calc(100% + 4px);left:0;right:0;z-index:45;background:var(--raise);
    border:1px solid var(--line);border-radius:10px;padding:4px;box-shadow:var(--shadow);max-height:260px;overflow:auto}
  .ac .ai{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:6px;cursor:pointer;font-size:12.5px;color:var(--tx)}
  .ac .ai .aen{font-weight:700;white-space:nowrap}
  .ac .ai .ako{color:var(--tx-dim);font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1 1 auto;min-width:0}
  .ac .ai .acat{margin-left:auto;flex:none;font-size:9.5px;color:var(--tx-dim);background:var(--bg);border:1px solid var(--line-soft);border-radius:999px;padding:1px 7px}
  .ac .ai:hover,.ac .ai.active{background:var(--raise-2)}
  .ac .ai.active{outline:1px solid var(--accent);outline-offset:-1px}

  .section-label{font-size:10px;color:var(--tx-dim);font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin:20px 2px 9px;display:flex;align-items:center;gap:8px}
  .section-label .hint{font-weight:600;text-transform:none;letter-spacing:0;color:var(--tx-dim)}
  .section-label .link{margin-left:auto;appearance:none;border:0;background:none;color:var(--accent-soft);font:inherit;font-size:11px;font-weight:700;cursor:pointer;padding:3px 7px;border-radius:6px;text-transform:none;letter-spacing:0}
  .section-label .link:hover{background:var(--accent-tint)}

  /* ── 프리셋 칩 ── */
  .presets{display:flex;flex-wrap:wrap;gap:6px}
  .pchip{appearance:none;font:inherit;font-size:12px;font-weight:650;border:1px solid var(--line);background:var(--raise);
    color:var(--tx-mut);border-radius:999px;padding:6px 12px;cursor:pointer;transition:.13s;display:inline-flex;align-items:center;gap:6px;position:relative}
  .pchip:hover{color:var(--tx);border-color:var(--btn-hover-line,var(--line));background:var(--raise-2)}
  .pchip .pn{font-size:10px;color:var(--tx-dim);font-variant-numeric:tabular-nums}
  /* 추천(절반 이상 포함): 따뜻한 주황 — '클릭하고 싶게' */
  .pchip.rec{background:var(--rec-tint);border-color:var(--rec);color:var(--rec-bright)}
  .pchip.rec .pn{color:var(--rec-bright)}
  .pchip.rec:hover{background:var(--rec-tint-2)}
  /* 전부 포함(적용됨) */
  .pchip.applied{background:var(--accent);border-color:var(--accent);color:#fff}
  .pchip.applied .pn{color:rgba(255,255,255,.8)}
  .pchip.save{border-style:dashed;color:var(--tx-dim);background:none}
  .pchip.save:hover{color:var(--accent-soft);border-color:var(--accent)}
  .pchip .pdel{appearance:none;border:0;background:none;color:inherit;opacity:.55;cursor:pointer;padding:0;margin:-2px -4px -2px 0;width:15px;height:15px;display:grid;place-items:center;border-radius:50%}
  .pchip .pdel:hover{opacity:1;background:rgba(0,0,0,.12)}
  .pchip .pdel svg{width:9px;height:9px}

  /* ── 분류 칩 ── */
  .chips{display:flex;flex-wrap:wrap;gap:5px}
  .chip{appearance:none;font:inherit;font-size:11px;font-weight:600;flex:none;border:0;background:var(--raise-2);color:var(--tx-mut);
    border-radius:999px;padding:5px 11px;cursor:pointer;transition:.13s;display:inline-flex;align-items:center;gap:5px}
  .chip:hover{color:var(--tx);background:var(--raise)}
  .chip[aria-pressed="true"]{background:var(--accent);color:#fff}
  .chip .n{font-size:10px;color:var(--tx-dim)}
  .chip[aria-pressed="true"] .n{color:rgba(255,255,255,.75)}
  .chip.clear{background:none;color:var(--tx-dim);border:1px dashed var(--line)}

  .search{display:flex;align-items:center;gap:7px;background:var(--raise);border:0;border-radius:var(--radius-sm);padding:7px 10px;margin:9px 0}
  .search svg{width:13px;height:13px;color:var(--tx-dim);flex:none}
  .search input{flex:1;background:none;border:0;color:var(--tx);font:inherit;font-size:12.5px;outline:none}
  .search input::placeholder{color:var(--tx-dim)}
  .search .x{appearance:none;border:0;background:none;color:var(--tx-dim);cursor:pointer;font-size:15px;line-height:1;padding:0 2px}
  .search .x:hover{color:var(--tx)}

  /* ── 단어장 그리드 (영어 위 · 한글 아래) ── */
  .lib{display:flex;flex-wrap:wrap;gap:7px}
  .wrow{position:relative;display:flex;align-items:center;gap:6px;max-width:300px;background:var(--raise);border:1.5px solid transparent;
    border-radius:10px;padding:6px 11px;cursor:pointer;transition:background .12s,border-color .12s;text-align:left}
  .wrow:hover{background:var(--raise-2)}
  .wrow:focus-visible{outline:2px solid var(--accent-bright);outline-offset:1px}
  .wrow.in{background:var(--accent-tint);border-color:var(--accent)}
  .wrow .wtx{display:flex;flex-direction:column;min-width:0}
  .wrow .we{font-size:12.5px;font-weight:700;color:var(--tx);line-height:1.25;overflow-wrap:anywhere}
  .wrow .wk{font-size:10.5px;color:var(--tx-mut);line-height:1.2;overflow-wrap:anywhere}
  .wrow .wk.untr{color:var(--tx-dim);font-style:italic}
  .wrow.in .we{color:var(--accent-soft)}
  .wrow .wck{flex:none;width:15px;height:15px;display:none;place-items:center;color:var(--accent-soft)}
  .wrow.in .wck{display:grid}
  .wrow .wck svg{width:13px;height:13px}

  .empty{text-align:center;padding:24px 16px;color:var(--tx-dim);background:var(--raise);border-radius:var(--radius)}
  .empty .big{font-size:23px;margin-bottom:8px;opacity:.8}
  .empty p{margin:0;font-size:12px;line-height:1.6}

  /* ── 분리 결과(가져오기) ── */
  .parsed{margin-top:14px;border-radius:var(--radius);background:var(--raise);padding:12px}
  .parsed-head{display:flex;align-items:center;gap:8px;margin-bottom:9px}
  .seg-label{font-size:10px;color:var(--tx-dim);font-weight:700;text-transform:uppercase;letter-spacing:.6px}
  .parsed-head .link{margin-left:auto;appearance:none;border:0;background:none;color:var(--tx-mut);font:inherit;font-size:11px;font-weight:650;cursor:pointer;padding:3px 7px;border-radius:6px}
  .parsed-head .link:hover{color:var(--accent-soft);background:var(--raise-2)}
  .parsed-head .link.ai{color:var(--accent-soft)}
  .tokens{display:flex;flex-wrap:wrap;align-items:flex-start;gap:6px}
  .tok{display:inline-flex;align-items:baseline;gap:5px;background:var(--bg);border:1.5px solid transparent;border-radius:8px;padding:5px 9px;cursor:pointer;font-size:12px;color:var(--tx);position:relative;white-space:nowrap;transition:border-color .12s,background .12s}
  .tok .en{font-weight:700}
  .tok .ko{font-size:11px;color:var(--tx-mut)}
  .tok .ko.untr{color:var(--tx-dim);font-style:italic}
  .tok .flag{position:absolute;top:-9px;right:-6px;background:var(--accent);color:#fff;font-size:9px;font-weight:700;padding:2px 5px;border-radius:5px;opacity:0;transform:translateY(3px);transition:.12s;pointer-events:none;white-space:nowrap}
  .tok:hover{border-color:var(--accent);background:var(--accent-tint)}
  .tok:hover .flag{opacity:1;transform:translateY(0)}
  .tok.sel{border-color:var(--accent);background:var(--accent-tint-2);color:var(--accent-soft)}
  .tok.sel .flag{opacity:1;transform:translateY(0)}
  .tok.exists{border-style:dashed;border-color:var(--line)}
  .tok.exists.sel{border-style:solid}
  .parsed-foot{display:flex;align-items:center;justify-content:flex-end;gap:8px;margin-top:12px;flex-wrap:wrap}
  .btn{appearance:none;font:inherit;font-size:12px;font-weight:650;border-radius:8px;padding:8px 13px;cursor:pointer;border:0;background:var(--raise-2);color:var(--tx);transition:background .15s,transform .05s}
  .btn:hover{background:var(--line)}
  .btn:active{transform:translateY(1px)}
  .btn.ghost{background:none;color:var(--tx-mut)}
  .btn.ghost:hover{color:var(--tx);background:var(--raise-2)}
  .btn.primary{background:var(--accent);color:#fff}
  .btn.primary:hover{background:var(--accent-bright)}
  .btn:disabled{opacity:.45;cursor:default}

  .note{margin-top:14px;font-size:11.5px;line-height:1.7;color:var(--tx-dim);background:var(--raise);border-radius:var(--radius);padding:14px 15px}
  .note b{color:var(--accent-soft);font-weight:700}

  /* ── 하단 조합 도크 (뜻 확인 가능) ── */
  .dock{position:fixed;left:0;right:0;bottom:0;z-index:40;background:var(--dock-bg)}
  .dock-in{max-width:720px;margin:0 auto;padding:11px 16px calc(12px + env(safe-area-inset-bottom))}
  .dock-top{display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .dock-top .t{font-size:10px;font-weight:700;color:var(--dock-dim);text-transform:uppercase;letter-spacing:.6px}
  .dock-top .c{font-size:10.5px;color:var(--dock-dim);font-variant-numeric:tabular-nums}
  .dock-top .acts{margin-left:auto;display:flex;gap:6px}
  .dock-top .acts button{appearance:none;border:0;border-radius:9px;padding:7px 13px;font:inherit;font-size:12px;font-weight:700;cursor:pointer}
  .dsave{background:rgba(255,255,255,.10);color:var(--dock-tx)}
  .dsave:hover{background:rgba(255,255,255,.18)}
  .dclear{background:none;color:var(--dock-dim)}
  .dclear:hover{color:var(--dock-tx)}
  .dcopy{background:var(--accent);color:#fff}
  .dcopy:hover{background:var(--accent-bright)}
  .dock-save{display:flex;gap:6px;margin-bottom:8px}
  .dock-save input{flex:1;min-width:0;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);border-radius:8px;color:var(--dock-tx);font:inherit;font-size:12px;padding:8px 10px}
  .dock-save input::placeholder{color:var(--dock-dim)}
  .dock-save input:focus{outline:none;border-color:var(--accent)}
  .dock-save button{appearance:none;border:0;border-radius:8px;padding:8px 12px;font:inherit;font-size:12px;font-weight:700;cursor:pointer}
  .dock-save .psok{background:var(--accent);color:#fff}
  .dock-save .pscancel{background:none;color:var(--dock-dim)}
  .dock.is-empty .dock-save{display:none}
  .dock-tokens{display:flex;flex-wrap:wrap;gap:6px;max-height:148px;overflow:auto}
  .dtok{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.09);
    border-radius:8px;padding:4px 5px 4px 9px}
  .dtok .dtx{display:flex;flex-direction:column;line-height:1.15}
  .dtok .de{font-size:12px;font-weight:700;color:var(--dock-tx);font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
  .dtok .dk{font-size:9.5px;color:var(--dock-dim)}
  .dtok .x{appearance:none;border:0;background:none;color:var(--dock-dim);cursor:pointer;width:16px;height:16px;border-radius:50%;display:grid;place-items:center;padding:0}
  .dtok .x:hover{background:rgba(255,255,255,.15);color:#fff}
  .dtok .x svg{width:9px;height:9px;display:block}
  .dock-empty{font-size:12px;color:var(--dock-dim);padding:6px 2px}
  .dock-preview{margin-top:9px;font-size:10.5px;line-height:1.5;color:var(--dock-dim);font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
    word-break:break-word;border-top:1px solid rgba(255,255,255,.07);padding-top:8px}
  .dock.is-empty .dock-tokens,.dock.is-empty .acts,.dock.is-empty .dock-preview{display:none}
  .dock:not(.is-empty) .dock-empty{display:none}

  /* 토스트 */
  .toast{position:fixed;bottom:160px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--dock-bg);color:#fff;
    font-size:12px;font-weight:600;padding:8px 14px;border-radius:9px;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:.2s;z-index:60}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
  @media (max-width:430px){.tab{font-size:12.5px;padding:7px 9px}}
</style>
</head>
<body>
  <div class="panel" role="application" aria-label="프롬프트 스튜디오">
    <div class="tabs" role="tablist">
      <button class="tab active" type="button" role="tab" aria-selected="true" data-tab="compose">작성하기</button>
      <button class="tab" type="button" role="tab" aria-selected="false" data-tab="import">가져오기</button>
      <span class="spacer"></span>
      <span class="cloud" id="cloud" hidden><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/></svg><span id="cloudTxt"></span></span>
      <button class="icon-btn" id="themeToggle" type="button" aria-label="테마 변경">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 3a9 9 0 0 1 0 18z" fill="currentColor" stroke="none"/></svg></button>
    </div>

    <div class="status" id="status" hidden></div>

    <!-- ───────── 작성하기 ───────── -->
    <section class="view show" data-view="compose" role="tabpanel">
      <div class="body">
        <div class="add-row">
          <input id="word" type="text" placeholder="단어 입력 후 Enter로 담기 · 자동완성" autocomplete="off">
          <button class="add-btn" id="addWordBtn"><span class="p">+</span>담기</button>
          <div class="ac" id="acBox" hidden></div>
        </div>

        <div class="section-label">프리셋 세트 <span class="hint">· 누르면 단어 묶음이 한 번에 담겨요</span></div>
        <div class="presets" id="presets"></div>

        <div class="section-label">단어장 <span class="hint">· 영어 단어 + 한글 뜻 · 눌러서 담기</span></div>
        <div class="chips" id="chips"></div>
        <div class="search" id="searchBox">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
          <input id="searchInput" type="text" placeholder="영어·한글 검색" autocomplete="off">
          <button class="x" id="searchClear" hidden aria-label="검색 지우기">×</button>
        </div>
        <div class="lib" id="lib"></div>
      </div>
    </section>

    <!-- ───────── 가져오기 ───────── -->
    <section class="view" data-view="import" role="tabpanel" hidden>
      <div class="body">
        <div class="add-row col">
          <textarea id="importInput" placeholder="프롬프트를 붙여넣으세요 · 비우고 누르면 클립보드에서 가져옵니다"></textarea>
          <button class="add-btn wide" id="splitBtn">붙여넣은 프롬프트 분리하기</button>
        </div>

        <div class="parsed" id="parsedWrap" hidden>
          <div class="parsed-head">
            <span class="seg-label">분리 결과 · 뜻 확인 후 선택</span>
            <button class="link ai" id="aiFill" hidden>AI로 뜻 채우기</button>
            <button class="link" id="selectAll">전체</button>
          </div>
          <div class="tokens" id="tokens"></div>
          <div class="parsed-foot">

  const $=s=>document.querySelector(s);
  const lc=s=>String(s||"").toLowerCase().trim();

  /* ---------- DOM ---------- */
  const wordInput=$("#word"), addWordBtn=$("#addWordBtn"), acBox=$("#acBox");
  const presetsEl=$("#presets"), chipsEl=$("#chips"), libEl=$("#lib");
  const searchBox=$("#searchBox"), searchInput=$("#searchInput"), searchClear=$("#searchClear");
  const dock=$("#dock"), dockTokens=$("#dockTokens"), dockCount=$("#dockCount"), dockPreview=$("#dockPreview");
  const dockSave=$("#dockSave"), presetName=$("#presetName"), presetSaveOk=$("#presetSaveOk"), presetSaveCancel=$("#presetSaveCancel");
  const importInput=$("#importInput"), splitBtn=$("#splitBtn"), parsedWrap=$("#parsedWrap"), tokensEl=$("#tokens");
  const selectAllBtn=$("#selectAll"), cancelBtn=$("#cancelParse"), saveLibBtn=$("#saveLib"), toComposeBtn=$("#toCompose");
  const saveNEl=$("#saveN"), composeNEl=$("#composeN"), aiFillBtn=$("#aiFill");
  const statusEl=$("#status"), cloudEl=$("#cloud"), cloudTxt=$("#cloudTxt"), toastEl=$("#toast");
  let toastTimer;
  function toast(m){toastEl.textContent=m;toastEl.classList.add("show");clearTimeout(toastTimer);toastTimer=setTimeout(()=>toastEl.classList.remove("show"),1500);}

  function setStatus(kind){
    if(kind==="ok"){statusEl.hidden=true;cloudEl.hidden=false;cloudEl.className="cloud ok";cloudTxt.textContent="동기화됨";return;}
    cloudEl.hidden=true;
    if(kind==="local"){statusEl.hidden=true;return;}   // 로컬 단어가 없으면 굳이 안내 안 함
    statusEl.hidden=false;statusEl.className="status demo";   // 앱은 기본 단어장으로 완전히 동작하므로 경고색(빨강) 대신 차분한 안내
    statusEl.textContent = kind==="demo"
      ? "로컬 모드 · config.js에 Supabase 키를 넣으면 내 단어가 클라우드에 저장돼요"
      : "오프라인 · 기본 단어장으로 동작 중이에요 (내 저장 단어는 연결되면 동기화)";
  }

  /* ---------- 단어장(vocab) 구성 ---------- */
  function buildVocab(){
    const map={};
    BUILTIN.forEach(w=>{ const k=w.e.toLowerCase(); map[k]={en:w.e,ko:w.k,cat:w.c,builtin:true,cnt:0,score:0}; });
    userWords.forEach(u=>{ const k=lc(u.en); if(!k) return;
      if(map[k]){ map[k].id=u.id; map[k].cnt=Math.max(map[k].cnt||0,u.count||0); }   // 빌트인 단어는 분류/뜻 유지(오분류 자동 교정)
      else { let cat=CATOF[k]||u.cat||guessCat(u.en); if(CATS.indexOf(cat)===-1) cat="기타";
             map[k]={en:u.en,ko:(u.ko&&u.ko.trim())||translate(u.en),cat:cat,id:u.id,cnt:(u.count||0),score:0}; }
    });
    Object.keys(map).forEach(k=>{ map[k].score=(map[k].cnt||0)+(usage[k]||0); });   // 정렬 점수 = Supabase 카운트 + 로컬 사용수
    VMAP=map; VOCAB=Object.values(map);
  }
  function vocabKo(en){ const v=VMAP[lc(en)]; return v?v.ko:translate(en); }

  /* ---------- 조합(compose) ---------- */
  function composeHas(en){ const k=lc(en); return compose.some(c=>lc(c.en)===k); }
  function addCompose(en){
    en=String(en||"").trim(); if(!en) return false;
    if(composeHas(en)) return false;
    compose.push({en, ko:vocabKo(en)});
    const k=lc(en); usage[k]=(usage[k]||0)+1; store.set(K_USAGE,JSON.stringify(usage));
    // 사용자 단어면 Supabase '원본 카운트'(usage 미포함)만 +1 해서 누적 부풀림 방지
    const v=VMAP[k]; if(v&&v.id&&sb){ v.cnt=(v.cnt||0)+1; const uw=userWords.find(w=>lc(w.en)===k); if(uw) uw.count=v.cnt; sbUpdate(v.id,{count:v.cnt}).catch(()=>{}); }
    persistCompose(); return true;
  }
  function removeCompose(en){ const k=lc(en); const i=compose.findIndex(c=>lc(c.en)===k); if(i>=0){compose.splice(i,1);persistCompose();return true;} return false; }
  function toggleCompose(en){ if(composeHas(en)) removeCompose(en); else addCompose(en); buildVocab(); renderAll(); }
  function persistCompose(){ store.set(K_COMPOSE,JSON.stringify(compose)); }
  function persistWords(){ store.set(K_WORDS,JSON.stringify(userWords)); }
  // 도크 높이를 측정해 본문 하단 여백을 맞춤(긴 조합이 마지막 단어를 가리지 않도록)
  function syncDockHeight(){ try{ document.documentElement.style.setProperty("--dock-h",(dock.hidden?0:dock.offsetHeight)+"px"); }catch(e){} }

  function renderDock(){
    dockTokens.innerHTML="";
    compose.forEach(c=>{
      const t=document.createElement("span"); t.className="dtok";
      t.innerHTML='<span class="dtx"><span class="de"></span><span class="dk"></span></span>'+
        '<button class="x" type="button" aria-label="제거"><svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 4l6 6M10 4l-6 6"/></svg></button>';
      t.querySelector(".de").textContent=c.en;
      const k=vocabKo(c.en)||c.ko;                 // 최신 뜻 우선(나중에 등록된 뜻이 반영되도록)
      const dk=t.querySelector(".dk"); if(k) dk.textContent=k; else dk.remove();
      t.querySelector(".x").addEventListener("click",e=>{e.stopPropagation();removeCompose(c.en);buildVocab();renderAll();});
      dockTokens.appendChild(t);
    });
    if(compose.length){
      dock.classList.remove("is-empty");
      dockCount.textContent=compose.length+"개";
      dockPreview.textContent=compose.map(c=>c.en).join(", ");
    }else{
      dock.classList.add("is-empty"); dockCount.textContent="";
    }
    syncDockHeight();
  }

  /* ---------- 프리셋 ---------- */
  function allPresets(){
    return BUILTIN_PRESETS.map(p=>Object.assign({},p,{user:false}))
      .concat(userPresets.map(p=>Object.assign({},p,{user:true})));
  }
  function renderPresets(){
    presetsEl.innerHTML="";
    allPresets().forEach(p=>{
      const words=p.words||[];
      const present=words.filter(composeHas).length, total=words.length;
      const ratio=total?present/total:0;
      const b=document.createElement("button"); b.type="button"; b.className="pchip";
      if(ratio>=1&&total) b.classList.add("applied");
      else if(ratio>=0.5&&total) b.classList.add("rec");
      b.title=(p.desc||"")+" · "+words.join(", ")+((ratio>=1&&total)?" · 다시 누르면 해제":"");
      const lab=document.createElement("span"); lab.className="pl"; lab.textContent=p.label; b.appendChild(lab);
      const pn=document.createElement("span"); pn.className="pn"; pn.textContent=present+"/"+total; b.appendChild(pn);
      b.addEventListener("click",()=>applyPreset(p));
      if(p.user){
        const del=document.createElement("button"); del.type="button"; del.className="pdel"; del.setAttribute("aria-label","세트 삭제");
        del.innerHTML='<svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 4l6 6M10 4l-6 6"/></svg>';
        del.addEventListener("click",e=>{e.stopPropagation();deleteUserPreset(p.id);});
        b.appendChild(del);
      }
      presetsEl.appendChild(b);
    });
    const save=document.createElement("button"); save.type="button"; save.className="pchip save";
    save.textContent="+ 현재 조합 저장";
    save.addEventListener("click",openSavePreset);
    presetsEl.appendChild(save);
  }
  function applyPreset(p){
    const words=p.words||[]; if(!words.length) return;
    const present=words.filter(composeHas).length;
    if(present===words.length){ words.forEach(removeCompose); toast("‘"+p.label+"’ 해제"); }
    else{ let n=0; words.forEach(w=>{ if(addCompose(w)) n++; }); toast("‘"+p.label+"’ +"+n+"개"); }
    buildVocab(); renderAll();
  }
  // window.prompt 는 일부 인앱 브라우저(카카오톡 등)에서 막히므로 도크 내부 인라인 입력 사용
  function openSavePreset(){
    if(!compose.length){ toast("담긴 단어가 없어요"); return; }
    dockSave.hidden=false; presetName.value=""; syncDockHeight(); presetName.focus();
  }
  function cancelSavePreset(){ dockSave.hidden=true; syncDockHeight(); }
  function commitSavePreset(){
    if(!compose.length){ cancelSavePreset(); toast("담긴 단어가 없어요"); return; }
    const name=(presetName.value||"").trim();
    if(!name){ toast("세트 이름을 입력하세요"); presetName.focus(); return; }
    userPresets.push({id:uid(),label:name,desc:"내 세트",words:compose.map(c=>c.en)});
    store.set(K_PRESETS,JSON.stringify(userPresets));
    dockSave.hidden=true; renderPresets(); syncDockHeight(); toast("‘"+name+"’ 세트 저장됨");
  }
  presetSaveOk.addEventListener("click",commitSavePreset);
  presetSaveCancel.addEventListener("click",cancelSavePreset);
  presetName.addEventListener("keydown",e=>{ if(e.key==="Enter"){e.preventDefault();commitSavePreset();} if(e.key==="Escape"){e.preventDefault();cancelSavePreset();} });
  function deleteUserPreset(id){
    userPresets=userPresets.filter(p=>p.id!==id);
    store.set(K_PRESETS,JSON.stringify(userPresets));
    renderPresets();
  }

  /* ---------- 분류 칩 ---------- */
  function catCounts(){const c={};CATS.forEach(x=>c[x]=0);VOCAB.forEach(x=>{if(c[x.cat]!=null)c[x.cat]++;});return c;}
  function renderChips(){
    const counts=catCounts(); chipsEl.innerHTML="";
    CATS.forEach(c=>{
      if(!counts[c]) return;
      const b=document.createElement("button"); b.className="chip"; b.type="button";
      b.setAttribute("aria-pressed",activeCats.has(c)?"true":"false");
      b.innerHTML=c+'<span class="n">'+counts[c]+'</span>';
      b.addEventListener("click",()=>{activeCats.has(c)?activeCats.delete(c):activeCats.add(c);renderChips();renderLib();});
      chipsEl.appendChild(b);
    });
    if(activeCats.size){
      const clr=document.createElement("button"); clr.className="chip clear"; clr.type="button"; clr.textContent="전체";
      clr.addEventListener("click",()=>{activeCats.clear();renderChips();renderLib();});
      chipsEl.appendChild(clr);
    }
  }

  /* ---------- 단어장 그리드 ---------- */
  function visible(){
    let items=VOCAB.slice();
    if(activeCats.size) items=items.filter(x=>activeCats.has(x.cat));
    if(query) items=items.filter(x=>x.en.toLowerCase().includes(query)||(x.ko||"").toLowerCase().includes(query));
    items.sort((a,b)=>(b.score-a.score)||a.en.localeCompare(b.en));
    return items;
  }
  function renderLib(){
    const items=visible(); libEl.innerHTML="";
    if(!items.length){
      libEl.innerHTML='<div class="empty"><p>'+(query?"검색 결과가 없어요.":"표시할 단어가 없어요.")+'</p></div>';
      return;
    }
    const frag=document.createDocumentFragment();
    items.slice(0,1500).forEach(item=>{
      const inComp=composeHas(item.en);
      const b=document.createElement("button"); b.type="button"; b.className="wrow"+(inComp?" in":""); b.dataset.en=item.en;
      const noko=!(item.ko&&item.ko.trim());
      b.innerHTML='<span class="wtx"><span class="we"></span><span class="wk'+(noko?' untr':'')+'"></span></span>'+
        '<span class="wck"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M5 12l4.5 4.5L19 7"/></svg></span>';
      b.querySelector(".we").textContent=item.en;
      b.querySelector(".wk").textContent=noko?"뜻 미등록":item.ko;
      b.addEventListener("click",()=>toggleCompose(item.en));
      frag.appendChild(b);
    });
    libEl.appendChild(frag);
  }

  /* ---------- 검색 ---------- */
  searchInput.addEventListener("input",()=>{query=searchInput.value.trim().toLowerCase();searchClear.hidden=!query;renderLib();});
  searchInput.addEventListener("keydown",e=>{if(e.key==="Escape"){searchInput.value="";query="";searchClear.hidden=true;renderLib();}});
  searchClear.addEventListener("click",()=>{searchInput.value="";query="";searchClear.hidden=true;renderLib();searchInput.focus();});

  /* ---------- 단어 입력 + 자동완성 ---------- */
  let acItems=[], acActive=-1;
  function closeAc(){ acBox.hidden=true; acBox.innerHTML=""; acItems=[]; acActive=-1; }
  function renderAc(){
    if(!acItems.length){ closeAc(); return; }
    acBox.innerHTML="";
    acItems.forEach((it,i)=>{
      const d=document.createElement("div"); d.className="ai"+(i===acActive?" active":"");
      d.innerHTML='<span class="aen"></span><span class="ako"></span><span class="acat"></span>';
      d.querySelector(".aen").textContent=it.en;
      d.querySelector(".ako").textContent=it.ko?("· "+it.ko):"";
      d.querySelector(".acat").textContent=it.cat;
      d.addEventListener("mousedown",e=>{ e.preventDefault(); acceptAc(i); });
      d.addEventListener("mouseenter",()=>{ acActive=i; [...acBox.children].forEach((c,j)=>c.classList.toggle("active",j===i)); });
      acBox.appendChild(d);
    });
    acBox.hidden=false;
  }
  function updateAc(){
    const q=wordInput.value.trim().toLowerCase();
    if(q.length<1){ closeAc(); return; }
    const byUse=(a,b)=>b.score-a.score||a.en.localeCompare(b.en);
    const starts=[], incl=[];
    for(const x of VOCAB){
      const en=x.en.toLowerCase(), ko=(x.ko||"").toLowerCase();
      if(en===q){ continue; }
      if(en.startsWith(q)) starts.push(x);
      else if(en.includes(q)||ko.includes(q)) incl.push(x);
    }
    acItems=starts.sort(byUse).concat(incl.sort(byUse)).slice(0,8);
    acActive=acItems.length?0:-1; renderAc();
  }
  function acceptAc(i){ const it=acItems[i]; if(!it) return; doAdd(it.en); }
  function doAdd(text){
    const parts=String(text||"").split(/[,\n]+/).map(s=>s.trim()).filter(Boolean);
    if(!parts.length) return;
    let n=0; parts.forEach(p=>{ if(addCompose(p)) n++; });
    wordInput.value=""; closeAc(); buildVocab(); renderAll();
    if(n) toast(n>1?(n+"개 담음"):"담음 · "+parts[0]); else toast("이미 담겨 있어요");
    wordInput.focus();
  }
  wordInput.addEventListener("input",updateAc);
  wordInput.addEventListener("focus",updateAc);
  wordInput.addEventListener("blur",()=>setTimeout(closeAc,120));
  wordInput.addEventListener("keydown",e=>{
    const acOpen=!acBox.hidden && acItems.length;
    if(acOpen){
      if(e.key==="ArrowDown"){e.preventDefault();acActive=(acActive+1)%acItems.length;renderAc();return;}
      if(e.key==="ArrowUp"){e.preventDefault();acActive=(acActive-1+acItems.length)%acItems.length;renderAc();return;}
      if(e.key==="Escape"){e.preventDefault();closeAc();return;}
      if(e.key==="Tab"){e.preventDefault();acceptAc(acActive>=0?acActive:0);return;}   // Tab = 추천 자동완성
    }
    if(e.key==="Enter"){
      e.preventDefault();
      const q=wordInput.value.trim(); if(!q) return;
      if(acOpen && acActive>0){ acceptAc(acActive); return; }  // 사용자가 화살표로 직접 고른 추천 우선
      if(VMAP[lc(q)]){ doAdd(q); return; }                     // 정확히 일치하는 단어는 그대로 담기
      if(acOpen){ acceptAc(acActive>=0?acActive:0); return; }  // 부분 입력이면 맨 위 추천 사용
      doAdd(q);                                                // 그 외엔 입력 그대로 담기
    }
  });
  addWordBtn.addEventListener("click",()=>{ if(wordInput.value.trim()) doAdd(wordInput.value); else wordInput.focus(); });
  document.addEventListener("click",e=>{ if(!e.target.closest(".add-row")) closeAc(); });

  /* ---------- 도크 액션 ---------- */
  $("#clearAll").addEventListener("click",()=>{ if(!compose.length)return; compose=[]; persistCompose(); dockSave.hidden=true; buildVocab(); renderAll(); });
  $("#savePreset").addEventListener("click",openSavePreset);
  $("#copyAll").addEventListener("click",()=>{
    const text=compose.map(c=>c.en).join(", ");
    if(!text){ toast("담긴 단어가 없어요"); return; }
    const done=()=>toast("복사됨 · "+compose.length+"개");
    if(navigator.clipboard&&navigator.clipboard.writeText) navigator.clipboard.writeText(text).then(done,fb); else fb();
    function fb(){const t=document.createElement("textarea");t.value=text;document.body.appendChild(t);t.select();try{document.execCommand("copy");done();}catch(e){toast("복사 실패");}t.remove();}
  });

  /* ---------- 가져오기: 분리 ---------- */
  let parsed=[];
  splitBtn.addEventListener("click",splitImport);
  async function splitImport(){
    let src=importInput.value.trim();
    if(!src){
      if(!navigator.clipboard||!navigator.clipboard.readText){ toast("이 브라우저에선 클립보드를 못 읽어요 · 직접 붙여넣어 주세요"); return; }
      try{ src=((await navigator.clipboard.readText())||"").trim(); }catch(e){ toast("클립보드를 읽지 못했어요 · 직접 붙여넣어 주세요"); return; }
      if(src){ importInput.value=src; }
      else{ toast("클립보드가 비어 있어요"); return; }
    }
    const segs=src.split(/[,\n;|]+/).map(s=>s.trim()).filter(Boolean);   // 마침표(.)로는 분리하지 않음 — 가중치/소수(예: (masterpiece:1.2)) 보존
    const seen=new Set(); parsed=[];
    for(const s of segs){ const k=s.toLowerCase(); if(seen.has(k))continue; seen.add(k);
      parsed.push({en:s, ko:translate(s), exists:!!VMAP[k], sel:false});
    }
    if(!parsed.length){ toast("분리할 내용이 없어요"); return; }
    renderParsed();
  }
  function renderParsed(){
    parsedWrap.hidden=false; tokensEl.innerHTML="";
    parsed.forEach(p=>{
      const t=document.createElement("button"); t.type="button";
      t.className="tok"+(p.exists?" exists":"")+(p.sel?" sel":"");
      t.innerHTML='<span class="en"></span><span class="ko '+(p.ko?'':'untr')+'"></span><span class="flag"></span>';
      t.querySelector(".en").textContent=p.en;
      t.querySelector(".ko").textContent=p.ko?("("+p.ko+")"):"(뜻 미등록)";
      t.querySelector(".flag").textContent=p.sel?"선택됨":(p.exists?"단어장에 있음":"+ 선택");
      t.addEventListener("click",()=>{ p.sel=!p.sel; renderParsed(); });
      tokensEl.appendChild(t);
    });
    const selN=parsed.filter(p=>p.sel).length;
    const newN=parsed.filter(p=>p.sel&&!p.exists).length;
    composeNEl.textContent=selN?("("+selN+")"):"";
    saveNEl.textContent=newN?("("+newN+")"):"";
    saveLibBtn.disabled=!newN; toComposeBtn.disabled=!selN;
    const anyUntrans=parsed.some(p=>!p.ko);
    aiFillBtn.hidden=!(anyUntrans && (TRANSLATE_URL || (sb&&sb.functions)));
  }
  selectAllBtn.addEventListener("click",()=>{
    const all=parsed.length&&parsed.every(p=>p.sel);
    parsed.forEach(p=>p.sel=!all); renderParsed();
  });
  cancelBtn.addEventListener("click",()=>{ parsed=[]; parsedWrap.hidden=true; tokensEl.innerHTML=""; });
  toComposeBtn.addEventListener("click",()=>{
    const chosen=parsed.filter(p=>p.sel); if(!chosen.length){ toast("선택된 단어가 없어요"); return; }
    let n=0; chosen.forEach(p=>{ if(addCompose(p.en)) n++; });
    buildVocab(); renderAll();
    switchTab("compose");
    toast(n?("작성에 "+n+"개 담음"):"이미 담겨 있어요");
  });
  saveLibBtn.addEventListener("click",saveImportToLib);
  async function saveImportToLib(){
    const chosen=parsed.filter(p=>p.sel&&!p.exists);
    if(!chosen.length){ toast("저장할 새 단어가 없어요"); return; }
    const fresh=chosen.map(p=>({id:uid(),en:p.en,ko:p.ko||translate(p.en),cat:(CATOF[lc(p.en)]||guessCat(p.en)),count:0}));
    userWords.push(...fresh); persistWords(); buildVocab(); renderAll();   // 로컬에 먼저 영속화(오프라인에서도 유지)
    chosen.forEach(p=>p.exists=true); renderParsed();
    toast("단어장에 "+fresh.length+"개 저장");
    if(sb){ sbInsert(fresh).catch(e=>console.error(e)); }   // 클라우드는 best-effort(개별 실패는 무시)
  }

  /* ---------- AI 번역(가져오기 보조) ---------- */
  const TRANSLATE_FN=(window.TRANSLATE_FN||"translate");
  const TRANSLATE_URL=(window.TRANSLATE_URL||"");
  const TRANSLATE_KEY=(window.TRANSLATE_KEY||"");
  async function aiTranslate(words){
    if(TRANSLATE_URL){
      const res=await fetch(TRANSLATE_URL,{method:"POST",
        headers:Object.assign({"content-type":"application/json"},TRANSLATE_KEY?{"authorization":"Bearer "+TRANSLATE_KEY,"apikey":TRANSLATE_KEY}:{}),
        body:JSON.stringify({words})});
      if(!res.ok) throw new Error("AI 번역 실패 "+res.status);
      const data=await res.json(); return (data&&data.translations)||{};
    }
    if(!sb||!sb.functions) throw new Error("AI 번역 미설정");
    const {data,error}=await sb.functions.invoke(TRANSLATE_FN,{body:{words}});
    if(error) throw error; return (data&&data.translations)||{};
  }
  aiFillBtn.addEventListener("click",async()=>{
    const targets=parsed.filter(p=>!p.ko);
    if(!targets.length) return;
    const prev=aiFillBtn.textContent; aiFillBtn.textContent="번역 중…"; aiFillBtn.disabled=true;
    try{
      const map=await aiTranslate(targets.map(p=>p.en));
      const low={}; Object.keys(map).forEach(k=>low[k.toLowerCase()]=map[k]);
      targets.forEach(p=>{ const ko=(map[p.en]||low[p.en.toLowerCase()]||"").trim(); if(ko)p.ko=ko; });
      renderParsed();
    }catch(e){ console.error(e); toast("AI 번역을 사용할 수 없어요"); }
    finally{ aiFillBtn.textContent=prev; aiFillBtn.disabled=false; }
  });

  /* ---------- Supabase 헬퍼 ---------- */
  async function sbList(){
    const {data,error}=await sb.from("words").select("*");
    if(error) throw error;
    return (data||[]).map(d=>({id:d.id,en:d.en,ko:d.ko||"",cat:d.cat||"기타",count:d.count||0}));
  }
  // 한 단어 저장이 실패(예: lower(en) 유니크 중복)해도 나머지 단어 저장을 막지 않도록 개별 삽입
  async function sbInsert(rows){
    if(!sb) return;
    for(const r of rows){
      const {error}=await sb.from("words").insert({id:r.id,en:r.en,ko:r.ko,cat:r.cat,count:r.count});
      if(error) console.warn("단어 클라우드 저장 건너뜀:", r.en, error.message||error);
    }
  }
  async function sbUpdate(id,patch){ if(!sb)return; const {error}=await sb.from("words").update(patch).eq("id",id); if(error) throw error; }

  /* ---------- 탭 ---------- */
  function switchTab(name){
    document.querySelectorAll(".tab").forEach(t=>{const on=t.dataset.tab===name;t.classList.toggle("active",on);t.setAttribute("aria-selected",on?"true":"false");});
    document.querySelectorAll(".view").forEach(v=>{const on=v.dataset.view===name;v.classList.toggle("show",on);v.hidden=!on;});
    dock.hidden = name!=="compose";
    if(dock.hidden) dockSave.hidden=true;
    syncDockHeight();
  }
  document.querySelectorAll(".tab").forEach(b=>b.addEventListener("click",()=>switchTab(b.dataset.tab)));

  /* ---------- 렌더 ---------- */
  function renderAll(){ renderPresets(); renderChips(); renderLib(); renderDock(); }

  /* ---------- 시작 ---------- */
  (async function init(){
    buildVocab(); renderAll();                       // 로컬 캐시(내 단어 포함) 즉시 표시
    if(!CONFIGURED){ setStatus(userWords.length?"demo":"local"); return; }
    if(!sb){ setStatus(userWords.length?"demo":"error"); return; }
    try{
      const cloud=await sbList();
      const cloudSet=new Set(cloud.map(w=>lc(w.en)));
      const localOnly=userWords.filter(w=>!cloudSet.has(lc(w.en)));   // 오프라인에 저장됐던 단어 보존
      userWords=cloud.concat(localOnly);
      persistWords(); buildVocab(); renderAll(); setStatus("ok");
      if(localOnly.length) sbInsert(localOnly).catch(()=>{});         // 클라우드로 동기화(heal)
    }
    catch(e){ console.error(e); setStatus(userWords.length?"demo":"error"); }
  })();
})();
</script>
<script>
/* 테마 전환 (라이트 기본 · 선택 기억) */
(function(){
  "use strict";
  var KEY="promptDrawer.theme", root=document.documentElement;
  function read(){try{return localStorage.getItem(KEY);}catch(e){return null;}}
  function write(v){try{localStorage.setItem(KEY,v);}catch(e){}}
  function apply(theme){
    if(theme==="dark"){ root.setAttribute("data-theme","dark"); } else { root.removeAttribute("data-theme"); }
    var meta=document.querySelector('meta[name="theme-color"]');
    if(meta) meta.setAttribute("content", theme==="dark" ? "#15161c" : "#ffffff");
  }
  var theme = read()==="dark" ? "dark" : "light";
  apply(theme);
  var toggle=document.getElementById("themeToggle");
  if(toggle) toggle.addEventListener("click",function(){ theme = theme==="light" ? "dark" : "light"; apply(theme); write(theme); });
})();
</script>
